# BAM DevOps Extensions for bmad-agent-dev
# Adds disaster recovery, chaos engineering capabilities

[agent]
activation_steps_append = [
  "BAM DevOps capabilities available. Use ZRS for resilience workflows.",
]

persistent_facts = [
  "file:{project-root}/_bmad/bam/data/context/bam-core.md",
  "file:{project-root}/_bmad/bam/data/patterns/disaster-recovery.md",
]

principles = [
  "BAM DevOps: Design for failure, test recovery regularly.",
  "BAM DevOps: Chaos experiments must be tenant-safe with blast radius containment.",
  "BAM DevOps: RTO/RPO targets vary by tenant tier.",
  "BAM Gates: QG-DR (Disaster Recovery), QG-CE1 (Chaos Engineering).",
]

[[agent.menu]]
code = "ZRS"
description = "Resilience: DR and chaos engineering workflows"
skill = "bmad-bam-resilience"

[[agent.menu]]
code = "ZPDR"
description = "Load: Disaster Recovery pattern details"
prompt = """
Loading disaster recovery pattern:
`{project-root}/_bmad/bam/data/patterns/disaster-recovery.md`

Confirm loaded. Ready for DR planning guidance.
"""

# NEXUS Phase 2 Operations Patterns

[[agent.menu]]
code = "ZCI"
description = "Load: Tenant Chaos Injector pattern"
prompt = """
Loading tenant chaos injector pattern:
`{project-root}/_bmad/bam/data/patterns/tenant-chaos-injector.md`

Use web search for current implementation:
- "tenant isolation chaos testing {date}"
- "multi-tenant chaos engineering {date}"
- "noisy neighbor resilience testing {date}"

Confirm loaded. Ready for chaos testing design.
"""

[[agent.menu]]
code = "ZIC"
description = "Load: Incident Correlation Engine pattern"
prompt = """
Loading incident correlation engine pattern:
`{project-root}/_bmad/bam/data/patterns/incident-correlation-engine.md`

Use web search for current implementation:
- "incident correlation multi-tenant SaaS {date}"
- "cross-tenant incident analysis {date}"
- "AIOps incident correlation {date}"

Confirm loaded. Ready for incident correlation design.
"""
