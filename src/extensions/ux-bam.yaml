  - id: validate-ux-design-prompt
    content: |
      ## Validate UX Design Against Quality Gates

      Prerequisites: Ensure BAM UX context loaded via `bam-ux-context`

      **Quality Gate Validation:**

      Check against relevant quality gates:
      - QG-M2 (Tenant Isolation): UX respects tenant boundaries
      - QG-I2 (Tenant Safety): No cross-tenant data exposure in UI
      - QG-P1 (Production): Accessibility and performance requirements met

      **Validation Checklist:**
      - [ ] Tier-specific features clearly differentiated in UI
      - [ ] Upgrade flows respect tenant context
      - [ ] Admin portal enforces proper authorization
      - [ ] No tenant data leakage through URL, cache, or UI state

      Report validation results with UX recommendations.

