prompts:
  - id: load-bam-tea-context-prompt
    content: |
      ## Load BAM Testing Context

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation, testing-isolation, testing-agent-safety`

      Read and internalize the tenant testing architecture guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/tenant-testing.md`

      Also load the TEA-specific guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/tea-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/testing-agent-safety.md`

      This guide provides comprehensive context for designing test architectures that verify
      tenant isolation in multi-tenant systems. It covers the following key areas:

      1. **RLS Test Patterns**: Strategies for testing Row-Level Security policies including
         cross-tenant query attempts, policy bypass verification, and edge case coverage.
      2. **Tenant Fixture Design**: Patterns for creating isolated test fixtures with proper
         tenant context, automatic cleanup, and consistent seed data generation.
      3. **Noisy Neighbor Testing**: Approaches to verify performance isolation between tenants
         under load, ensuring one tenant cannot impact another's SLA.
      4. **Memory Isolation Verification**: Test patterns for ensuring AI agent memories are
         properly scoped and cannot be accessed across tenant boundaries.
      5. **Agent Safety Testing**: Patterns for testing AI agent safety boundaries and isolation.

      Once loaded, confirm by stating: "BAM testing context loaded. Ready to design tenant
      isolation test strategies."

  - id: tenant-test-strategy-prompt
    content: |
      ## Tenant Isolation Test Strategy

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation, testing-agent-safety`

      Design tests to verify:
      1. RLS policies prevent cross-tenant access
      2. Cache isolation works correctly
      3. Memory scope is enforced
      4. Noisy neighbor protection works

      Test types:
      - Unit: Mock tenant context
      - Integration: Real RLS with test tenant
      - E2E: Full stack isolation verification

  - id: tenant-fixtures-prompt
    content: |
      ## Tenant Test Fixtures

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation, testing-isolation`

      Design a fixture factory that provides isolated tenant test environments.

      **Fixture Requirements:**
      - Each fixture creates a fully isolated tenant context
      - Fixtures must support automatic cleanup after test completion
      - Seed data should be deterministic and reproducible across test runs

      **Configuration Options:**
      - Tier selection: free, pro, enterprise (determines feature access and limits)
      - User count: Number of test users to provision within the tenant
      - Seed data: Enable/disable pre-populated test data (users, resources, settings)
      - Isolation level: Match production tenant isolation model (RLS, schema, database)

      **Fixture Capabilities:**
      - One tenant per test suite to prevent cross-test interference
      - Automatic cleanup on test teardown
      - Consistent seed data generation using deterministic algorithms
      - Cross-tenant verification helpers for isolation testing

      **Reference Template:**
      `{project-root}/_bmad/bam/templates/tenant-fixture-template.md`

  - id: web-research-tea-prompt
    content: |
      ## BAM Web Research - Tenant Testing

      Research current best practices for tenant testing.

      **Research Focus:** {{research_topic}}

      Search the web: "{{research_topic}} tenant testing patterns {date}"
      Search the web: "{{research_topic}} enterprise SaaS {date}"

      Return findings with: _Source: [URL]_

  - id: isolation-testing-prompt
    content: |
      ## Isolation Verification Testing

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation, tenant-isolation`

      ### Objective
      Design comprehensive isolation verification tests that validate tenant
      boundaries across all platform layers in a multi-tenant SaaS system.

      ### Process

      1. **Data Layer Isolation Tests**
         - Test RLS policy enforcement
         - Verify query isolation
         - Test policy bypass prevention

         | Test Category | Test Case | Setup | Expected Result | Priority |
         |---------------|-----------|-------|-----------------|----------|
         | RLS enforcement | Query as Tenant B for A's data | Two isolated tenants | 0 rows returned | Critical |
         | Policy completeness | Query without tenant context | Unset context | Error or 0 rows | Critical |
         | Insert isolation | Insert with wrong tenant_id | Cross-tenant attempt | Constraint violation | Critical |
         | Update isolation | Update other tenant's row | Cross-tenant attempt | 0 rows affected | Critical |
         | Delete isolation | Delete other tenant's row | Cross-tenant attempt | 0 rows affected | Critical |

      2. **API Layer Isolation Tests**
         - Test authentication boundaries
         - Verify authorization enforcement
         - Test cross-tenant request rejection

         | Test Category | Test Case | Setup | Expected Result | Priority |
         |---------------|-----------|-------|-----------------|----------|
         | Auth boundary | Access endpoint with other tenant token | Valid token, wrong tenant | 403 Forbidden | Critical |
         | Missing auth | Access protected endpoint | No token | 401 Unauthorized | Critical |
         | Resource isolation | GET resource from other tenant | Cross-tenant resource ID | 404 Not Found | Critical |
         | IDOR prevention | Enumerate tenant resources | Sequential ID attempts | Consistent 404s | Critical |

      3. **Cache Layer Isolation Tests**
         - Test cache key isolation
         - Verify cache poisoning prevention
         - Test invalidation scope

         | Test Category | Test Case | Setup | Expected Result | Priority |
         |---------------|-----------|-------|-----------------|----------|
         | Key isolation | Read cache with wrong tenant | Prefixed cache keys | Cache miss | High |
         | Poisoning prevention | Write cache with wrong prefix | Attempted cross-tenant write | Write rejected | Critical |
         | Invalidation scope | Invalidate tenant A cache | Multi-tenant cached data | Only A invalidated | High |

      4. **AI/Agent Memory Isolation Tests**
         - Test memory scope enforcement
         - Verify context isolation
         - Test prompt injection boundaries

         | Test Category | Test Case | Setup | Expected Result | Priority |
         |---------------|-----------|-------|-----------------|----------|
         | Memory scope | Query agent with other tenant context | Cross-tenant memory access | No foreign memories | Critical |
         | Context isolation | Agent run with mixed context | Malformed tenant context | Rejected or scoped | Critical |
         | Prompt boundaries | Inject cross-tenant reference | Prompt injection attempt | Scoped response only | Critical |

      ### Verification Checklist
      - [ ] All data layer isolation tests pass
      - [ ] All API layer isolation tests pass
      - [ ] All cache layer isolation tests pass
      - [ ] All AI/agent memory isolation tests pass
      - [ ] No cross-tenant data leakage detected
      - [ ] Tests run in CI pipeline on every PR

      ### Output
      Produce test plan using template:
      `{project-root}/_bmad/bam/templates/isolation-test-plan-template.md`

  - id: cross-tenant-testing-prompt
    content: |
      ## Cross-Tenant Boundary Testing

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation, module-boundaries`

      ### Objective
      Design test scenarios that specifically target cross-tenant boundaries
      to verify that no unauthorized data or functionality leakage occurs.

      ### Process

      1. **Boundary Enumeration**
         - Identify all cross-tenant boundaries
         - Map data flow across boundaries
         - Classify boundary types

         | Boundary | Type | Data Flow | Protection | Test Coverage |
         |----------|------|-----------|------------|---------------|
         | API endpoint | Request | Inbound | Auth + RLS | Full |
         | Event bus | Async | Bidirectional | Tenant header | Full |
         | Shared cache | Data | Read/write | Key prefix | Full |
         | Reporting DB | Query | Read | View isolation | Full |
         | Admin panel | UI | Bidirectional | Role + tenant | Full |

      2. **Attack Surface Tests**
         - Design tests for each attack vector
         - Include both positive and negative tests
         - Cover edge cases

         | Attack Vector | Test Scenario | Attack Method | Expected Defense |
         |---------------|---------------|---------------|------------------|
         | Direct object reference | Access /api/users/{other_tenant_id} | URL manipulation | 404 or 403 |
         | Parameter tampering | Modify tenant_id in request | Request manipulation | Validation rejection |
         | Token substitution | Use Tenant A token for B's resource | Auth bypass attempt | 403 Forbidden |
         | SQL injection | Inject tenant bypass in query | Malicious input | Parameterized query |
         | Cache key manipulation | Forge cache key prefix | Cache poisoning | Key validation |

      3. **Multi-Tenant Scenario Tests**
         - Test concurrent multi-tenant operations
         - Verify isolation under load
         - Test tenant state transitions

         | Scenario | Setup | Action | Verification |
         |----------|-------|--------|--------------|
         | Concurrent access | 10 tenants, parallel requests | Heavy API load | Each tenant sees only own data |
         | Tenant creation | Create new tenant | Full provisioning | Isolated from existing tenants |
         | Tenant deletion | Delete tenant | Full cleanup | No orphaned data accessible |
         | Tenant suspension | Suspend tenant | Access attempt | Suspended tenant blocked |

      4. **Edge Case Tests**
         - Test boundary conditions
         - Verify handling of malformed data
         - Test error scenarios

         | Edge Case | Condition | Input | Expected Behavior |
         |-----------|-----------|-------|-------------------|
         | Empty tenant context | No tenant set | API request | 401 or 403 |
         | Invalid tenant ID | Non-existent tenant | Valid format, fake ID | 403 Forbidden |
         | Malformed tenant ID | Invalid UUID format | Garbage input | 400 Bad Request |
         | Null tenant injection | Null byte in tenant | Bypass attempt | Validation rejection |

      ### Verification Checklist
      - [ ] All boundaries enumerated and tested
      - [ ] Attack surface coverage complete
      - [ ] Multi-tenant scenarios verified
      - [ ] Edge cases handled correctly
      - [ ] No bypass paths discovered

      ### Output
      Produce boundary test plan using template:
      `{project-root}/_bmad/bam/templates/cross-tenant-test-plan-template.md`

  - id: security-testing-prompt
    content: |
      ## Multi-Tenant Security Testing

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation, compliance, tenant-isolation`

      ### Objective
      Design security testing specifically focused on multi-tenant vulnerabilities
      that could lead to data breaches or privilege escalation across tenants.

      ### Process

      1. **Authentication Security Tests**
         - Test token isolation
         - Verify session management
         - Test credential scoping

         | Security Test | Target | Attack Type | Verification |
         |---------------|--------|-------------|--------------|
         | Token leakage | JWT tokens | Token replay | Tenant binding verified |
         | Session fixation | Session store | Session injection | Session regeneration |
         | API key scoping | API keys | Key reuse | Tenant validation |
         | OAuth scope | OAuth tokens | Scope escalation | Scope enforcement |

      2. **Authorization Security Tests**
         - Test role boundaries
         - Verify permission inheritance
         - Test privilege escalation

         | Security Test | Target | Attack Type | Verification |
         |---------------|--------|-------------|--------------|
         | Horizontal escalation | Cross-tenant access | Tenant switch | Access denied |
         | Vertical escalation | Admin functions | Role bypass | Permission check |
         | Permission inheritance | Workspace roles | Inheritance abuse | Proper scoping |
         | Break-glass audit | Admin bypass | Audit trail | Full logging |

      3. **Data Security Tests**
         - Test encryption boundaries
         - Verify data classification
         - Test key isolation

         | Security Test | Target | Attack Type | Verification |
         |---------------|--------|-------------|--------------|
         | Encryption at rest | Stored data | Decryption attempt | Tenant-scoped keys |
         | Encryption in transit | API data | MITM | TLS enforcement |
         | Key rotation | Encryption keys | Old key use | Key versioning |
         | Backup isolation | Backup storage | Backup access | Tenant-scoped backups |

      4. **AI/Agent Security Tests**
         - Test prompt injection
         - Verify tool execution boundaries
         - Test model output filtering

         | Security Test | Target | Attack Type | Verification |
         |---------------|--------|-------------|--------------|
         | Prompt injection | Agent prompts | Cross-tenant data extraction | Sanitization |
         | Tool abuse | Agent tools | Unauthorized actions | Tool permissions |
         | Output leakage | Model responses | Data exfiltration | Output filtering |
         | Memory extraction | Agent memory | Memory dump | Scope enforcement |

      5. **Compliance Security Tests**
         - Test audit logging
         - Verify data residency
         - Test retention policies

         | Security Test | Target | Compliance Requirement | Verification |
         |---------------|--------|------------------------|--------------|
         | Audit completeness | Audit logs | SOC2 | All actions logged |
         | Data residency | Data storage | GDPR | Region enforcement |
         | Retention enforcement | Data lifecycle | Policy compliance | Auto-deletion |
         | Access logging | Admin access | HIPAA | Full trail |

      ### Security Test Report

      | Category | Tests | Pass | Fail | Blocked | Coverage |
      |----------|-------|------|------|---------|----------|
      | Authentication | {count} | {pass} | {fail} | {blocked} | {%} |
      | Authorization | {count} | {pass} | {fail} | {blocked} | {%} |
      | Data Security | {count} | {pass} | {fail} | {blocked} | {%} |
      | AI/Agent | {count} | {pass} | {fail} | {blocked} | {%} |
      | Compliance | {count} | {pass} | {fail} | {blocked} | {%} |

      ### Verification Checklist
      - [ ] Authentication security tests complete
      - [ ] Authorization boundary tests complete
      - [ ] Data encryption tests complete
      - [ ] AI/agent security tests complete
      - [ ] Compliance tests mapped to requirements
      - [ ] No critical vulnerabilities found

      ### Output
      Produce security test report using template:
      `{project-root}/_bmad/bam/templates/security-test-report-template.md`

  - id: chaos-testing-prompt
    content: |
      ## Chaos Testing for Tenant Resilience

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation, observability`

      ### Objective
      Design chaos engineering experiments that verify tenant isolation remains
      intact under failure conditions and that noisy neighbor effects are contained.

      ### Process

      1. **Noisy Neighbor Experiments**
         - Test resource exhaustion isolation
         - Verify rate limiting per tenant
         - Test performance isolation

         | Experiment | Injection | Target | Expected Behavior | Blast Radius |
         |------------|-----------|--------|-------------------|--------------|
         | CPU exhaustion | High CPU tenant | Compute | Other tenants unaffected | Single tenant |
         | Memory pressure | Memory hog | RAM | OOM killer targets tenant | Single tenant |
         | Connection exhaustion | Connection flood | DB pool | Per-tenant limits | Single tenant |
         | Storage burst | Large write burst | Disk I/O | I/O throttling | Single tenant |

      2. **Failure Injection Experiments**
         - Test tenant-scoped failures
         - Verify failure containment
         - Test recovery isolation

         | Experiment | Injection | Scope | Expected Behavior | Recovery |
         |------------|-----------|-------|-------------------|----------|
         | Database failover | Kill primary | Platform | All tenants fail over together | Automatic |
         | Tenant partition | Network isolation | Single tenant | Other tenants unaffected | Automatic |
         | Cache failure | Redis crash | Platform | Graceful degradation | Automatic |
         | AI runtime failure | Model timeout | Single tenant | Timeout for affected only | Retry with backoff |

      3. **Data Corruption Experiments**
         - Test isolation during corruption
         - Verify recovery procedures
         - Test backup restoration

         | Experiment | Injection | Target | Expected Behavior | Recovery |
         |------------|-----------|--------|-------------------|----------|
         | Row corruption | Corrupt tenant rows | Single tenant | Other tenants clean | Point-in-time restore |
         | Index corruption | Corrupt tenant index | Single tenant | Query fallback | Index rebuild |
         | Cache poisoning | Invalid cache data | Single tenant | Validation catch | Cache flush |

      4. **Security Chaos Experiments**
         - Test isolation under attack
         - Verify containment during breach
         - Test incident response

         | Experiment | Injection | Target | Expected Behavior | Detection |
         |------------|-----------|--------|-------------------|-----------|
         | Credential compromise | Leaked tenant creds | Single tenant | Other tenants safe | Audit alert |
         | Token theft | Stolen session | Single tenant | Session invalidation | Rate limit trigger |
         | Policy bypass attempt | RLS manipulation | Database | Policy holds | Query audit |

      5. **Scale Chaos Experiments**
         - Test under extreme scale
         - Verify tenant fairness
         - Test auto-scaling isolation

         | Experiment | Injection | Scale | Expected Behavior | SLA Impact |
         |------------|-----------|-------|-------------------|------------|
         | Tenant spike | 100x traffic | Single tenant | Rate limiting | None for others |
         | Platform load | 10x all tenants | Platform | Auto-scale | Degradation within SLA |
         | Onboarding burst | 1000 new tenants | Platform | Queue management | Existing unaffected |

      ### Chaos Experiment Dashboard

      | Experiment Category | Total | Passed | Degraded | Failed | Blast Radius Verified |
      |---------------------|-------|--------|----------|--------|----------------------|
      | Noisy Neighbor | {count} | {pass} | {degraded} | {fail} | {yes/no} |
      | Failure Injection | {count} | {pass} | {degraded} | {fail} | {yes/no} |
      | Data Corruption | {count} | {pass} | {degraded} | {fail} | {yes/no} |
      | Security Chaos | {count} | {pass} | {degraded} | {fail} | {yes/no} |
      | Scale Chaos | {count} | {pass} | {degraded} | {fail} | {yes/no} |

      ### Verification Checklist
      - [ ] Noisy neighbor isolation verified
      - [ ] Failure containment within tenant boundaries
      - [ ] Data corruption recovery tenant-scoped
      - [ ] Security chaos tests pass
      - [ ] Scale experiments confirm isolation
      - [ ] Blast radius documented for all experiments

      ### Output
      Produce chaos test plan using template:
      `{project-root}/_bmad/bam/templates/chaos-test-plan-template.md`

  - id: performance-testing-prompt
    content: |
      ## Tenant Performance Isolation Testing

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `performance-isolation, rate-limiting`

      ### Objective
      Design performance tests that verify tenant isolation prevents noisy neighbor
      issues and ensures fair resource allocation across tenants.

      ### Process

      1. **Baseline Performance Tests**
         - Establish per-tenant performance baselines
         - Document expected latencies and throughput
         - Define SLA boundaries

         | Metric | Baseline | Target | SLA Threshold |
         |--------|----------|--------|---------------|
         | API Latency (p50) | | < 100ms | < 200ms |
         | API Latency (p95) | | < 200ms | < 500ms |
         | API Latency (p99) | | < 500ms | < 1000ms |
         | Throughput (RPS) | | | |
         | Error Rate | | < 0.1% | < 1% |

      2. **Noisy Neighbor Simulation**
         - Generate heavy load from one tenant
         - Monitor impact on other tenants
         - Verify isolation mechanisms

         | Test Scenario | Load Profile | Noisy Tenant Impact | Other Tenant Impact |
         |---------------|--------------|---------------------|---------------------|
         | CPU-intensive queries | 100% CPU | Throttled | < 5% degradation |
         | Memory-intensive ops | 90% memory | Limited | No impact |
         | High request rate | 10x normal | Rate limited | No impact |
         | Large payload | 10MB requests | Queued | No impact |

      3. **Concurrent Tenant Tests**
         - Run multiple tenants at peak load
         - Verify fair scheduling
         - Test resource contention handling

         | Test | Tenants | Load Each | Fair Share Variance |
         |------|---------|-----------|---------------------|
         | Equal load | 10 | 100 RPS | < 10% |
         | Unequal load | 10 | Mixed | < 15% |
         | Burst handling | 10 | Spike | Graceful degradation |

      4. **Resource Limit Tests**
         - Test per-tenant quotas
         - Verify limit enforcement
         - Test graceful degradation

         | Resource | Limit | Test | Expected Behavior |
         |----------|-------|------|-------------------|
         | API requests | X/min | Exceed limit | 429 + retry header |
         | Token usage | X/day | Exceed budget | Graceful denial |
         | Concurrent connections | X | Exceed limit | Queue or reject |

      ### Verification Checklist
      - [ ] Baseline performance documented
      - [ ] Noisy neighbor isolation verified
      - [ ] Fair scheduling confirmed
      - [ ] Resource limits enforced
      - [ ] SLA thresholds maintained under load

      ### Output
      Produce performance test plan using template:
      `{project-root}/_bmad/bam/templates/performance-test-plan-template.md`

  - id: contract-testing-prompt
    content: |
      ## Module Contract Verification Testing

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `facade-contracts, module-boundaries`

      ### Objective
      Design tests that verify module contracts are upheld and tenant context
      is properly propagated across module boundaries.

      ### Process

      1. **Facade Contract Tests**
         - Verify API contracts match specifications
         - Test request/response schemas
         - Validate error handling

         | Contract | Test Type | Validation | Priority |
         |----------|-----------|------------|----------|
         | Request schema | Pact/Schema | JSON Schema | Critical |
         | Response schema | Pact/Schema | JSON Schema | Critical |
         | Error responses | Negative | Error codes | High |
         | Tenant header | Context | X-Tenant-ID | Critical |

      2. **Cross-Module Context Tests**
         - Verify tenant context propagation
         - Test async context handling
         - Validate distributed tracing

         | Boundary | Context Type | Propagation Test | Expected |
         |----------|--------------|------------------|----------|
         | HTTP sync | Header | Module A → B | Context preserved |
         | Event async | Event payload | Pub → Sub | Context preserved |
         | Background job | Job metadata | Queue → Worker | Context preserved |
         | gRPC | Metadata | Client → Server | Context preserved |

      3. **Consumer Contract Tests**
         - Test from consumer perspective
         - Verify backward compatibility
         - Document breaking changes

         | Consumer | Provider | Contract Version | Status |
         |----------|----------|------------------|--------|
         | | | | |

      4. **Provider Contract Tests**
         - Test from provider perspective
         - Verify all consumers supported
         - Test deprecation handling

         | Provider | Consumers | Supported Versions | Deprecation |
         |----------|-----------|-------------------|-------------|
         | | | | |

      ### Verification Checklist
      - [ ] All facade contracts have tests
      - [ ] Tenant context propagation verified
      - [ ] Consumer contracts pass
      - [ ] Provider contracts support all consumers
      - [ ] Breaking changes documented

      ### Output
      Produce contract test plan using template:
      `{project-root}/_bmad/bam/templates/contract-test-plan-template.md`

  - id: regression-testing-prompt
    content: |
      ## Tenant Isolation Regression Suite

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation, tenant-isolation`

      ### Objective
      Design a comprehensive regression test suite that ensures tenant isolation
      is not broken by code changes.

      ### Process

      1. **Core Isolation Regression Tests**
         - Run on every PR/commit
         - Fast execution (< 5 minutes)
         - Critical path coverage

         | Test Category | Tests | Execution Time | Frequency |
         |---------------|-------|----------------|-----------|
         | RLS policies | 20 | 30s | Every commit |
         | API isolation | 15 | 45s | Every commit |
         | Cache isolation | 10 | 20s | Every commit |
         | Memory isolation | 10 | 30s | Every commit |

      2. **Extended Isolation Regression**
         - Run nightly or on merge to main
         - Comprehensive coverage
         - Slower but thorough

         | Test Category | Tests | Execution Time | Frequency |
         |---------------|-------|----------------|-----------|
         | Cross-tenant attacks | 50 | 5min | Nightly |
         | Performance isolation | 30 | 10min | Nightly |
         | Edge cases | 40 | 8min | Nightly |
         | Compliance checks | 25 | 5min | Nightly |

      3. **Regression Test Criteria**
         - Define pass/fail thresholds
         - Set quality gates
         - Document exceptions

         | Criteria | Threshold | Action on Fail |
         |----------|-----------|----------------|
         | Test pass rate | 100% | Block merge |
         | Coverage | > 90% | Warning |
         | Performance delta | < 5% | Warning |
         | Security tests | 100% | Block merge |

      4. **Regression Test Maintenance**
         - Update tests with new features
         - Remove obsolete tests
         - Track flaky tests

         | Maintenance Task | Frequency | Owner |
         |------------------|-----------|-------|
         | Add new feature tests | Per feature | Dev team |
         | Review test coverage | Monthly | QA |
         | Fix flaky tests | Weekly | Dev team |

      ### Verification Checklist
      - [ ] Core regression suite defined
      - [ ] Extended regression suite defined
      - [ ] Pass/fail criteria documented
      - [ ] CI/CD integration configured
      - [ ] Maintenance process established

      ### Output
      Produce regression test plan using template:
      `{project-root}/_bmad/bam/templates/regression-test-plan-template.md`

  - id: compliance-testing-prompt
    content: |
      ## Compliance Verification Testing

      Prerequisites: Ensure BAM testing context loaded via `bam-tea-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/compliance-frameworks.csv` → filter by applicable frameworks

      ### Objective
      Design tests that verify compliance with regulatory frameworks including
      SOC2, GDPR, HIPAA, and PCI-DSS.

      ### Process

      1. **SOC2 Compliance Tests**
         - Test trust service criteria
         - Verify control effectiveness
         - Document evidence

         | Control | Test | Evidence | Status |
         |---------|------|----------|--------|
         | CC6.1 Access Control | Test RBAC enforcement | Access logs | |
         | CC6.6 System Boundaries | Test tenant isolation | Isolation tests | |
         | CC7.2 Monitor Vulnerabilities | Verify scanning | Scan reports | |
         | CC8.1 Change Management | Test approval workflow | Audit trail | |

      2. **GDPR Compliance Tests**
         - Test data subject rights
         - Verify consent handling
         - Test data processing controls

         | Requirement | Test | Verification | Status |
         |-------------|------|--------------|--------|
         | Right to Access | Export user data | Complete data export | |
