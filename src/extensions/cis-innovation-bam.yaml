# BAM Extension for CIS Innovation Strategist (Victor)
# Pattern: WDS agent-guides (NO memories: field)

agent:
  metadata:
    extends: 'bmad-cis-agent-innovation-strategist'
    module: 'bam'
    description: "Adds SaaS innovation lens to Victor"

menu:
  - trigger: bam-cis-context
    action: "#load-bam-cis-context-prompt"
    description: Load BAM innovation context
  - trigger: bam-cis-saas-disruption
    action: "#saas-disruption-prompt"
    description: Identify SaaS disruption opportunities
  - trigger: bam-cis-tier-innovation
    action: "#tier-innovation-prompt"
    description: Innovate on tier differentiation
  - trigger: bam-cis-research
    action: "#web-research-innovation-prompt"
    description: Conduct web research for innovation decisions
  - trigger: bam-cis-synthesis
    action: "#insight-synthesis-prompt"
    description: Synthesize insights across domains and analyses
  - trigger: bam-cis-cross-domain
    action: "#cross-domain-analysis-prompt"
    description: Analyze patterns across market, technology, and business domains
  - trigger: bam-cis-pattern-recognition
    action: "#pattern-recognition-prompt"
    description: Identify emerging patterns in multi-tenant SaaS innovation
  - trigger: bam-cis-strategic-synthesis
    action: "#strategic-synthesis-prompt"
    description: Synthesize strategic recommendations from multiple inputs

prompts:
  - id: load-bam-cis-context-prompt
    content: |
      ## Load BAM Innovation Context

      Read and internalize the multi-tenant SaaS innovation guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/saas-innovation.md`

      Also load the innovation-specific guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/innovation-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/experimentation.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/customization.md`

      This guide provides comprehensive context for applying innovation strategy to
      multi-tenant AI platforms. It covers the following key areas:

      1. **Tenant Isolation Innovation**: Opportunities to innovate on isolation mechanisms,
         turning security requirements into competitive advantages and trust differentiators.
      2. **Tier Differentiation Strategy**: Innovation in how tiers are structured, what
         features drive upgrades, and how to create sustainable value progression.
      3. **AI Agent Platform Innovation**: Leveraging multi-tenant scale for AI improvements,
         cross-tenant learning (with privacy), and agent capability advancement.
      4. **Network Effects in SaaS**: Identifying and amplifying network effects that
         benefit from multi-tenant architecture while preserving isolation.
      5. **Experimentation Patterns**: Multi-tenant A/B testing and feature experimentation.
      6. **Customization Patterns**: Tenant-specific customization and configuration.

      Apply this multi-tenant SaaS lens to all innovation activities. Once loaded, confirm
      by stating: "BAM innovation context loaded. Ready to explore SaaS disruption
      opportunities."

  - id: saas-disruption-prompt
    content: |
      ## SaaS Disruption Opportunities

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation, tenant-lifecycle`

      ### Objective
      Identify and evaluate disruption opportunities in the multi-tenant SaaS market,
      focusing on architectural and business model innovations that create sustainable
      competitive advantages.

      ### Process

      1. **AI-First vs Bolt-On AI Analysis**
         - Evaluate current market positioning on AI integration spectrum
         - Identify opportunities for AI-native architecture advantages
         - Map competitor weaknesses in AI integration depth

         | Approach | Characteristics | Disruption Opportunity |
         |----------|----------------|----------------------|
         | Bolt-on AI | AI added to existing product | Limited by legacy architecture |
         | AI-assisted | AI enhances existing workflows | Incremental improvement only |
         | AI-first | Product built around AI capabilities | Deep workflow transformation |
         | AI-native | AI is the product, not a feature | Requires full reimagining |

         **Assessment Questions:**
         - Can competitors easily replicate our AI integration depth?
         - Does our tenant isolation enable AI advantages others cannot match?
         - Are we capturing AI training value from multi-tenant scale?

      2. **Tenant Data Network Effects Evaluation**
         - Map data accumulation advantages from multi-tenancy
         - Identify privacy-preserving aggregate intelligence opportunities
         - Design defensible data moats

         | Data Advantage | How Multi-Tenancy Enables | Competitor Barrier |
         |----------------|--------------------------|-------------------|
         | Aggregate patterns | See patterns across thousands of tenants | Single-tenant sees only their data |
         | Benchmark data | Cross-industry performance baselines | Requires broad tenant base |
         | AI model improvement | Training data from diverse use cases | Cold start problem for new entrants |
         | Best practice mining | Identify what top performers do differently | Needs tenant diversity |

      3. **Platform vs Point Solution Positioning**
         - Evaluate market readiness for platform consolidation
         - Identify integration complexity pain points
         - Map platform expansion opportunities

         | Market Signal | Point Solution Response | Platform Response |
         |--------------|------------------------|-------------------|
         | Tool fatigue | Better single tool | Unified experience |
         | Integration costs | Pre-built connectors | Native integration |
         | Data silos | Export features | Single source of truth |
         | Vendor management | Competitive pricing | Fewer vendors to manage |

      4. **Pricing Model Innovation**
         - Analyze usage-based vs seat-based trade-offs
         - Design hybrid pricing that captures value and enables growth
         - Model revenue predictability vs growth potential

         | Model | Best For | Disruption Play |
         |-------|----------|-----------------|
         | Seat-based | Predictable, team-focused | Undercut with usage-based for small teams |
         | Usage-based | Variable workloads, PLG | Better value alignment, lower barrier |
         | Hybrid | Complex value delivery | Capture both expansion and predictability |
         | Outcome-based | High-value AI results | Share in value created |

      ### Verification Checklist
      - [ ] Market position mapped against disruption vectors
      - [ ] Technical architecture requirements identified for each opportunity
      - [ ] Competitive response scenarios evaluated
      - [ ] Resource requirements estimated
      - [ ] Time-to-market analyzed for each disruption path

      ### Output
      Produce disruption analysis document with prioritized opportunities matrix,
      required architectural capabilities, and recommended strategic sequence.

  - id: tier-innovation-prompt
    content: |
      ## Tier Differentiation Innovation

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation, tenant-lifecycle`

      ### Objective
      Innovate on tier differentiation strategies to maximize conversion rates,
      minimize churn, and create clear value progression that justifies pricing gaps.

      ### Process

      1. **FREE Tier: Acquisition Funnel Optimization**
         - Design for viral potential and word-of-mouth
         - Balance value demonstration with upgrade motivation
         - Identify natural friction points that drive conversion

         | Strategy | Implementation | Conversion Trigger |
         |----------|---------------|-------------------|
         | Time-limited full access | 14-day Pro trial on signup | Fear of losing features |
         | Usage ceiling approach | Generous limits then hard stop | Workflow dependency |
         | Feature preview | Show locked features in UI | Awareness of what is missing |
         | Community proof | Show Pro/Enterprise success stories | Social proof |
         | Watermark/branding | Platform branding on outputs | Professional appearance need |

         **Innovation Questions:**
         - What free feature creates the most upgrade pressure?
         - How do we make sharing/inviting valuable without Pro?
         - What is the optimal free-to-paid conversion timeline?

      2. **PRO Tier: Power User Feature Discovery**
         - Design progressive feature revelation
         - Create aha moments that justify the price
         - Build features that increase with usage

         | Feature Category | Discovery Mechanism | Value Realization |
         |-----------------|--------------------|--------------------|
         | Automation | Suggest automation after repeated tasks | Time savings visible |
         | Integrations | Show integration value when data entry required | Reduced manual work |
         | Advanced AI | Offer AI upgrade during complex tasks | Quality improvement |
         | Team features | Prompt sharing when collaboration detected | Network effect |
         | Analytics | Surface insights from accumulated data | Decision improvement |

         **Innovation Questions:**
         - What Pro features become more valuable over time?
         - How do we create switching costs without lock-in perception?
         - What power user workflows do not exist yet?

      3. **ENTERPRISE Tier: Compliance + Integration Depth**
         - Design for IT/procurement requirements
         - Create administrative control surfaces
         - Build audit and compliance tooling

         | Enterprise Need | Feature Response | Technical Requirement |
         |-----------------|-----------------|----------------------|
         | SSO requirement | SAML/OIDC support | Identity provider integration |
         | Data residency | Region selection | Multi-region infrastructure |
         | Audit trail | Complete activity logging | Immutable audit storage |
         | Custom contracts | SLA customization | Legal/billing flexibility |
         | Dedicated support | Named CSM, priority queue | Support tier isolation |
         | Security review | SOC2, penetration test reports | Compliance documentation |

         **Innovation Questions:**
         - What enterprise controls are not table stakes yet?
         - How do we make enterprise features invisible to end users?
         - What compliance requirements are emerging?

      4. **Cross-Tier Innovation Opportunities**
         - Identify features that could move between tiers
         - Design tier-exclusive time-limited features
         - Create tier loyalty rewards

         | Innovation Type | Example | Impact |
         |-----------------|---------|--------|
         | Tier preview | Enterprise feature beta for Pro | Upgrade pipeline |
         | Loyalty upgrade | Long-term free users get Pro feature | Retention |
         | Reverse trial | Downgrade grace period with Pro features | Churn reduction |
         | Usage milestone | Unlock feature at usage threshold | Engagement reward |

      ### Verification Checklist
      - [ ] Each tier has 3+ unique value propositions
      - [ ] Upgrade path from each tier is clear
      - [ ] Downgrade friction is ethical but effective
      - [ ] Enterprise features do not complicate Pro UX
      - [ ] Free tier is genuinely valuable standalone

      ### Output
      Produce tier innovation roadmap with prioritized feature experiments,
      expected conversion impact, and implementation complexity estimates.

  - id: web-research-innovation-prompt
    content: |
      ## BAM Web Research - Innovation

      Conduct targeted web research for multi-tenant SaaS innovation strategy and market innovation decisions.

      **Research Focus:** {{research_topic}}

      Execute 2-3 targeted searches:
      - "{{research_topic}} innovation strategy best practices {date}"
      - "{{research_topic}} SaaS patterns {date}"
      - "{{research_topic}} market innovation trends {date}"

      Return findings as structured summary:

      ### Key Findings
      - {Finding 1} _Source: [URL]_
      - {Finding 2} _Source: [URL]_

      ### Applicable Patterns
      - {Pattern 1}

      ### Sources
      - [URL 1]
      - [URL 2]

  - id: insight-synthesis-prompt
    content: |
      ## Insight Synthesis Across Domains

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation, tenant-lifecycle`

      ### Objective
      Synthesize insights from multiple analyses and domains to create
      actionable strategic recommendations for multi-tenant SaaS innovation.

      ### Process

      1. **Input Collection**
         | Source | Domain | Key Insights |
         |--------|--------|--------------|
         | Market analysis | Market | {Findings} |
         | Competitive analysis | Competition | {Findings} |
         | Technology trends | Technology | {Findings} |
         | Customer research | Customer | {Findings} |
         | Financial analysis | Business | {Findings} |

      2. **Insight Integration**
         - Identify themes across domains
         - Map contradictions and tensions
         - Find synergies and alignments
         - Prioritize by strategic impact

      3. **Synthesis Framework**
         | Theme | Supporting Evidence | Implication | Confidence |
         |-------|-------------------|-------------|------------|
         | {Theme 1} | {Sources} | {Strategic implication} | H/M/L |
         | {Theme 2} | {Sources} | {Strategic implication} | H/M/L |

      4. **Strategic Implications**
         - Product implications
         - Go-to-market implications
         - Technology implications
         - Organizational implications

      ### Verification Checklist
      - [ ] All relevant inputs collected
      - [ ] Cross-domain themes identified
      - [ ] Contradictions resolved or acknowledged
      - [ ] Implications prioritized

      ### Output
      Produce insight synthesis using template:
      `{project-root}/_bmad/bam/templates/insight-synthesis-template.md`

  - id: cross-domain-analysis-prompt
    content: |
      ## Cross-Domain Analysis

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation`

      ### Objective
      Analyze patterns and opportunities across market, technology,
      and business domains for multi-tenant SaaS platform.

      ### Process

      1. **Domain Mapping**
         | Domain | Current State | Trends | Opportunities |
         |--------|--------------|--------|---------------|
         | Market | {Assessment} | {Key trends} | {Gaps/needs} |
         | Technology | {Assessment} | {Key trends} | {Capabilities} |
         | Business | {Assessment} | {Key trends} | {Models} |
         | Customer | {Assessment} | {Key trends} | {Segments} |

      2. **Cross-Domain Intersection**
         - Market + Technology: Where tech enables market opportunity
         - Technology + Business: Where tech enables new models
         - Business + Customer: Where models meet needs
         - Customer + Market: Where segments define markets

      3. **Opportunity Matrix**
         | Intersection | Opportunity | Multi-Tenant Advantage |
         |--------------|-------------|----------------------|
         | Market x Tech | {Description} | {Scale/efficiency} |
         | Tech x Business | {Description} | {Innovation speed} |
         | Business x Customer | {Description} | {Tier leverage} |

      4. **Strategic Recommendations**
         - Prioritized opportunity list
         - Resource requirements
         - Timeline and sequencing
         - Risk assessment

      ### Verification Checklist
      - [ ] All domains assessed
      - [ ] Intersections analyzed
      - [ ] Opportunities prioritized
      - [ ] Recommendations actionable

      ### Output
      Produce cross-domain analysis using template:
      `{project-root}/_bmad/bam/templates/cross-domain-analysis-template.md`

  - id: pattern-recognition-prompt
    content: |
      ## Emerging Pattern Recognition

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `experimentation, customization`

      ### Objective
      Identify emerging patterns in multi-tenant SaaS innovation that
      inform strategic direction and investment priorities.

      ### Process

      1. **Pattern Sources**
         | Source | Signal Type | Example Patterns |
         |--------|-------------|-----------------|
         | Market leaders | Best practices | PLG motion, usage pricing |
         | Emerging players | Innovation | AI-native, vertical SaaS |
         | Adjacent markets | Transplant | B2C patterns in B2B |
         | Technology trends | Enablement | LLMs, real-time collaboration |

      2. **Pattern Identification**
         - Repeating success patterns
         - Failure patterns to avoid
         - Emerging patterns to monitor
         - Declining patterns to exit

      3. **Pattern Assessment**
         | Pattern | Maturity | Relevance | Adoptability |
         |---------|----------|-----------|--------------|
         | {Name} | Emerging/Growing/Mature | H/M/L | H/M/L |

      4. **Pattern Application**
         - Direct adoption opportunities
         - Adaptation requirements
         - Timing considerations
         - Implementation approach

      ### Verification Checklist
      - [ ] Multiple sources analyzed
      - [ ] Patterns categorized
      - [ ] Assessment complete
      - [ ] Application paths defined

      ### Output
      Produce pattern recognition using template:
      `{project-root}/_bmad/bam/templates/pattern-recognition-template.md`

  - id: strategic-synthesis-prompt
    content: |
      ## Strategic Synthesis

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation, tenant-lifecycle`

      ### Objective
      Synthesize strategic recommendations from multiple analytical
      inputs into coherent, actionable strategy for multi-tenant SaaS.

      ### Process

      1. **Strategic Input Integration**
         | Input | Key Finding | Strategic Implication |
         |-------|-------------|----------------------|
         | Vision/Mission | {Core purpose} | {North star} |
         | Market analysis | {Opportunity} | {Where to play} |
         | Competitive analysis | {Position} | {How to win} |
         | Capability assessment | {Strengths} | {What to build} |
         | Financial analysis | {Constraints} | {Investment priorities} |

      2. **Strategy Framework**
         - Where to play: Market and segment choices
         - How to win: Competitive advantage sources
         - What capabilities: Required investments
         - Management systems: Operating model

      3. **Strategic Choices Matrix**
         | Choice | Option A | Option B | Recommendation |
         |--------|----------|----------|----------------|
         | Target segment | {Choice} | {Choice} | {Rationale} |
         | Value proposition | {Choice} | {Choice} | {Rationale} |
         | Business model | {Choice} | {Choice} | {Rationale} |
         | Competitive position | {Choice} | {Choice} | {Rationale} |

      4. **Implementation Roadmap**
         | Phase | Timeline | Key Initiatives | Metrics |
         |-------|----------|----------------|---------|
         | Foundation | Q1-Q2 | {Initiatives} | {KPIs} |
         | Growth | Q3-Q4 | {Initiatives} | {KPIs} |
         | Scale | Year 2+ | {Initiatives} | {KPIs} |

      ### Verification Checklist
      - [ ] All inputs integrated
      - [ ] Strategic choices explicit
      - [ ] Trade-offs acknowledged
      - [ ] Roadmap realistic

      ### Output
      Produce strategic synthesis using template:
      `{project-root}/_bmad/bam/templates/strategic-synthesis-template.md`
