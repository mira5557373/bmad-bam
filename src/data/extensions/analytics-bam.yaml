# src/data/extensions/analytics-bam.yaml
# Pattern: WDS agent-guides (NO memories: field)

agent:
  metadata:
    extends: 'bmad-agent-analyst'
    module: 'bam'
    description: 'Tenant analytics, usage metering, and business intelligence'

menu:
  # Context loader (REQUIRED)
  - trigger: bam-analytics-context
    action: "#load-analytics-context-prompt"
    description: Load BAM analytics and metering context

  # Analytics capabilities
  - trigger: bam-design-usage-metering
    action: "#design-usage-metering-prompt"
    description: Design tenant usage metering system

  - trigger: bam-design-tenant-analytics
    action: "#design-tenant-analytics-prompt"
    description: Design tenant analytics dashboards

  - trigger: bam-design-cohort-analysis
    action: "#design-cohort-analysis-prompt"
    description: Design cohort analysis for tenant segments

  - trigger: bam-design-churn-prediction
    action: "#design-churn-prediction-prompt"
    description: Design churn prediction models

  - trigger: bam-design-health-scoring
    action: "#design-health-scoring-prompt"
    description: Design tenant health scoring system

  - trigger: bam-design-product-analytics
    action: "#design-product-analytics-prompt"
    description: Design product usage analytics

  - trigger: bam-design-revenue-analytics
    action: "#design-revenue-analytics-prompt"
    description: Design revenue and MRR analytics

  - trigger: bam-design-embedded-analytics
    action: "#design-embedded-analytics-prompt"
    description: Design embedded analytics for tenants

  # Web research
  - trigger: bam-analytics-research
    action: "#bam-analytics-research-prompt"
    description: Research current analytics best practices

prompts:
  - id: load-analytics-context-prompt
    content: |
      Read and internalize the BAM analytics guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/analytics-guide.md`

      Also load related patterns:
      - `{project-root}/_bmad/bam/data/agent-guides/bam/usage-metering.md`
      - `{project-root}/_bmad/bam/data/agent-guides/bam/customer-success-guide.md`
      - `{project-root}/_bmad/bam/data/agent-guides/bam/observability.md`

      Confirm when loaded.

  - id: design-usage-metering-prompt
    content: |
      ## Design Usage Metering System

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `usage-metering`

      Design tenant usage metering:

      1. Metering event taxonomy
      2. Collection infrastructure (event streaming)
      3. Aggregation pipelines
      4. Storage strategy (time-series DB)
      5. Query patterns for billing
      6. Real-time vs batch processing

      **Output template:** `{project-root}/_bmad/bam/data/templates/usage-metering-template.md`

  - id: design-tenant-analytics-prompt
    content: |
      ## Design Tenant Analytics Dashboards

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design analytics dashboards:

      1. Key metrics per tenant tier
      2. Dashboard layout and UX
      3. Data refresh strategies
      4. Drill-down capabilities
      5. Export and reporting
      6. Role-based access to analytics

      Reference workflow: `bmad-bam-tenant-analytics-dashboard`

  - id: design-cohort-analysis-prompt
    content: |
      ## Design Cohort Analysis

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design cohort analysis system:

      1. Cohort definition criteria
      2. Behavioral segmentation
      3. Retention analysis
      4. Feature adoption tracking
      5. Revenue cohort analysis
      6. A/B test cohorts

      Reference workflow: `bmad-bam-cohort-analysis`

  - id: design-churn-prediction-prompt
    content: |
      ## Design Churn Prediction

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design churn prediction models:

      1. Churn indicator signals
      2. ML model selection
      3. Feature engineering
      4. Prediction scoring
      5. Alert triggers
      6. Intervention workflows

      Reference workflow: `bmad-bam-churn-prediction`

  - id: design-health-scoring-prompt
    content: |
      ## Design Tenant Health Scoring

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design health scoring system:

      1. Health score dimensions
      2. Weighting methodology
      3. Score calculation frequency
      4. Trend analysis
      5. Benchmark comparisons
      6. Action triggers by score

      Reference workflow: `bmad-bam-tenant-health-monitoring`

  - id: design-product-analytics-prompt
    content: |
      ## Design Product Analytics

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design product usage analytics:

      1. Feature usage tracking
      2. User journey mapping
      3. Funnel analysis
      4. Session analytics
      5. Error tracking correlation
      6. Performance impact analysis

      Reference workflow: `bmad-bam-product-analytics-instrumentation`

  - id: design-revenue-analytics-prompt
    content: |
      ## Design Revenue Analytics

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design revenue and MRR analytics:

      1. MRR/ARR calculations
      2. Expansion/contraction tracking
      3. LTV calculations
      4. CAC analysis
      5. Revenue attribution
      6. Forecasting models

      **Output template:** `{project-root}/_bmad/bam/data/templates/revenue-analytics-template.md`

  - id: design-embedded-analytics-prompt
    content: |
      ## Design Embedded Analytics

      Prerequisites: Ensure analytics context loaded via `bam-analytics-context`

      Design embedded analytics for tenants:

      1. Embedding framework selection
      2. Tenant data isolation
      3. Custom dimension support
      4. White-label capabilities
      5. Performance optimization
      6. Self-service report builder

      **Output template:** `{project-root}/_bmad/bam/data/templates/embedded-analytics-template.md`

  - id: bam-analytics-research-prompt
    content: |
      ## Analytics Best Practices Research

      Search the web for current analytics best practices:
      - "SaaS analytics platform architecture {date}"
      - "tenant usage metering patterns {date}"
      - "embedded analytics multi-tenant {date}"
      - "churn prediction SaaS {date}"

      Synthesize findings and cite sources with `_Source: [URL]_`
