  # QUALITY GATE PROMPT
  # ============================================================
  - id: validate-gate-prompt
    content: |
      ## Run Quality Gate Validation Checklist

      Prerequisites: Ensure appropriate BAM context is loaded for the gate being validated.

      **Load gate definitions:** `{project-root}/_bmad/bam/data/quality-gates.csv`
      **Load gate guide:** `{project-root}/_bmad/bam/data/agent-guides/bam/quality-gates.md`

      ### Process

      1. **Identify Gate to Validate**
         Determine which quality gate to validate based on current workflow phase:

         | Phase | Gate ID | Gate Name | Checklist |
         |-------|---------|-----------|-----------|
         | Foundation | QG-F1 | Foundation Gate | `qg-f1-foundation.md` |
         | Module Architecture | QG-M1 | Module Architecture | `qg-m1-module-architecture.md` |
         | Tenant Isolation | QG-M2 | Tenant Isolation | `qg-m2-tenant-isolation.md` |
         | Agent Runtime | QG-M3 | Agent Runtime | `qg-m3-agent-runtime.md` |
         | Convergence | QG-I1 | Convergence | `qg-i1-convergence.md` |
         | Tenant Safety | QG-I2 | Tenant Safety | `qg-i2-tenant-safety.md` |
         | Agent Safety | QG-I3 | Agent Safety | `qg-i3-agent-safety.md` |
         | Production | QG-P1 | Production Readiness | `qg-p1-production-readiness.md` |

      2. **Load Gate Checklist**
         Load the appropriate checklist from:
         `{project-root}/_bmad/bam/data/checklists/{checklist-file}`

      3. **Execute Validation**
         For each checklist item:
         - [ ] Verify the requirement is met
         - [ ] Document evidence or artifact location
         - [ ] Flag any CRITICAL items that fail
         - [ ] Note any items that pass CONDITIONALLY

      4. **Determine Gate Outcome**
         | Outcome | Criteria | Next Action |
         |---------|----------|-------------|
         | PASS | All checks pass | Proceed to next phase |
         | CONDITIONAL | All CRITICAL pass, non-critical gaps exist | Proceed with mitigation plan |
         | FAIL | Any CRITICAL check fails | Enter recovery protocol |

      5. **Generate Gate Report**
         Document:
         - Gate ID and name
         - Validation date and validator
         - Pass/Fail/Conditional status for each item
         - Evidence references
         - Mitigation plan (if CONDITIONAL)
         - Blocking issues (if FAIL)

      ### Verification Checklist
      - [ ] Correct gate identified for current phase
      - [ ] All checklist items evaluated
      - [ ] CRITICAL items clearly marked
      - [ ] Evidence documented for each item
      - [ ] Gate outcome determined
      - [ ] Report generated with findings

      ### Output
      Produce gate validation report using template:
      `{project-root}/_bmad/bam/data/templates/gate-validation-report-template.md`

