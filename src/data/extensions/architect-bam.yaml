  # ============================================================
  # ATLAS (Platform Architect) PROMPTS
  # ============================================================
  - id: load-platform-context-prompt
    content: |
      ## Load Atlas Platform Architecture Context

      Read and internalize the BAM platform architecture guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/platform-architecture.md`

      Also load the module architecture guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/module-architecture.md`

      Load the architect-specific guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/architect-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/atlas-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/caching-strategies.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/facade-contracts.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/memory-tiers.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/run-contracts.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/rate-limiting.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/quota-management.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/tenant-routing.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/llmops.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/scaling-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/performance-isolation.md`

      Load architecture pattern guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/agent-identity-tbac-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/agent-resilience-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/api-gateway-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/context-propagation-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/ddd-module-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/event-driven-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/modular-monolith-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/module-facade-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/saga-orchestration-patterns.md`

      Load your persistent memory for prior decisions:
      `{project-root}/_bmad/_memory/architect-bam-sidecar/architecture-decisions.md`

      These guides provide context for:
      - Modular monolith principles and extraction seams
      - Module structure patterns and boundaries
      - Forbidden dependency rules
      - Tenant context propagation in modules
      - Platform-level infrastructure decisions
      - Caching strategies for multi-tenant systems
      - Facade contract design patterns
      - Memory tier architecture
      - Rate limiting and quota management
      - Tenant routing strategies
      - LLMOps best practices
      - Scaling and performance isolation patterns

      Confirm when loaded, then proceed with platform architecture tasks.

  - id: design-modules-prompt
    content: |
      ## Module Boundary Design for Multi-Tenant SaaS

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `module-boundaries`

      For each identified bounded context:

      | Module | Bounded Context | Owner | Complexity | Dependencies |
      |--------|-----------------|-------|------------|--------------|
      | ... | ... | ... | SIMPLE/STANDARD/COMPLEX | ... |

      Design considerations:
      1. Every module must accept TenantContext as first parameter
      2. Module boundaries should align with team ownership
      3. Plan extraction seams for future microservices
      4. Define facade vs internal boundaries
      5. Identify shared kernel dependencies

      Dependency rules (FORBIDDEN):
      - No direct database access across modules
      - No shared domain entities across modules
      - No circular dependencies between modules

      Output as module architecture document using:
      `{project-root}/_bmad/bam/data/templates/module-architecture-template.md`

  - id: define-facades-prompt
    content: |
      ## Facade Contract Design

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `facade-contracts`

      For each cross-module dependency:

      ```typescript
      interface {Module}Facade {
        methodName(
          ctx: TenantContext,  // Always first parameter
          input: InputDTO
        ): Promise<OutputDTO>;
      }
      ```

      Requirements:
      - TenantContext as first parameter always
      - DTOs only (no domain entities cross boundaries)
      - Semantic versioning for all contracts
      - Contract tests required for each method
      - Backwards compatibility for minor versions

      Facade classification:
      | Facade | Type | Criticality | SLA |
      |--------|------|-------------|-----|
      | ... | Query/Command/Event | High/Medium/Low | ... |

      Output using: `{project-root}/_bmad/bam/data/templates/facade-contract-template.md`

  - id: isolation-matrix-prompt
    content: |
      ## Tenant Isolation Matrix

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/tenant-models.csv`

      Load template from: `{project-root}/_bmad/bam/data/templates/tenant-isolation-matrix.md`

      Define isolation for each asset:

      | Asset Type | Strategy | Implementation | Verified |
      |------------|----------|----------------|----------|
      | Database | RLS/Schema/DB | ... | [ ] |
      | Cache | Key prefix | tenant:{id}:key | [ ] |
      | Memory | Scope tag | ... | [ ] |
      | Tools | Tier filter | ... | [ ] |
      | Jobs | Context | ... | [ ] |
      | Vectors | Filter | tenant_id field | [ ] |
      | Logs | Field | tenant_id in every log | [ ] |
      | Files | Path | /tenants/{id}/... | [ ] |
      | Sessions | Scope | ... | [ ] |
      | Queues | Partition | ... | [ ] |

      Verification requirements:
      - Each strategy must have integration test
      - Cross-tenant access attempts must be logged
      - Periodic audit of isolation boundaries

  - id: design-observability-prompt
    content: |
      ## Tenant-Aware Observability Architecture

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `observability`

      Design observability that respects tenant boundaries:

      ### Metrics Architecture
      | Metric Type | Cardinality | Labels | Retention |
      |-------------|-------------|--------|-----------|
      | Business | Per-tenant | tenant_id, tier | 90 days |
      | Technical | Per-service | service, instance | 30 days |
      | SLA | Per-tenant | tenant_id, sla_tier | 1 year |

      ### Logging Architecture
      - Structured logging with tenant_id in every log entry
      - Log aggregation with tenant-aware filtering
      - Sensitive data masking per tenant compliance requirements

      ### Tracing Architecture
      - Distributed tracing with tenant context propagation
      - Trace sampling strategies per tier
      - Cross-service correlation with tenant awareness

      ### Alerting Architecture
      - Tenant-specific alert thresholds
      - Noisy neighbor detection alerts
      - SLA breach alerts per tenant tier

      Output as observability architecture document.

  - id: design-shared-kernel-prompt
    content: |
      ## Shared Kernel Design for Cross-Cutting Concerns

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `tenant-isolation`

      Design the shared kernel that all modules depend on:

      ### Core Types (immutable)
      | Type | Purpose | Ownership |
      |------|---------|-----------|
      | TenantContext | Tenant identification | Platform team |
      | TenantId | Value object | Platform team |
      | UserId | Value object | Platform team |
      | Result<T,E> | Error handling | Platform team |
      | Money | Currency handling | Platform team |

      ### Cross-Cutting Services
      | Service | Interface | Implementation |
      |---------|-----------|----------------|
      | IEventBus | Event publishing | Infrastructure |
      | ILogger | Structured logging | Infrastructure |
      | IMetrics | Metrics emission | Infrastructure |
      | IClock | Time abstraction | Infrastructure |

      ### Shared Kernel Rules
      1. Changes require cross-team approval
      2. Backwards compatibility required
      3. No business logic (only infrastructure)
      4. Comprehensive test coverage (>95%)

      Output as shared kernel specification.

  - id: infra-architecture-prompt
    content: |
      ## Infrastructure-as-Code Architecture

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `deployment`

      Design infrastructure supporting multi-tenant architecture:

      ### Environment Strategy
      | Environment | Purpose | Tenant Model | Data |
      |-------------|---------|--------------|------|
      | Development | Local dev | Single tenant | Seeded |
      | Staging | Integration | Multi-tenant | Anonymized |
      | Production | Live | Multi-tenant | Real |

      ### Infrastructure Components
      | Component | Technology | Scaling | Tenant Awareness |
      |-----------|------------|---------|------------------|
      | Database | PostgreSQL | Vertical + Read replicas | RLS policies |
      | Cache | Redis | Cluster | Key prefixing |
      | Queue | RabbitMQ/SQS | Horizontal | Tenant partitions |
      | Storage | S3-compatible | Unlimited | Path isolation |
      | Search | Elasticsearch | Horizontal | Index filtering |

      ### IaC Organization
      ```
      infrastructure/
        modules/           # Reusable Terraform/Pulumi modules
        environments/      # Environment-specific configurations
        tenant-provisioning/  # Tenant onboarding automation
      ```

      Output as infrastructure architecture document.

  - id: platform-review-prompt
    content: |
      ## Comprehensive Platform Architecture Review

      Prerequisites: Load platform context via `bam-platform-context`

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-f1-foundation.md`

      Perform comprehensive review against QG-F1 (Foundation Gate):

      ### Module Architecture Review
      - [ ] All modules accept TenantContext
      - [ ] No forbidden dependencies
      - [ ] Extraction seams identified
      - [ ] Team ownership defined

      ### Facade Contract Review
      - [ ] All cross-module calls via facades
      - [ ] DTOs only at boundaries
      - [ ] Contract tests exist
      - [ ] Versioning strategy defined

      ### Tenant Isolation Review
      - [ ] All assets have isolation strategy
      - [ ] Isolation tests implemented
      - [ ] Cross-tenant access logged

      ### Infrastructure Review
      - [ ] IaC for all environments
      - [ ] Tenant provisioning automated
      - [ ] Scaling strategies defined

      ### Observability Review
      - [ ] Tenant-aware metrics
      - [ ] Structured logging with tenant_id
      - [ ] Distributed tracing enabled

      Generate platform architecture review report with:
      - Findings (Critical/Major/Minor)
      - Recommendations
      - Risk assessment

  # ============================================================
  # NOVA (AI Runtime Architect) PROMPTS
  # ============================================================
  - id: load-ai-runtime-context-prompt
    content: |
      ## Load Nova AI Runtime Context

      Read and internalize the BAM AI runtime guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/ai-runtime.md`

      Also load the agent runtime patterns:
      `{project-root}/_bmad/bam/data/ai-runtimes.csv`

      Load Nova-specific guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/nova-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/action-gateway-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/context-compiler-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/tool-execution.md`

      Load your persistent memory for prior decisions:
      `{project-root}/_bmad/_memory/architect-bam-sidecar/runtime-preferences.md`

      These guides provide context for:
      - Agent orchestration frameworks (LangGraph, CrewAI, AutoGen)
      - Memory tier architecture patterns
      - Tool execution frameworks
      - Run contract specifications
      - Agent safety and observability
      - Nova AI runtime architecture patterns
      - Action gateway patterns for agent tools
      - Context compiler patterns for prompt construction
      - Tool execution middleware patterns

      Confirm when loaded, then proceed with AI runtime architecture tasks.

  - id: agent-orchestration-prompt
    content: |
      ## Agent Orchestration Architecture Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/ai-runtimes.csv`

      Design agent orchestration based on selected runtime (`{ai_runtime}`):

      ### Framework Comparison
      | Aspect | LangGraph | CrewAI | AutoGen |
      |--------|-----------|--------|---------|
      | Paradigm | State machine | Role-based crews | Conversations |
      | Best for | Complex workflows | Task delegation | Multi-agent debate |
      | State mgmt | Explicit graph state | Task context | Message history |

      ### Orchestration Design
      | Agent Type | Role | Capabilities | Triggers |
      |------------|------|--------------|----------|
      | ... | ... | ... | ... |

      ### Multi-Tenant Considerations
      - Agent instances isolated per tenant
      - Tenant context passed to all tool calls
      - Resource budgets enforced per tenant tier
      - Agent state scoped to tenant

      ### Graph/Workflow Design
      - Entry points and exit conditions
      - Conditional branching logic
      - Error handling and retry strategies
      - Human-in-the-loop checkpoints

      Output as agent orchestration architecture document.

  - id: memory-tiers-prompt
    content: |
      ## Memory Tier Architecture Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `memory-tiers`

      Design multi-tier memory architecture:

      ### Memory Tier Definitions
      | Tier | Purpose | Persistence | Scope | TTL |
      |------|---------|-------------|-------|-----|
      | Working | Current task context | Session | Run | Minutes |
      | Episodic | Conversation history | Short-term | Session | Hours/Days |
      | Semantic | Knowledge/embeddings | Long-term | Tenant | Permanent |
      | Procedural | Learned behaviors | Long-term | Tenant | Permanent |

      ### Implementation Strategy
      | Tier | Storage | Retrieval | Tenant Isolation |
      |------|---------|-----------|------------------|
      | Working | In-memory | Direct | Process isolation |
      | Episodic | Redis/DynamoDB | Key lookup | Key prefix |
      | Semantic | Vector DB | Similarity search | Metadata filter |
      | Procedural | Document store | Pattern match | Collection per tenant |

      ### Memory Operations
      - Write policies (when to persist)
      - Read policies (when to retrieve)
      - Eviction policies (when to forget)
      - Summarization strategies (context compression)

      ### Cross-Tenant Boundaries
      - NO shared semantic memory between tenants
      - Procedural memory may have global templates (read-only)
      - Working memory strictly isolated

      Output as memory tier architecture document.

  - id: tool-framework-prompt
    content: |
      ## Tool Execution Framework Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `tool-execution`

      Design tool execution framework with permissions:

      ### Tool Registry
      | Tool | Category | Tier Availability | Risk Level |
      |------|----------|-------------------|------------|
      | ... | Search/Action/Query | Free/Pro/Enterprise | Low/Medium/High |

      ### Permission Model
      | Permission | Description | Enforcement |
      |------------|-------------|-------------|
      | tool:read | Read-only tools | Pre-execution check |
      | tool:write | Mutating tools | Pre-execution + audit |
      | tool:external | External API calls | Rate limit + approval |
      | tool:sensitive | PII/financial tools | MFA + audit log |

      ### Execution Framework
      - Pre-execution: Permission check, rate limit, budget check
      - Execution: Sandboxed execution, timeout enforcement
      - Post-execution: Audit logging, cost tracking, result validation

      ### Tenant-Aware Tool Binding
      - Tools receive TenantContext
      - Tool results scoped to tenant
      - Tool errors contain no cross-tenant data

      ### Rate Limiting
      | Tier | Calls/minute | Concurrent | Daily quota |
      |------|--------------|------------|-------------|
      | Free | 10 | 2 | 100 |
      | Pro | 100 | 10 | 10,000 |
      | Enterprise | 1000 | 100 | Unlimited |

      Output as tool framework specification.

  - id: run-contracts-prompt
    content: |
      ## Run Contract Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `run-contracts`

      Design run contracts for agent execution:

      ### Run Contract Structure
      ```
      RunContract {
        // Identity
        run_id: UUID
        tenant_id: TenantId
        user_id: UserId

        // Input
        input: {
          prompt: string
          context: object
          attachments: Attachment[]
        }

        // Budget
        budget: {
          max_tokens: number
          max_duration_seconds: number
          max_tool_calls: number
          max_cost_cents: number
        }

        // Output
        output: {
          result: object
          artifacts: Artifact[]
          citations: Citation[]
        }

        // State
        state: {
          checkpoints: Checkpoint[]
          current_step: string
          history: Message[]
        }
      }
      ```

      ### Budget Enforcement
      | Budget Type | Check Point | Action on Exceed |
      |-------------|-------------|------------------|
      | Tokens | Per LLM call | Graceful stop |
      | Duration | Per step | Checkpoint + resume option |
      | Tool calls | Pre-execution | Queue or reject |
      | Cost | Real-time | Pause + notify |

      ### State Management
      - Checkpoint frequency
      - State serialization format
      - Recovery from checkpoint
      - State cleanup policies

      Output as run contract specification.

  - id: agent-debugging-prompt
    content: |
      ## Agent Debugging and Observability Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `observability`

      Design debugging and observability for agent execution:

      ### Trace Structure
      | Level | Captures | Storage | Retention |
      |-------|----------|---------|-----------|
      | Run | Full execution trace | Object store | 30 days |
      | Step | Step inputs/outputs | Time-series DB | 7 days |
      | LLM | Prompts/completions | Dedicated store | Per compliance |
      | Tool | Tool calls/results | Time-series DB | 7 days |

      ### Debug Capabilities
      - Step-through execution (dev mode)
      - Replay from checkpoint
      - Input mutation testing
      - Tool mocking
      - Time travel debugging

      ### Metrics
      | Metric | Type | Labels |
      |--------|------|--------|
      | agent_run_duration | Histogram | tenant, agent_type, outcome |
      | agent_step_count | Counter | tenant, agent_type |
      | agent_token_usage | Counter | tenant, model |
      | agent_tool_calls | Counter | tenant, tool_name, outcome |
      | agent_errors | Counter | tenant, error_type |

      ### Alerting
      - Run failure rate threshold
      - Budget exhaustion warnings
      - Stuck run detection
      - Anomalous behavior detection

      Output as agent debugging specification.

  - id: agent-guardrails-prompt
    content: |
      ## Agent Safety Guardrails and Kill Switches

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `testing-agent-safety`
      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-i3-agent-safety.md`

      Design safety guardrails for agent execution:

      ### Input Guardrails
      | Guard | Purpose | Action |
      |-------|---------|--------|
      | Prompt injection detection | Prevent manipulation | Block + log |
      | PII detection | Privacy protection | Mask or reject |
      | Content policy | Harmful content | Reject + flag |
      | Size limits | Resource protection | Truncate or reject |

      ### Output Guardrails
      | Guard | Purpose | Action |
      |-------|---------|--------|
      | Content filtering | Harmful output | Filter + log |
      | PII leakage | Privacy | Mask before return |
      | Hallucination detection | Accuracy | Flag for review |
      | Cross-tenant data | Isolation | Block + alert |

      ### Kill Switches
      | Switch | Scope | Trigger | Recovery |
      |--------|-------|---------|----------|
      | Run kill | Single run | Manual/automatic | Checkpoint resume |
      | Agent kill | Agent type | Admin action | Code fix deploy |
      | Tenant kill | All tenant runs | Abuse detection | Support intervention |
      | Global kill | All runs | Critical incident | Leadership approval |

      ### Escalation Paths
      1. Automatic retry (transient errors)
      2. Automatic fallback (degraded service)
      3. Human escalation (ambiguous situations)
      4. Emergency stop (safety violations)

      Output as agent guardrails specification.

