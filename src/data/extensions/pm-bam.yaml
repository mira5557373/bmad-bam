# BAM Extension for BMM Product Manager
# Pattern: WDS agent-guides (NO memories: field)

agent:
  metadata:
    extends: 'bmad-agent-pm'
    module: 'bam'
    description: "Adds SaaS lifecycle planning capabilities"

menu:
  - trigger: bam-pm-context
    action: "#load-bam-pm-context-prompt"
    description: Load BAM product management context
  - trigger: bam-pm-plan-onboarding
    action: "#plan-onboarding-prompt"
    description: Plan tenant onboarding flow
  - trigger: bam-pm-plan-offboarding
    action: "#plan-offboarding-prompt"
    description: Plan tenant offboarding flow
  - trigger: bam-pm-tier-roadmap
    action: "#tier-roadmap-prompt"
    description: Plan tier-based feature roadmap
  - trigger: bam-gate-status
    action: "#gate-status-prompt"
    description: Track quality gate progress across workflows
  - trigger: bam-pm-research
    action: "#web-research-pm-prompt"
    description: Conduct web research for product management decisions

  - trigger: bam-customer-success-context
    action: "#load-customer-success-context-prompt"
    description: Load BAM customer success role guide for tenant retention

prompts:
  - id: load-bam-pm-context-prompt
    content: |
      ## Load BAM PM Context

      Read and internalize the SaaS lifecycle management guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/saas-lifecycle.md`

      Also load the PM-specific guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/pm-guide.md`

      This guide provides comprehensive context for managing the product lifecycle of a
      multi-tenant SaaS platform. It covers the following key areas:

      1. **Tenant Onboarding**: Strategies for self-serve and assisted onboarding flows,
         provisioning automation, and first-time user experience per tier.
      2. **Tier Management**: Product decisions around feature gating, upgrade paths,
         pricing models, and tier-specific value propositions.
      3. **Tenant Offboarding**: GDPR-compliant data retention, anonymization, and deletion
         workflows with appropriate grace periods and data export options.
      4. **Lifecycle Metrics**: Key metrics for tracking tenant health, activation rates,
         churn indicators, and upgrade conversion funnels.
      5. **Product Management Patterns**: Multi-tenant SaaS product management best practices.

      Once loaded, confirm by stating: "BAM product management context loaded. Ready to
      plan SaaS lifecycle features."

  - id: plan-onboarding-prompt
    content: |
      ## Tenant Onboarding Planning

      Prerequisites: Ensure BAM PM context loaded via `bam-pm-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-lifecycle`

      ### Objective
      Design comprehensive tenant onboarding flows that optimize for activation,
      time-to-value, and tier-appropriate experiences.

      ### Process

      1. **Signup Flow Design**
         - Design tier-appropriate entry points
         - Minimize friction for target conversion
         - Capture required data per tier

         | Step | FREE | PRO | ENTERPRISE |
         |------|------|-----|------------|
         | Entry point | Landing page CTA | Pricing page | Sales contact |
         | Auth method | Email/social | Email/social + payment | SSO negotiated |
         | Required info | Email only | Email + payment | Company details |
         | Approval | Instant | Instant | Sales qualified |
         | Time to account | < 30 seconds | < 2 minutes | 1-5 business days |

         **Conversion Optimization:**
         | Tier | Goal Metric | Target | Optimization |
         |------|-------------|--------|--------------|
         | FREE | Signup completion | > 80% | Reduce form fields |
         | PRO | Trial to paid | > 25% | Value demonstration |
         | ENTERPRISE | Demo to contract | > 40% | Solution fit |

      2. **Provisioning Flow Design**
         - Design resource allocation per tier
         - Configure isolation boundaries
         - Set up tier-specific limits

         | Resource | FREE | PRO | ENTERPRISE |
         |----------|------|-----|------------|
         | Tenant creation | Shared pool | Dedicated namespace | Isolated environment |
         | Database | Shared RLS | Shared RLS | Optional dedicated |
         | Storage quota | 1 GB | 10 GB | Custom |
         | API rate limits | 100/min | 1000/min | Custom |
         | Agent count | 1 | 5 | Unlimited |

         **Provisioning Checklist:**
         - [ ] Tenant record created with UUID
         - [ ] Default workspace created
         - [ ] Admin user assigned
         - [ ] Tier limits configured
         - [ ] Billing subscription created (Pro/Enterprise)
         - [ ] Welcome email triggered

      3. **Onboarding Experience Design**
         - Design tier-appropriate guidance
         - Define activation milestones
         - Create success metrics

         | Element | FREE | PRO | ENTERPRISE |
         |---------|------|-----|------------|
         | First experience | Interactive tutorial | Guided setup wizard | Dedicated onboarding call |
         | Support | Help docs, community | Email support, chat | Named CSM |
         | Training | Self-serve videos | Live webinars | Custom training |
         | Timeline | 5 minutes to value | 30 minutes to value | 2 weeks to rollout |

         **Activation Milestones:**
         | Milestone | FREE | PRO | ENTERPRISE |
         |-----------|------|-----|------------|
         | Account created | Day 0 | Day 0 | Day 0 |
         | First action | Day 0 | Day 0 | Week 1 |
         | Core feature used | Day 1 | Day 1 | Week 1 |
         | Team invited | N/A | Day 3 | Week 2 |
         | Integration connected | N/A | Week 1 | Week 2 |
         | Workflow automated | Week 1 | Week 1 | Week 3 |

      4. **Success Metrics and Monitoring**
         - Define onboarding success criteria
         - Set up monitoring and alerts
         - Plan intervention points

         | Metric | Target | Alert Threshold | Intervention |
         |--------|--------|-----------------|--------------|
         | Time to first action | < 5 min | > 30 min | Trigger help |
         | 7-day activation | > 60% | < 40% | Outreach email |
         | 14-day retention | > 50% | < 30% | Product feedback |
         | NPS at day 30 | > 40 | < 20 | Success call |

      ### Verification Checklist
      - [ ] Signup flow optimized for each tier
      - [ ] Provisioning automated end-to-end
      - [ ] Onboarding guidance tier-appropriate
      - [ ] Activation milestones defined and tracked
      - [ ] Success metrics instrumented
      - [ ] Intervention triggers configured
      - [ ] A/B testing planned for optimization

      ### Output
      Produce onboarding design document using template:
      `{project-root}/_bmad/bam/data/templates/onboarding-design-template.md`

  - id: plan-offboarding-prompt
    content: |
      ## Tenant Offboarding Planning

      Design a comprehensive GDPR-compliant tenant offboarding flow that protects both
      the platform and departing tenants. Consider the following workflow stages:

      1. **Request Initiation**: Capture offboarding request with reason codes, verify
         authorization (org admin only), and trigger confirmation workflows.
      2. **Grace Period**: Implement 30-day grace period with account suspension, allow
         reactivation, send reminder notifications, and freeze billing.
      3. **Data Export**: Generate complete tenant data export in portable formats,
         include all user data, agent memories, configurations, and audit logs.
      4. **Anonymization**: Scrub PII from analytics data while preserving aggregate
         metrics, maintain referential integrity in shared data structures.
      5. **Hard Deletion**: Cascade delete all tenant-specific data, purge from backups
         after retention period, generate deletion certificate for compliance.

      Document the offboarding SLA per tier: Free (7 days), Pro (14 days), Enterprise
      (custom with dedicated support). Include rollback procedures for each stage.

  - id: tier-roadmap-prompt
    content: |
      ## Tier-Based Feature Roadmap

      Plan a comprehensive feature roadmap that differentiates tiers while creating clear
      upgrade incentives. Structure the roadmap around these considerations:

      1. **Feature Categorization**: Classify features as Core (all tiers), Growth (Pro+),
         or Scale (Enterprise only). Map each feature to its tier with clear rationale.
      2. **Upgrade Triggers**: Identify natural upgrade moments - usage limits hit,
         team size growth, compliance requirements, integration needs.
      3. **Value Progression**: Ensure each tier upgrade delivers 3-5x perceived value
         increase. Document the value proposition for each upgrade path.
      4. **Pricing Alignment**: Align feature availability with pricing model - usage-based
         features should scale with metered billing, seat-based with user counts.
      5. **Sunset Planning**: Plan for feature deprecation and tier restructuring with
         grandfathering policies for existing customers.

      Create a visual roadmap showing Q1-Q4 feature releases per tier, highlighting which
      features drive upgrades and which increase retention within tier.

  - id: gate-status-prompt
    content: |
      ## Track Quality Gate Progress Across Workflows

      Prerequisites: Ensure BAM PM context loaded via `bam-pm-context`

      **Load gate definitions:** `{project-root}/_bmad/bam/data/quality-gates.csv`
      **Load gate guide:** `{project-root}/_bmad/bam/data/agent-guides/bam/quality-gates.md`

      ### Objective
      Track and report on quality gate progress across all active workflows,
      providing visibility into project health and release readiness.

      ### Process

      1. **Identify Active Workflows**
         Map current project state to BAM workflow phases:

         | Phase | Workflow | Gate Required | Status |
         |-------|----------|---------------|--------|
         | Foundation | create-master-architecture | QG-F1 | ? |
         | Module | create-module-architecture | QG-M1 | ? |
         | Isolation | tenant-model-isolation | QG-M2 | ? |
         | Runtime | agent-runtime-architecture | QG-M3 | ? |
         | Integration | convergence-verification | QG-I1, QG-I2, QG-I3 | ? |
         | Production | production-readiness | QG-P1 | ? |

      2. **Gather Gate Status**
         For each gate in the workflow chain:

         | Gate | Status | Last Validated | Blocker Count | Owner |
         |------|--------|----------------|---------------|-------|
         | QG-F1 | ? | ? | ? | ? |
         | QG-M1 | ? | ? | ? | ? |
         | QG-M2 | ? | ? | ? | ? |
         | QG-M3 | ? | ? | ? | ? |
         | QG-I1 | ? | ? | ? | ? |
         | QG-I2 | ? | ? | ? | ? |
         | QG-I3 | ? | ? | ? | ? |
         | QG-P1 | ? | ? | ? | ? |

      3. **Calculate Progress Metrics**
         | Metric | Formula | Current Value |
         |--------|---------|---------------|
         | Gates Passed | Passed / Total | ?/8 |
         | Gates Conditional | Conditional / Total | ?/8 |
         | Gates Blocked | Failed / Total | ?/8 |
         | Overall Progress | (Passed + 0.5*Conditional) / Total | ?% |

      4. **Identify Critical Path**
         Determine which gates are blocking progress:

         | Blocking Gate | Blocked Gates | Impact | Priority |
         |---------------|---------------|--------|----------|
         | ? | ? | ? | P1/P2/P3 |

      5. **Generate Status Dashboard**
         Create visual status representation:

         ```
         Gate Progress: [=====>    ] 60%

         QG-F1 [PASS]  --> QG-M1 [PASS]  --> QG-M2 [COND]
                                              |
                                         QG-M3 [PEND]
                                              |
                          QG-I1 [PEND] <------+
                              |
                          QG-I2 [PEND]
                              |
                          QG-I3 [PEND]
                              |
                          QG-P1 [PEND]
         ```

      6. **Risk and Timeline Assessment**
         | Risk Factor | Impact | Mitigation |
         |-------------|--------|------------|
         | Blocked gates | Timeline slip | Prioritize remediation |
         | Conditional passes | Technical debt | Schedule remediation sprint |
         | Missing evidence | Audit risk | Document retroactively |

      ### Verification Checklist
      - [ ] All active workflows identified
      - [ ] Gate status current (within 1 week)
      - [ ] Blockers clearly identified
      - [ ] Critical path determined
      - [ ] Progress metrics calculated
      - [ ] Risk assessment completed

      ### Output
      Produce gate status report using template:
      `{project-root}/_bmad/bam/data/templates/gate-status-dashboard-template.md`

  - id: web-research-pm-prompt
    content: |
      ## BAM Web Research - Product Management

      Conduct targeted web research for product management decisions in multi-tenant SaaS.

      **Research Focus:** {{research_topic}}

      Execute 2-3 targeted searches:
      Search the web: "{{research_topic}} product management best practices {date}"
      Search the web: "{{research_topic}} SaaS patterns {date}"
      Search the web: "{{research_topic}} multi-tenant pricing {date}"

      **Research Areas:**
      - SaaS pricing and packaging strategies
      - Tenant onboarding and activation patterns
      - Feature gating and tier differentiation
      - Product-led growth in multi-tenant platforms
      - Usage-based billing models

      Return findings with source citations: _Source: [URL]_

      **Output Format:**
      1. Key findings summary
      2. Applicable patterns for multi-tenant SaaS
      3. Recommendations with rationale
      4. Sources consulted

  - id: load-customer-success-context-prompt
    content: |
      ## Load BAM Customer Success Context

      Read and internalize the customer success role guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/customer-success-guide.md`

      This guide provides context for:
      - Managing tenant health and predicting churn risk
      - Driving adoption and expansion within tenant accounts
      - Building relationships with tenant stakeholders
      - Providing proactive outreach based on health signals
      - Aligning tenant outcomes with platform value delivery

      Confirm when loaded, then proceed with customer success tasks.
