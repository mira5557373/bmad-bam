  # ============================================================
  # CONTEXT LOADERS - Agent Guides
  # ============================================================
  - trigger: bam-ai-documentation-patterns-context
    action: "#load-ai-documentation-patterns-context-prompt"
    description: Load BAM AI documentation patterns
  - trigger: bam-ai-transparency-patterns-context
    action: "#load-ai-transparency-patterns-context-prompt"
