  - id: incident-automation-prompt
    content: |
      ## Design Automated Incident Response Workflows

      Design automated incident response workflows that enable rapid detection,
      containment, and recovery while maintaining tenant isolation.

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-security-continuous.md`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `compliance`

      ### Incident Automation Architecture

      **1. Automated Detection and Triage**

      | Event Type | Auto-Detection | Auto-Classification |
      |------------|---------------|---------------------|
      | Credential compromise | Impossible travel, failed auth spike | P2 auto-escalate |
      | Data exfiltration | Volume anomaly, sensitive data access | P1 if PII |
      | Service compromise | Behavior anomaly, IOC match | P1 auto-escalate |
      | AI agent anomaly | Tool abuse, prompt injection | P2, suspend agent |
      | Tenant isolation breach | Cross-tenant access detected | P1 immediate |

      **2. Automated Containment Playbooks**

      | Incident Type | Auto-Containment Actions |
      |--------------|-------------------------|
      | Compromised credentials | Revoke sessions, force MFA reset, notify user |
      | Malicious IP detected | Block IP, log all prior access, alert SOC |
      | Anomalous agent behavior | Suspend agent, preserve memory, alert |
      | Data leak detected | Quarantine data, revoke access, preserve evidence |
      | Vulnerability exploited | Isolate affected system, snapshot, alert |

      **3. Tenant-Aware Incident Response**

      | Tenant Tier | Notification SLA | Dedicated Contact | Custom Runbook |
      |-------------|-----------------|-------------------|----------------|
      | Free | 24 hours | No | No |
      | Pro | 4 hours | Email | No |
      | Enterprise | 1 hour | Phone + Slack | Yes |

      **4. Automated Enrichment Pipeline**

      ```
      Alert
        │
        ├── Threat Intel Lookup (IP, domain, hash)
        ├── Asset Context (owner, tier, sensitivity)
        ├── User Context (role, recent activity)
        ├── Historical Correlation (related incidents)
        └── Impact Assessment (affected tenants, data)
              │
              └── Enriched Incident → SOC/Automation
      ```

      **5. Recovery Automation**

      - [ ] Automated backup verification before restore
      - [ ] Failover automation with health checks
      - [ ] Service recovery orchestration
      - [ ] Post-recovery validation testing
      - [ ] Evidence preservation automation
      - [ ] Timeline reconstruction automation

      ### SOAR Playbook Templates

      | Playbook | Trigger | Actions |
      |----------|---------|---------|
      | Credential Compromise | Failed auth > threshold | Disable account, alert, investigate |
      | Phishing | Reported or detected | Quarantine, scan recipients, block |
      | Ransomware | IOC match or behavior | Isolate, snapshot, alert P1 |
      | AI Agent Abuse | Guardrail violation | Suspend, preserve, investigate |
      | Cross-Tenant Access | Isolation test failure | Emergency isolation, P1 escalation |

      ### Implementation Checklist

      - [ ] SOAR platform deployed
      - [ ] Detection rules integrated
      - [ ] Containment playbooks tested
      - [ ] Notification automation configured
      - [ ] Recovery automation validated
      - [ ] Tenant-specific runbooks created (Enterprise)
      - [ ] Metrics and KPIs tracked

      ### Web Research Verification

      Search the web: "SOAR playbook automation SaaS {date}"
      Search the web: "automated incident response multi-tenant {date}"
      Search the web: "AI agent incident response patterns {date}"

      **Output:** Incident Automation Playbook Library

  - id: dlp-design-prompt
    content: |
      ## Design Data Loss Prevention Controls

      Design comprehensive DLP controls for multi-tenant SaaS with AI agents,
      covering data classification, movement monitoring, and leak prevention.

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-security-continuous.md`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`

      ### DLP Architecture

      **1. Data Classification Framework**

      | Classification | Description | DLP Action | Tenant Visibility |
      |---------------|-------------|-----------|-------------------|
      | Public | No restrictions | None | All tiers |
      | Internal | Business data | Log transfers | Pro+ |
      | Confidential | Sensitive business | Approve transfers | Pro+ |
      | Restricted | PII, PHI, PCI | Block external, audit | All tiers |
      | Highly Restricted | Credentials, keys | Block all, immediate alert | All tiers |

      **2. DLP Enforcement Points**

      | Enforcement Point | Data Types | Actions |
      |------------------|------------|---------|
      | API Gateway | Request/response bodies | Scan, redact, block |
      | Email Gateway | Attachments, body | Scan, quarantine |
      | Cloud Storage | Files, metadata | Classify, restrict |
      | Database | Queries, exports | Audit, limit |
      | AI Agent | Prompts, responses | Scan, filter |
      | Code Repository | Commits, PRs | Scan, block |

      **3. AI-Specific DLP Controls**

      | Data Flow | Risk | DLP Control |
      |-----------|------|-------------|
      | Prompt input | PII in prompts | Scan and redact before processing |
      | Agent memory | Accumulated sensitive data | Periodic scanning and purging |
      | Tool outputs | External data ingestion | Classify on ingestion |
      | Model responses | Leaked training data | Output scanning |
      | Fine-tuning data | Tenant data mixing | Isolation verification |

      **4. Tenant Data Isolation DLP**

      - [ ] Cross-tenant transfer detection active
      - [ ] Tenant boundary violation alerts
      - [ ] Per-tenant data export audit
      - [ ] API response tenant validation
      - [ ] Cache content isolation verification
      - [ ] Log sanitization enforcement

      **5. DLP Policy Examples**

      | Policy | Condition | Action |
      |--------|-----------|--------|
      | Block PII egress | PII detected + external dest | Block + alert |
      | Alert bulk export | >10k records + non-admin | Alert + approve |
      | Quarantine secrets | API key/password pattern | Quarantine + alert |
      | Audit cross-tenant | Tenant A data + Tenant B context | Block + P1 alert |
      | Filter AI output | PII in agent response | Redact + log |

      ### Implementation Checklist

      - [ ] Data classification taxonomy defined
      - [ ] Classification automation deployed
      - [ ] DLP policies implemented at each enforcement point
      - [ ] AI-specific DLP controls active
      - [ ] Tenant isolation DLP verified
      - [ ] Exception workflow established
      - [ ] Metrics and reporting configured

      ### Web Research Verification

      Search the web: "DLP SaaS multi-tenant architecture {date}"
      Search the web: "AI data loss prevention LLM {date}"
      Search the web: "data classification automation {date}"

      **Output:** DLP Architecture Document with Policy Definitions

  - id: anomaly-detection-prompt
    content: |
      ## Design Runtime Anomaly Detection System

      Design a runtime anomaly detection system that identifies security
      threats through behavioral analysis across application, network, and AI layers.

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-security-continuous.md`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation`

      ### Anomaly Detection Architecture

      **1. Baseline Establishment**

      | Domain | Baseline Metrics | Collection Period |
      |--------|-----------------|-------------------|
      | API Traffic | Requests/min, response time, error rate | 30 days |
      | User Behavior | Login times, actions/session, access patterns | 30 days |
      | Network | Bytes in/out, connection count, destinations | 14 days |
      | AI Agents | Tokens/request, tool calls, response latency | 14 days |
      | Infrastructure | CPU, memory, disk I/O patterns | 7 days |

      **2. Detection Methods**

      | Method | Use Case | Implementation |
      |--------|----------|----------------|
      | Statistical | Volume, rate anomalies | Z-score, moving average |
      | ML-based | Complex patterns | Isolation forest, autoencoder |
      | Rule-based | Known bad patterns | Signature matching |
      | Graph-based | Relationship anomalies | Graph neural networks |
      | Time-series | Temporal patterns | ARIMA, Prophet |

      **3. Application Anomaly Detection**

      | Anomaly Type | Detection Signal | Response |
      |-------------|-----------------|----------|
      | API abuse | Request rate spike | Rate limit, investigate |
      | Error surge | Error rate > 3 sigma | Alert, investigate |
      | Latency spike | P95 > baseline * 2 | Alert, scale check |
      | Unusual endpoint | Rare endpoint access | Log, potential recon |
      | Payload anomaly | Size/format deviation | Block, analyze |

      **4. User Behavior Analytics (UBA)**

      | Anomaly | Detection | Risk |
      |---------|-----------|------|
      | Impossible travel | Geo + time analysis | Account compromise |
      | Off-hours access | Time-based deviation | Insider threat |
      | Privilege escalation | Permission change detection | Attack progression |
      | Data hoarding | Volume + pattern analysis | Data exfiltration |
      | Lateral movement | Cross-system access patterns | Active compromise |

      **5. AI Agent Anomaly Detection**

      | Anomaly | Detection Method | Response |
      |---------|-----------------|----------|
      | Token explosion | Usage vs baseline | Throttle, investigate |
      | Tool abuse | Unusual tool combinations | Suspend, alert |
      | Memory tampering | Memory content analysis | Isolate, investigate |
      | Prompt injection | Pattern + semantic analysis | Block, alert |
      | Output anomaly | Quality/content deviation | Review, filter |
      | Collaboration anomaly | Inter-agent traffic patterns | Isolate, investigate |

      **6. Network Anomaly Detection**

      - [ ] Traffic volume baselines established
      - [ ] Geographic access patterns monitored
      - [ ] DNS query analysis active
      - [ ] Lateral movement detection enabled
      - [ ] Encrypted traffic analysis (metadata)
      - [ ] Beaconing detection active

      ### Alert Tuning and False Positive Management

      | Alert Type | Initial Threshold | Tuning Method | Target FP Rate |
      |------------|------------------|---------------|----------------|
      | Critical | Conservative | Manual review | <5% |
      | High | Moderate | ML feedback | <15% |
      | Medium | Baseline + 2 sigma | Auto-tune | <25% |
      | Low | Baseline + 1 sigma | Aggregate | <40% |

      ### Implementation Checklist

      - [ ] Baseline collection infrastructure deployed
      - [ ] Detection algorithms selected and configured
      - [ ] Alert thresholds established
      - [ ] Response automation integrated
      - [ ] Tuning feedback loop active
      - [ ] Dashboard and reporting configured
      - [ ] AI-specific detection rules implemented

      ### Web Research Verification

      Search the web: "anomaly detection SaaS security {date}"
      Search the web: "user behavior analytics multi-tenant {date}"
      Search the web: "AI agent runtime security monitoring {date}"

      **Output:** Anomaly Detection Architecture Document

