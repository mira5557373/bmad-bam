  - id: ai-security-audit-prompt
    content: |
      ## Conduct AI System Security Audit

      Perform a comprehensive security audit of AI agent systems, including
      prompt injection defenses, model security, and output safety controls.

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-i3-agent-safety.md`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `agent-runtime`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `run-contracts`

      ### AI Security Audit Categories

      **1. Prompt Security Assessment**

      | Test Category | Test Method | Severity | Pass Criteria |
      |--------------|-------------|----------|---------------|
      | Direct Injection | Manual + automated fuzzing | Critical | 0 bypasses |
      | Indirect Injection | Document/context poisoning | Critical | 0 bypasses |
      | Jailbreak Resistance | Known jailbreak library | Critical | 0 bypasses |
      | System Prompt Extraction | Extraction attempts | High | No leakage |
      | Context Manipulation | Multi-turn attacks | High | Context isolated |

      **2. Model Security Assessment**

      | Risk | Detection Method | Mitigation |
      |------|-----------------|------------|
      | Model extraction | Query pattern analysis | Rate limiting, monitoring |
      | Data poisoning | Input validation, anomaly detection | Training data isolation |
      | Membership inference | Differential privacy testing | Output sanitization |
      | Adversarial inputs | Robustness testing | Input preprocessing |

      **3. Tool and Action Security**

      - [ ] Tool permission model documented
      - [ ] Least privilege enforced per tool
      - [ ] Tool input validation implemented
      - [ ] Tool output sanitization active
      - [ ] Dangerous tool approval workflows
      - [ ] Tool execution sandboxing verified

      **4. Output Security Assessment**

      - [ ] PII detection accuracy measured
      - [ ] Harmful content filter effectiveness
      - [ ] Hallucination detection rate
      - [ ] Source attribution verification
      - [ ] Output injection prevention

      **5. Multi-Tenant AI Isolation**

      - [ ] Agent memory tenant isolation verified
      - [ ] Fine-tuning data isolation confirmed
      - [ ] Context window tenant separation
      - [ ] Tool access tenant-scoped
      - [ ] Audit trail tenant-attributed

      ### Audit Execution Steps

      1. Review current AI security controls documentation
      2. Execute automated security test suite
      3. Perform manual penetration testing for AI-specific attacks
      4. Analyze findings and classify by severity
      5. Document remediation recommendations
      6. Create verification test plan for fixes

