  # Development Prompts
  - id: load-bam-dev-context-prompt
    content: |
      ## Load BAM Development Context

      Read and internalize the tenant isolation development guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/tenant-isolation.md`

      Also load the developer-specific guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/dev-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/qa-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/sm-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/caching-strategies.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/rate-limiting.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/quota-management.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/tenant-routing.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/local-development-setup.md`

      Load development pattern guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/api-version-routing.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/feature-toggle-patterns.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/testing-tenant-isolation.md`

      This guide provides comprehensive context for implementing tenant isolation in code.
      It covers the following key areas:

      1. **Row-Level Security (RLS)**: Patterns for implementing RLS policies in PostgreSQL,
         including policy creation, tenant context setting, and connection pooling considerations.
      2. **Tenant Context Propagation**: How to pass tenant context through all code paths
         including HTTP requests, background jobs, events, and WebSocket connections.
      3. **Cache Isolation**: Strategies for ensuring tenant data separation in caching layers
         using prefixed keys and isolated cache instances.
      4. **Memory Scope Enforcement**: Ensuring AI agent memories are scoped to the correct
         tenant boundary and cannot leak across tenant boundaries.
      5. **Local Development**: Environment setup and testing patterns for multi-tenant development.
      6. **Rate Limiting and Quota Management**: Implementation patterns for tenant-specific limits.

      Once loaded, confirm by stating: "BAM development context loaded. Ready to implement
      tenant isolation patterns."

  - id: implement-rls-prompt
    content: |
      ## Implement RLS Policies

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`

      For each table:
      ```sql
      ALTER TABLE {table} ENABLE ROW LEVEL SECURITY;
      ALTER TABLE {table} FORCE ROW LEVEL SECURITY;
      CREATE POLICY tenant_isolation ON {table}
        USING (tenant_id = current_setting('app.current_tenant')::uuid);
      ```

      Use SET LOCAL (never SET) for connection pooling.

  - id: tenant-context-prop-prompt
    content: |
      ## Tenant Context Propagation

      Prerequisites: Ensure BAM context loaded via `bam-dev-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation, tenant-context-propagation`

      ### Objective
      Implement comprehensive tenant context propagation ensuring every code path
      maintains tenant isolation without context leakage or loss.

      ### Process

      1. **HTTP Request Context**
         - Extract tenant_id from JWT claims in auth middleware
         - Set tenant context before any database operations
         - Validate tenant access permissions

         | Layer | Action | Validation |
         |-------|--------|------------|
         | Auth middleware | Extract tenant_id from JWT | Verify JWT signature |
         | Request context | Store in request-scoped context | Validate tenant exists |
         | Database | SET LOCAL app.current_tenant | Verify RLS is active |
         | Response | Clear context after response | No context leakage |

      2. **Background Job Context**
         - Include tenant_id in job payload (never rely on global state)
         - Set context at job start before any operations
         - Clear context on job completion

         | Job Type | Context Source | Propagation Pattern |
         |----------|---------------|---------------------|
         | Queued jobs | Job payload | job.data.tenant_id |
         | Scheduled jobs | Job metadata | job.metadata.tenant_id |
         | Cron jobs | Iterate tenants | for each tenant in active_tenants |
         | Retry jobs | Original payload | Preserve from original |

      3. **Event/Message Context**
         - Include tenant_id in message headers
         - Validate context on message consumption
         - Handle cross-tenant events explicitly

         | Event Type | Header | Validation |
         |------------|--------|------------|
         | Domain events | X-Tenant-ID | Must match emitter tenant |
         | Integration events | X-Source-Tenant | Validate permissions |
         | System events | No tenant | Handle as system context |
         | Cross-tenant | X-Source/X-Target | Explicit authorization |

      4. **WebSocket Connection Context**
         - Establish tenant context on connection
         - Maintain context for connection lifetime
         - Validate on each message

         | Phase | Action | Security Check |
         |-------|--------|----------------|
         | Connect | Auth and extract tenant | Verify connection allowed |
         | Message | Validate tenant matches | Reject if mismatch |
         | Broadcast | Filter by tenant | Never cross-tenant broadcast |
         | Disconnect | Clean up context | Clear all tenant state |

      5. **Service-to-Service Context**
         - Pass tenant context in service headers
         - Validate at service boundary
         - Audit cross-service calls

         | Call Type | Context Method | Audit Requirement |
         |-----------|---------------|-------------------|
         | Sync HTTP | X-Tenant-ID header | Log at both ends |
         | gRPC | Metadata field | Interceptor logging |
         | Message queue | Message header | Consumer validation |

      ### Verification Checklist
      - [ ] All entry points extract tenant context
      - [ ] Context set before any database operation
      - [ ] Background jobs include tenant in payload
      - [ ] Events include tenant in headers
      - [ ] WebSocket maintains connection-scoped context
      - [ ] Service calls propagate context
      - [ ] No global/static tenant state anywhere
      - [ ] Context cleared after request/job completion

      ### Output
      Implement context propagation following patterns in:
      `{project-root}/_bmad/bam/data/agent-guides/bam/tenant-isolation.md`

  # QA Prompts (merged from qa-bam.yaml)
  - id: load-bam-qa-context-prompt
    content: |
      ## Load BAM QA Context

      Read and internalize the tenant testing quality assurance guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/tenant-testing.md`

      This guide provides comprehensive context for QA activities focused on verifying
      tenant isolation and multi-tenant system integrity. It covers the following key areas:

      1. **Isolation Test Cases**: Comprehensive test matrices for verifying RLS policies,
         cache separation, memory scoping, and API-level tenant boundaries.
      2. **Security Testing**: Penetration testing patterns for cross-tenant access attempts,
         privilege escalation, and tenant context manipulation.
      3. **Performance Testing**: Load testing strategies to verify noisy neighbor protection,
         SLA maintenance under multi-tenant load, and resource isolation.
      4. **Regression Suites**: Critical tenant isolation tests that must pass before any
         release, including automated compliance verification.

      Once loaded, confirm by stating: "BAM QA context loaded. Ready to design tenant
      isolation test suites."

  - id: test-isolation-prompt
    content: |
      ## Tenant Isolation Test Design

      Prerequisites: Ensure BAM QA context loaded via `bam-qa-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation, testing-isolation`

      ### Objective
      Design comprehensive tenant isolation tests that verify data cannot leak
      between tenants at any layer of the system.

      ### Process

      1. **RLS (Row-Level Security) Tests**
         - Test that queries return only tenant-scoped data
         - Verify RLS policies are enforced on all tables
         - Test policy behavior with missing context

         | Test Case | Setup | Action | Expected Result |
         |-----------|-------|--------|-----------------|
         | Basic isolation | Create data for Tenant A and B | Query as Tenant B | 0 rows from Tenant A |
         | No context | Create data for Tenant A | Query without context | 0 rows or error |
         | Admin bypass | Create data for Tenant A | Query as platform admin | Configurable access |
         | Policy on INSERT | Set context to Tenant A | Insert without tenant_id | Auto-set or reject |
         | Policy on UPDATE | Data exists for Tenant A | Update as Tenant B | 0 rows affected |
         | Policy on DELETE | Data exists for Tenant A | Delete as Tenant B | 0 rows affected |

      2. **Cache Isolation Tests**
         - Verify cache keys include tenant prefix
         - Test cross-tenant cache access attempts
         - Validate cache invalidation scope

         | Test Case | Setup | Action | Expected Result |
         |-----------|-------|--------|-----------------|
         | Key isolation | Cache value for Tenant A | Get as Tenant B | Cache miss |
         | Key collision | Same logical key, different tenants | Get each tenant | Different values |
         | Invalidation scope | Invalidate Tenant A cache | Check Tenant B cache | Still valid |
         | Cache poisoning | Attempt to set Tenant A key as B | Get as Tenant A | Original or miss |

      3. **Memory/AI Agent Isolation Tests**
         - Verify agent memories scoped to tenant
         - Test cross-tenant memory access
         - Validate memory search isolation

         | Test Case | Setup | Action | Expected Result |
         |-----------|-------|--------|-----------------|
         | Memory read | Store memory for Tenant A | Read as Tenant B | Null/empty |
         | Memory search | Memories for A and B | Search as Tenant A | Only A results |
         | Agent context | Agent with A memories | Run as Tenant B | No A memories |
         | Memory deletion | Delete Tenant A memories | Check Tenant B | Unaffected |

      4. **API Boundary Tests**
         - Test tenant validation on all endpoints
         - Verify error responses for cross-tenant attempts
         - Test authorization boundaries

         | Test Case | Setup | Action | Expected Result |
         |-----------|-------|--------|-----------------|
         | Resource access | Resource owned by Tenant A | Access as Tenant B | 404 or 403 |
         | ID enumeration | Know Tenant A resource ID | Request as Tenant B | Not found (not 403) |
         | Bulk operations | Mixed tenant IDs in request | Process | Only own tenant IDs |
         | Admin endpoints | Tenant A admin | Access Tenant B admin | Forbidden |

      5. **Background Job Isolation Tests**
         - Verify jobs process only their tenant data
         - Test job context preservation
         - Validate error handling maintains isolation

         | Test Case | Setup | Action | Expected Result |
         |-----------|-------|--------|-----------------|
         | Job scope | Queue job for Tenant A | Execute | Only A data processed |
         | Context loss | Job fails mid-execution | Retry | Context restored |
         | Batch jobs | Jobs for A and B queued | Execute | Isolated processing |

      ### Verification Checklist
      - [ ] All RLS policies tested for SELECT, INSERT, UPDATE, DELETE
      - [ ] Cache isolation verified with key prefix validation
      - [ ] AI agent memory isolation confirmed
      - [ ] API endpoints return appropriate errors for cross-tenant
      - [ ] Background jobs maintain tenant context
      - [ ] No information leakage in error messages
      - [ ] Audit logs capture all cross-tenant attempt denials

      ### Output
      Produce test suite covering all isolation dimensions using template:
      `{project-root}/_bmad/bam/data/templates/isolation-test-template.md`

  - id: noisy-neighbor-tests-prompt
    content: |
      ## Noisy Neighbor Tests

      Design comprehensive tests to verify that high-activity tenants cannot degrade the
      experience of other tenants on the platform. Follow this testing methodology:

      1. **Baseline Establishment**: Measure Tenant B latency percentiles (p50, p95, p99)
         under normal conditions to establish SLA baseline metrics.
      2. **Load Generation**: Simulate heavy load on Tenant A including high API request
         rates, large data operations, intensive AI agent workloads, and memory-heavy queries.
      3. **Concurrent Measurement**: While Tenant A is under load, continuously measure
         Tenant B response times, error rates, and throughput across all endpoints.
      4. **SLA Verification**: Compare Tenant B metrics against baseline and contracted SLA.
         Flag any degradation beyond acceptable thresholds (e.g., >10% latency increase).
      5. **Resource Audit**: Verify resource isolation mechanisms are working - check CPU
         quotas, memory limits, connection pool isolation, and queue prioritization.
      6. **Tier-Specific Testing**: Test noisy neighbor scenarios within same tier and
         across tiers to verify Enterprise tenants are protected from Free tier load.

      Document findings with clear metrics and recommendations for isolation improvements.

  # SM Prompts (merged from sm-bam.yaml)
  - id: load-bam-sm-context-prompt
    content: |
      ## Load BAM SM Context

      Read and internalize the SaaS lifecycle management guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/saas-lifecycle.md`

      This guide provides comprehensive context for agile planning in a multi-tenant SaaS
      environment. It covers the following key areas:

      1. **Tenant-Aware Story Writing**: How to write user stories that include tenant
         context requirements, isolation acceptance criteria, and tier-specific behavior.
      2. **Sprint Planning for Multi-Tenant**: Balancing feature work across tiers,
         prioritizing isolation and security stories, and managing tier-specific backlogs.
      3. **Release Coordination**: Coordinating releases that affect multiple tenants,
         feature flag management, and gradual rollout strategies per tier.
      4. **Incident Response Integration**: Incorporating tenant-specific incident handling
         into sprint capacity, including isolation breach response procedures.

      Once loaded, confirm by stating: "BAM scrum master context loaded. Ready to plan
      tenant-aware sprints."

  - id: sprint-tenant-stories-prompt
    content: |
      ## Tenant-Aware Sprint Planning

      Prerequisites: Ensure BAM SM context loaded via `bam-sm-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-lifecycle`

      ### Objective
      Plan sprints with explicit tenant isolation considerations, ensuring all
      stories include multi-tenant requirements and acceptance criteria.

      ### Process

      1. **Story Tenant Context Requirements**
         - Add tenant context section to every story
         - Specify context propagation requirements
         - Define tenant scope boundaries

         | Story Element | Tenant Requirement | Example |
         |---------------|-------------------|---------|
         | User story | Include tenant actor | As a [tenant] user... |
         | Context needs | Specify propagation | Requires tenant_id in job payload |
         | Data scope | Define boundaries | Only access tenant-owned resources |
         | Edge cases | Cross-tenant scenarios | Handle shared resources |

         **Story Template Addition:**
         ```
         ## Tenant Context
         - Tenant context source: [JWT/job payload/event header]
         - Data scope: [tenant-only/org-wide/workspace]
         - Cross-tenant: [none/read-only/bidirectional]
         ```

      2. **Isolation Verification Acceptance Criteria**
         - Every data story needs isolation criteria
         - Define negative test cases explicitly
         - Include RLS verification

         | Criteria Type | Format | Example |
         |---------------|--------|---------|
         | Data isolation | GIVEN tenant context, THEN only tenant data | Given Tenant A context, query returns 0 Tenant B records |
         | Cache isolation | GIVEN cached data, THEN tenant-scoped | Given Tenant A cache, Tenant B gets cache miss |
         | API isolation | GIVEN cross-tenant request, THEN rejected | Given Tenant B token, Tenant A resource returns 404 |
         | Error handling | GIVEN isolation failure, THEN safe fallback | Given RLS bypass attempt, connection terminated |

         **Acceptance Criteria Template:**
         ```
         ## Isolation Acceptance Criteria
         - [ ] Query with Tenant B context returns 0 Tenant A rows
         - [ ] Cache key includes tenant_id prefix
         - [ ] API returns 404 (not 403) for cross-tenant access
         - [ ] Audit log captures isolation verification
         ```

      3. **Tier-Specific Behavior Testing**
         - Define behavior differences per tier
         - Include tier upgrade/downgrade scenarios
         - Test feature gates

         | Tier Scenario | Test Requirement | Story Impact |
         |--------------|------------------|--------------|
         | Feature gating | Test locked feature response | Add tier check acceptance |
         | Usage limits | Test limit enforcement | Add limit check acceptance |
         | Upgrade flow | Test feature unlock | Add upgrade story |
         | Downgrade | Test feature lock | Add downgrade graceful handling |

         **Tier Testing Criteria:**
         ```
         ## Tier Behavior
         - Free: [feature locked/limited to X]
         - Pro: [feature enabled/limit is Y]
         - Enterprise: [feature enabled/unlimited]
         - Upgrade: [immediate access/requires migration]
         ```

      4. **Cross-Tenant Scenario Handling**
         - Identify legitimate cross-tenant interactions
         - Define security boundaries
         - Document authorization requirements

         | Scenario | Handling | Security Requirement |
         |----------|----------|---------------------|
         | Marketplace items | Public read, author-only write | Author tenant_id preserved |
         | Shared templates | Copy to tenant, not reference | Full data isolation |
         | Platform features | System context, not tenant | Explicit admin authorization |
         | Aggregate analytics | Anonymized only | K-anonymity verified |

      ### Sprint Planning Checklist
      - [ ] Every story has tenant context section
      - [ ] Data stories have isolation acceptance criteria
      - [ ] Feature stories have tier behavior defined
      - [ ] Cross-tenant scenarios explicitly handled
      - [ ] Capacity includes isolation testing time
      - [ ] QA stories include multi-tenant test scenarios

      ### Output
      Produce sprint backlog with tenant-aware stories using template:
      `{project-root}/_bmad/bam/data/templates/tenant-story-template.md`

  - id: gate-report-prompt
    content: |
      ## Generate Gate Validation Report

      Prerequisites: Ensure BAM dev context loaded via `bam-dev-context`

      **Load gate definitions:** `{project-root}/_bmad/bam/data/quality-gates.csv`
      **Load gate guide:** `{project-root}/_bmad/bam/data/agent-guides/bam/quality-gates.md`

      ### Objective
      Generate a comprehensive gate validation report documenting the current state
      of quality gate compliance for development artifacts.

      ### Process

      1. **Gather Gate Evidence**
         Collect evidence for gate validation from development artifacts:

         | Evidence Type | Source | Gate Relevance |
         |---------------|--------|----------------|
         | Test coverage | Coverage reports | QG-M2, QG-I2 |
         | Isolation tests | Test results | QG-M2, QG-I2 |
         | Code review | PR approvals | QG-M1, QG-M2 |
         | Security scan | SAST/DAST results | QG-I2, QG-I3 |
         | Performance tests | Load test results | QG-P1 |

      2. **Evaluate Gate Criteria**
         For each development-relevant gate:

         **QG-M2 (Tenant Isolation):**
         - [ ] RLS policies implemented and tested
         - [ ] Cache isolation verified
         - [ ] Memory scope enforcement tested
         - [ ] API boundary tests passing

         **QG-I2 (Tenant Safety):**
         - [ ] Cross-tenant access tests passing
         - [ ] Data leakage tests passing
         - [ ] Error messages sanitized
         - [ ] Audit logging implemented

         **QG-I3 (Agent Safety):**
         - [ ] Input guardrails tested
         - [ ] Output guardrails tested
         - [ ] Kill switches functional
         - [ ] Budget enforcement tested

      3. **Document Findings**
         For each gate criterion:
         - Status: PASS / FAIL / CONDITIONAL / NOT_APPLICABLE
         - Evidence: Link to test result, report, or artifact
         - Notes: Any relevant context or caveats

      4. **Generate Report Sections**

         | Section | Contents |
         |---------|----------|
         | Executive Summary | Overall status, critical findings |
         | Gate-by-Gate Status | Detailed status per gate |
         | Evidence Matrix | Links to all supporting evidence |
         | Risk Assessment | Identified risks and mitigations |
         | Recommendations | Actions needed for PASS status |

      5. **Calculate Readiness Score**
         | Score Range | Interpretation |
         |-------------|----------------|
         | 90-100% | Ready for next phase |
         | 70-89% | Conditional pass, minor gaps |
         | 50-69% | Significant gaps, remediation needed |
         | <50% | Not ready, major issues |

      ### Verification Checklist
      - [ ] All relevant gates identified
      - [ ] Evidence collected for each criterion
      - [ ] Status determined for each item
      - [ ] Risk assessment completed
      - [ ] Recommendations actionable
      - [ ] Report formatted and complete

      ### Output
      Produce gate validation report using template:
      `{project-root}/_bmad/bam/data/templates/dev-gate-report-template.md`

