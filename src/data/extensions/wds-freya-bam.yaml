      ## BAM Web Research - Tier-Based UX

      Research current best practices for tier-based UX.

      **Research Focus:** {{research_topic}}

      Search the web: "{{research_topic}} tier-based UX patterns {date}"
      Search the web: "{{research_topic}} enterprise SaaS {date}"

      Return findings with: _Source: [URL]_
