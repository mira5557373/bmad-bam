      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-lifecycle, customization`

      ### Objective
      Calculate comprehensive ROI and Total Cost of Ownership (TCO) for
      multi-tenant SaaS platform adoption across different tenant segments.

      ### Process

      1. **Cost Baseline Establishment**
         - Document current state costs (infrastructure, licensing, labor)
         - Map hidden costs (integration, maintenance, opportunity cost)
         - Quantify inefficiency costs (manual processes, errors, delays)

      2. **Multi-Tenant Value Quantification**
         - Calculate shared infrastructure savings
         - Estimate AI capability value per tier
         - Model scale economics benefits

      3. **ROI Model Development**
         | Component | Calculation Method | Data Sources |
         |-----------|-------------------|--------------|
         | Time savings | Hours saved x hourly rate | Usage analytics |
         | Cost reduction | Before vs after spend | Financial data |
         | Revenue impact | New capability revenue | Sales data |
         | Risk reduction | Incident cost avoidance | Security metrics |

      4. **TCO Comparison Framework**
         | Cost Category | Single-Tenant | Multi-Tenant | Savings |
         |---------------|---------------|--------------|---------|
         | Infrastructure | Dedicated cost | Shared cost | % reduction |
         | Maintenance | Per-instance | Amortized | % reduction |
         | Upgrades | Manual cycles | Continuous | % reduction |
         | Compliance | Per-customer | Shared cert | % reduction |

      ### Verification Checklist
      - [ ] All cost categories captured
      - [ ] ROI assumptions documented
      - [ ] Sensitivity analysis completed
      - [ ] Payback period calculated

      ### Output
      Produce ROI analysis using template:
      `{project-root}/_bmad/bam/data/templates/roi-analysis-template.md`
  - id: pricing-strategy-prompt
    content: |
      ## Tier-Based Pricing Strategy

      Prerequisites: Ensure BAM context loaded via `bam-value-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, tenant-lifecycle`

      ### Objective
      Design pricing strategy that captures fair value while enabling
      customer growth and tier progression in multi-tenant SaaS.

      ### Process

      1. **Value-to-Price Mapping**
         - Identify key value drivers per segment
         - Map feature value to willingness-to-pay
         - Design price anchors that justify tier gaps

      2. **Pricing Model Selection**
         | Model | Best For | Multi-Tenant Consideration |
         |-------|----------|---------------------------|
         | Seat-based | Team tools | Easy to understand |
         | Usage-based | Variable workloads | Aligns with value |
         | Hybrid | Complex platforms | Captures expansion |
         | Outcome-based | High-value AI | Shares risk/reward |

      3. **Tier Architecture**
         | Tier | Price Position | Value Anchor |
         |------|---------------|--------------|
         | FREE | $0 | Acquisition, viral growth |
         | PRO | $X/user | Power user value |
         | ENTERPRISE | Custom | Scale + compliance |

      4. **Price Optimization**
         - A/B test price points within tiers
         - Monitor upgrade conversion rates
         - Track price sensitivity by segment

      ### Verification Checklist
      - [ ] Pricing aligned with value delivery
      - [ ] Tier gaps justified by features
      - [ ] Competitive positioning validated
      - [ ] Expansion revenue modeled

      ### Output
      Produce pricing strategy using template:
      `{project-root}/_bmad/bam/data/templates/pricing-strategy-template.md`
