  - id: saas-disruption-prompt
    content: |
      ## SaaS Disruption Opportunities

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation, tenant-lifecycle`

      ### Objective
      Identify and evaluate disruption opportunities in the multi-tenant SaaS market,
      focusing on architectural and business model innovations that create sustainable
      competitive advantages.

      ### Process

      1. **AI-First vs Bolt-On AI Analysis**
         - Evaluate current market positioning on AI integration spectrum
         - Identify opportunities for AI-native architecture advantages
         - Map competitor weaknesses in AI integration depth

         | Approach | Characteristics | Disruption Opportunity |
         |----------|----------------|----------------------|
         | Bolt-on AI | AI added to existing product | Limited by legacy architecture |
         | AI-assisted | AI enhances existing workflows | Incremental improvement only |
         | AI-first | Product built around AI capabilities | Deep workflow transformation |
         | AI-native | AI is the product, not a feature | Requires full reimagining |

         **Assessment Questions:**
         - Can competitors easily replicate our AI integration depth?
         - Does our tenant isolation enable AI advantages others cannot match?
         - Are we capturing AI training value from multi-tenant scale?

      2. **Tenant Data Network Effects Evaluation**
         - Map data accumulation advantages from multi-tenancy
         - Identify privacy-preserving aggregate intelligence opportunities
         - Design defensible data moats

         | Data Advantage | How Multi-Tenancy Enables | Competitor Barrier |
         |----------------|--------------------------|-------------------|
         | Aggregate patterns | See patterns across thousands of tenants | Single-tenant sees only their data |
         | Benchmark data | Cross-industry performance baselines | Requires broad tenant base |
         | AI model improvement | Training data from diverse use cases | Cold start problem for new entrants |
         | Best practice mining | Identify what top performers do differently | Needs tenant diversity |

      3. **Platform vs Point Solution Positioning**
         - Evaluate market readiness for platform consolidation
         - Identify integration complexity pain points
         - Map platform expansion opportunities

         | Market Signal | Point Solution Response | Platform Response |
         |--------------|------------------------|-------------------|
         | Tool fatigue | Better single tool | Unified experience |
         | Integration costs | Pre-built connectors | Native integration |
         | Data silos | Export features | Single source of truth |
         | Vendor management | Competitive pricing | Fewer vendors to manage |

      4. **Pricing Model Innovation**
         - Analyze usage-based vs seat-based trade-offs
         - Design hybrid pricing that captures value and enables growth
         - Model revenue predictability vs growth potential

         | Model | Best For | Disruption Play |
         |-------|----------|-----------------|
         | Seat-based | Predictable, team-focused | Undercut with usage-based for small teams |
         | Usage-based | Variable workloads, PLG | Better value alignment, lower barrier |
         | Hybrid | Complex value delivery | Capture both expansion and predictability |
         | Outcome-based | High-value AI results | Share in value created |

      ### Verification Checklist
      - [ ] Market position mapped against disruption vectors
      - [ ] Technical architecture requirements identified for each opportunity
      - [ ] Competitive response scenarios evaluated
      - [ ] Resource requirements estimated
      - [ ] Time-to-market analyzed for each disruption path

      ### Output
      Produce disruption analysis document with prioritized opportunities matrix,
      required architectural capabilities, and recommended strategic sequence.
  - id: tier-innovation-prompt
    content: |
      ## Tier Differentiation Innovation

      Prerequisites: Ensure BAM context loaded via `bam-cis-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation, tenant-lifecycle`

      ### Objective
      Innovate on tier differentiation strategies to maximize conversion rates,
      minimize churn, and create clear value progression that justifies pricing gaps.

      ### Process

      1. **FREE Tier: Acquisition Funnel Optimization**
         - Design for viral potential and word-of-mouth
         - Balance value demonstration with upgrade motivation
         - Identify natural friction points that drive conversion

         | Strategy | Implementation | Conversion Trigger |
         |----------|---------------|-------------------|
         | Time-limited full access | 14-day Pro trial on signup | Fear of losing features |
         | Usage ceiling approach | Generous limits then hard stop | Workflow dependency |
         | Feature preview | Show locked features in UI | Awareness of what is missing |
         | Community proof | Show Pro/Enterprise success stories | Social proof |
         | Watermark/branding | Platform branding on outputs | Professional appearance need |

         **Innovation Questions:**
         - What free feature creates the most upgrade pressure?
         - How do we make sharing/inviting valuable without Pro?
         - What is the optimal free-to-paid conversion timeline?

      2. **PRO Tier: Power User Feature Discovery**
         - Design progressive feature revelation
         - Create aha moments that justify the price
         - Build features that increase with usage

         | Feature Category | Discovery Mechanism | Value Realization |
         |-----------------|--------------------|--------------------|
         | Automation | Suggest automation after repeated tasks | Time savings visible |
         | Integrations | Show integration value when data entry required | Reduced manual work |
         | Advanced AI | Offer AI upgrade during complex tasks | Quality improvement |
         | Team features | Prompt sharing when collaboration detected | Network effect |
         | Analytics | Surface insights from accumulated data | Decision improvement |

         **Innovation Questions:**
         - What Pro features become more valuable over time?
         - How do we create switching costs without lock-in perception?
         - What power user workflows do not exist yet?

      3. **ENTERPRISE Tier: Compliance + Integration Depth**
         - Design for IT/procurement requirements
         - Create administrative control surfaces
         - Build audit and compliance tooling

         | Enterprise Need | Feature Response | Technical Requirement |
         |-----------------|-----------------|----------------------|
         | SSO requirement | SAML/OIDC support | Identity provider integration |
         | Data residency | Region selection | Multi-region infrastructure |
         | Audit trail | Complete activity logging | Immutable audit storage |
         | Custom contracts | SLA customization | Legal/billing flexibility |
         | Dedicated support | Named CSM, priority queue | Support tier isolation |
         | Security review | SOC2, penetration test reports | Compliance documentation |

         **Innovation Questions:**
         - What enterprise controls are not table stakes yet?
         - How do we make enterprise features invisible to end users?
         - What compliance requirements are emerging?

      4. **Cross-Tier Innovation Opportunities**
         - Identify features that could move between tiers
         - Design tier-exclusive time-limited features
         - Create tier loyalty rewards

         | Innovation Type | Example | Impact |
         |-----------------|---------|--------|
         | Tier preview | Enterprise feature beta for Pro | Upgrade pipeline |
         | Loyalty upgrade | Long-term free users get Pro feature | Retention |
         | Reverse trial | Downgrade grace period with Pro features | Churn reduction |
         | Usage milestone | Unlock feature at usage threshold | Engagement reward |

      ### Verification Checklist
      - [ ] Each tier has 3+ unique value propositions
      - [ ] Upgrade path from each tier is clear
      - [ ] Downgrade friction is ethical but effective
      - [ ] Enterprise features do not complicate Pro UX
      - [ ] Free tier is genuinely valuable standalone

      ### Output
      Produce tier innovation roadmap with prioritized feature experiments,
      expected conversion impact, and implementation complexity estimates.
