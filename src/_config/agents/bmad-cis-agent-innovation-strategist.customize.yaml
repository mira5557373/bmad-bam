  - id: monetization-model-prompt
    content: |
      ## AI-Native SaaS Monetization Models

      Prerequisites: Ensure BAM context loaded via `bam-value-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation`

      ### Objective
      Design monetization models that capture value from AI capabilities
      while enabling sustainable growth in multi-tenant platforms.

      ### Process

      1. **AI Value Capture Models**
         | Model | Description | Best For |
         |-------|-------------|----------|
         | Token/credit | Pay per AI usage | Variable workloads |
         | Outcome-based | Pay for results | High-value AI |
         | Bundled | AI included in tier | Predictable usage |
         | Add-on | AI as premium feature | Upsell opportunity |

      2. **Multi-Tenant AI Economics**
         - Calculate per-tenant AI cost
         - Model shared model efficiency gains
         - Design tier-appropriate AI limits

      3. **Revenue Stream Design**
         | Revenue Type | Mechanism | Growth Driver |
         |--------------|-----------|---------------|
         | Subscription | Monthly/annual fee | User expansion |
         | Usage | Per-action pricing | Activity growth |
         | Platform | Marketplace fees | Ecosystem growth |
         | Data | Anonymized insights | Network effects |

      4. **Monetization Optimization**
         - Test pricing models with segments
         - Monitor cannibalization risk
         - Balance growth vs revenue

      ### Verification Checklist
      - [ ] AI costs accurately modeled
      - [ ] Value capture aligned with delivery
      - [ ] Multiple revenue streams identified
      - [ ] Sustainable unit economics verified

      ### Output
      Produce monetization model using template:
      `{project-root}/_bmad/bam/data/templates/monetization-model-template.md`
