prompts:
  - id: load-bam-disruption-context-prompt
    content: |
      ## Load BAM Disruption Context

      Read and internalize the multi-tenant SaaS disruption guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/saas-innovation.md`

      Also load the disruption-specific guides:
      `{project-root}/_bmad/bam/data/agent-guides/bam/innovation-guide.md`
      `{project-root}/_bmad/bam/data/agent-guides/bam/market-analysis.md`

      This guide provides comprehensive context for disruption analysis in
      multi-tenant AI platforms. It covers the following key areas:

      1. **Market Disruption Vectors**: Identifying technology shifts that enable
         new entrants or transform competitive dynamics in SaaS.
      2. **Architectural Disruption**: How multi-tenant architectures create or
         prevent disruption opportunities through scale economics.
      3. **Business Model Disruption**: Pricing, packaging, and go-to-market
         innovations that change competitive dynamics.
      4. **AI-Native Disruption**: Opportunities from AI-first architectures vs
         bolt-on AI approaches in existing markets.

      Apply this disruption lens to all strategic analysis. Once loaded, confirm
      by stating: "BAM disruption context loaded. Ready to analyze disruption vectors."
  - id: disruption-analysis-prompt
    content: |
      ## Disruption Vector Analysis

      Prerequisites: Ensure BAM context loaded via `bam-disruption-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation`

      ### Objective
      Identify and evaluate disruption vectors affecting multi-tenant SaaS platforms,
      with focus on architectural and AI-driven disruption opportunities.

      ### Process

      1. **Technology Disruption Vectors**
         - Identify emerging technologies that change platform economics
         - Map technology adoption curves relevant to multi-tenant SaaS
         - Assess build vs buy shifts

      2. **Architecture Disruption Analysis**
         - Evaluate how multi-tenant scale creates defensive moats
         - Identify architectural decisions that create or prevent disruption
         - Assess technical debt as disruption vulnerability

      3. **Business Model Disruption**
         - Map pricing model innovations in adjacent markets
         - Identify freemium patterns that are working
         - Analyze PLG vs sales-led disruption dynamics

      ### Verification Checklist
      - [ ] Technology vectors mapped with timeline estimates
      - [ ] Architectural vulnerabilities identified
      - [ ] Business model alternatives evaluated
      - [ ] Response strategies outlined for each vector

      ### Output
      Produce disruption analysis using template:
      `{project-root}/_bmad/bam/data/templates/disruption-analysis-template.md`
  - id: web-research-disruption-prompt
    content: |
      ## BAM Web Research - Disruption

      Research current best practices for disruption.

      **Research Focus:** {{research_topic}}

      Search the web: "{{research_topic}} disruption patterns {date}"
      Search the web: "{{research_topic}} enterprise SaaS {date}"

      Return findings with: _Source: [URL]_
  - id: cis-disruption-competitive-analysis-prompt
    content: |
      ## Competitive Landscape Analysis

      Prerequisites: Ensure BAM context loaded via `bam-disruption-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, tenant-lifecycle`

      ### Objective
      Analyze competitive landscape to identify disruption opportunities
      and defensive positions in multi-tenant SaaS markets.

      ### Process

      1. **Competitor Mapping**
         | Competitor | Market Position | Architecture | Weakness |
         |------------|----------------|--------------|----------|
         | Direct | Same segment | Single/Multi | Identified gap |
         | Adjacent | Related segment | Varies | Entry barrier |
         | Emerging | New entrant | AI-native | Speed/agility |

      2. **Competitive Advantage Analysis**
         - Map sustainable competitive advantages
         - Identify temporary vs durable moats
         - Assess multi-tenant scale benefits

      3. **Disruption Opportunity Matrix**
         | Opportunity | Competitor Gap | Our Advantage | Effort |
         |-------------|---------------|---------------|--------|
         | Feature gap | Missing capability | Can build | Medium |
         | Price disruption | Over-priced | Lower cost | Low |
         | Experience gap | Poor UX | Design strength | Medium |
         | Integration gap | Closed system | Open platform | High |

      4. **Competitive Response Scenarios**
         - Model competitor reactions to our moves
         - Plan counter-responses
         - Build sustainable differentiation

      ### Verification Checklist
      - [ ] All major competitors mapped
      - [ ] Competitive advantages identified
      - [ ] Disruption opportunities prioritized
      - [ ] Response scenarios documented

      ### Output
      Produce competitive analysis using template:
      `{project-root}/_bmad/bam/data/templates/competitive-analysis-template.md`
  - id: innovation-opportunities-prompt
    content: |
      ## Innovation Opportunities Analysis

      Prerequisites: Ensure BAM context loaded via `bam-disruption-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `experimentation, customization`

      ### Objective
      Identify and prioritize innovation opportunities that leverage
      multi-tenant architecture for market disruption.

      ### Process

      1. **Innovation Opportunity Categories**
         | Category | Description | Multi-Tenant Advantage |
         |----------|-------------|----------------------|
         | Product | New features/capabilities | Shared R&D investment |
         | Business model | New revenue approaches | Scale economics |
         | Experience | UX innovations | Cross-tenant learning |
         | Platform | Ecosystem innovations | Network effects |

      2. **Opportunity Discovery**
         - Analyze customer pain points across tiers
         - Identify unmet needs in market
         - Map technology trends to opportunities

      3. **Opportunity Evaluation**
         | Opportunity | Impact | Feasibility | Timeline | Priority |
         |-------------|--------|-------------|----------|----------|
         | {Name} | H/M/L | H/M/L | Quarters | Score |

      4. **Innovation Pipeline Design**
         - Stage opportunities by readiness
         - Allocate resources by priority
         - Plan validation experiments

      ### Verification Checklist
      - [ ] Multiple opportunity categories explored
      - [ ] Opportunities evaluated objectively
      - [ ] Multi-tenant advantages leveraged
      - [ ] Pipeline prioritized

      ### Output
      Produce innovation opportunities using template:
      `{project-root}/_bmad/bam/data/templates/innovation-opportunities-template.md`
  - id: threat-assessment-prompt
    content: |
      ## Disruption Threat Assessment

      Prerequisites: Ensure BAM context loaded via `bam-disruption-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation, tenant-lifecycle`

      ### Objective
      Assess disruption threats to existing market position and
      design early warning systems for competitive intelligence.

      ### Process

      1. **Threat Source Identification**
         | Source | Threat Type | Likelihood | Impact |
         |--------|-------------|------------|--------|
         | New entrants | AI-native competitors | High | High |
         | Big tech | Platform expansion | Medium | Critical |
         | Open source | Free alternatives | Medium | Medium |
         | Adjacent | Category expansion | Medium | High |

      2. **Vulnerability Analysis**
         - Identify architectural weaknesses
         - Map customer switching triggers
         - Assess price sensitivity by segment

      3. **Early Warning Indicators**
         | Signal | Source | Response Threshold |
         |--------|--------|-------------------|
         | Competitor funding | News/Crunchbase | Series B+ |
         | Feature launches | Product Hunt | Core feature |
         | Pricing changes | Market monitoring | >20% reduction |
         | Talent movement | LinkedIn | Key hires |

      4. **Defensive Strategies**
         - Build switching cost barriers
         - Strengthen network effects
         - Accelerate innovation velocity

      ### Verification Checklist
      - [ ] Major threats identified
      - [ ] Vulnerabilities assessed honestly
      - [ ] Early warning system designed
      - [ ] Defensive strategies planned

      ### Output
      Produce threat assessment using template:
      `{project-root}/_bmad/bam/data/templates/threat-assessment-template.md`
  - id: disruption-response-prompt
    content: |
      ## Disruption Response Strategy

      Prerequisites: Ensure BAM context loaded via `bam-disruption-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `customization, experimentation`

      ### Objective
      Design response strategies for market disruption events,
      balancing defense of existing position with offensive moves.

      ### Process

      1. **Response Framework**
         | Disruption Type | Immediate Response | Strategic Response |
         |-----------------|-------------------|-------------------|
         | Price disruption | Value messaging | Cost innovation |
         | Feature disruption | Roadmap acceleration | Differentiation |
         | Platform disruption | Integration response | Platform expansion |
         | AI disruption | AI capability sprint | AI-native redesign |

      2. **Response Option Analysis**
         - Ignore: When disruption is non-threatening
         - Counter: Match or exceed competitive move
         - Leapfrog: Jump ahead with innovation
         - Pivot: Reposition to avoid direct competition

      3. **Resource Mobilization**
         | Response Level | Resources | Timeline | Decision Maker |
         |----------------|-----------|----------|----------------|
         | Tactical | Existing team | Days-weeks | Product lead |
         | Strategic | Cross-functional | Months | Executive team |
         | Transformational | Full company | Quarters | CEO/Board |

      4. **Response Playbooks**
         - Pre-plan responses for likely scenarios
         - Document decision criteria
         - Define escalation paths

      ### Verification Checklist
      - [ ] Response options evaluated
      - [ ] Resources identified
      - [ ] Decision criteria clear
      - [ ] Playbooks documented

      ### Output
      Produce response strategy using template:
      `{project-root}/_bmad/bam/data/templates/disruption-response-template.md`
  - id: ai-native-disruption-prompt
    content: |
      ## AI-Native Disruption Potential

      Prerequisites: Ensure BAM context loaded via `bam-disruption-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `experimentation, tenant-isolation`

      ### Objective
      Evaluate opportunities for AI-native disruption in multi-tenant
      SaaS markets and design AI-first competitive strategies.

      ### Process

      1. **AI Integration Spectrum**
         | Level | Description | Disruption Potential |
         |-------|-------------|---------------------|
         | Bolt-on | AI added to existing | Low - easily matched |
         | Assisted | AI enhances workflows | Medium - improves UX |
         | First | Built around AI | High - new paradigms |
         | Native | AI is the product | Transformative |

      2. **Multi-Tenant AI Advantages**
         - Cross-tenant pattern learning (privacy-preserving)
         - Shared model training economics
         - Aggregate benchmarking capabilities
         - Network effect AI improvements

      3. **AI Disruption Opportunities**
         | Opportunity | Current State | AI-Native Vision | Gap |
         |-------------|--------------|-----------------|-----|
         | Automation | Manual processes | Full automation | Implementation |
         | Intelligence | Data reporting | Predictive insights | Model development |
         | Personalization | Segment-based | Individual AI | Privacy design |
         | Creation | Templates | AI generation | Quality control |

      4. **AI-Native Strategy Design**
         - Identify AI-native product opportunities
         - Design multi-tenant AI architecture
         - Plan AI capability roadmap

      ### Verification Checklist
      - [ ] AI integration level assessed
      - [ ] Multi-tenant advantages identified
      - [ ] Opportunities prioritized
      - [ ] Strategy aligned with architecture

      ### Output
      Produce AI disruption analysis using template:
      `{project-root}/_bmad/bam/data/templates/ai-disruption-template.md`
  - id: load-bam-futures-context-prompt
    content: |
      ## Load BAM Futures Context

      Read and internalize the multi-tenant SaaS futures guide:
      `{project-root}/_bmad/bam/data/agent-guides/bam/saas-innovation.md`

      Also load the futures-specific guides:
