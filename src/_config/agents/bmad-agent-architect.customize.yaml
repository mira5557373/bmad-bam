  - id: agent-guardrails-prompt
    content: |
      ## Agent Safety Guardrails and Kill Switches

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `testing-agent-safety`
      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-i3-agent-safety.md`

      Design safety guardrails for agent execution:

      ### Input Guardrails
      | Guard | Purpose | Action |
      |-------|---------|--------|
      | Prompt injection detection | Prevent manipulation | Block + log |
      | PII detection | Privacy protection | Mask or reject |
      | Content policy | Harmful content | Reject + flag |
      | Size limits | Resource protection | Truncate or reject |

      ### Output Guardrails
      | Guard | Purpose | Action |
      |-------|---------|--------|
      | Content filtering | Harmful output | Filter + log |
      | PII leakage | Privacy | Mask before return |
      | Hallucination detection | Accuracy | Flag for review |
      | Cross-tenant data | Isolation | Block + alert |

      ### Kill Switches
      | Switch | Scope | Trigger | Recovery |
      |--------|-------|---------|----------|
      | Run kill | Single run | Manual/automatic | Checkpoint resume |
      | Agent kill | Agent type | Admin action | Code fix deploy |
      | Tenant kill | All tenant runs | Abuse detection | Support intervention |
      | Global kill | All runs | Critical incident | Leadership approval |

      ### Escalation Paths
      1. Automatic retry (transient errors)
      2. Automatic fallback (degraded service)
      3. Human escalation (ambiguous situations)
      4. Emergency stop (safety violations)

      Output as agent guardrails specification.
