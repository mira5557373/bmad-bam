    content: |
      ## Design Data Loss Prevention Controls

      Design comprehensive DLP controls for multi-tenant SaaS with AI agents,
      covering data classification, movement monitoring, and leak prevention.

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-security-continuous.md`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`

      ### DLP Architecture

      **1. Data Classification Framework**

      | Classification | Description | DLP Action | Tenant Visibility |
      |---------------|-------------|-----------|-------------------|
      | Public | No restrictions | None | All tiers |
      | Internal | Business data | Log transfers | Pro+ |
      | Confidential | Sensitive business | Approve transfers | Pro+ |
      | Restricted | PII, PHI, PCI | Block external, audit | All tiers |
      | Highly Restricted | Credentials, keys | Block all, immediate alert | All tiers |

      **2. DLP Enforcement Points**

      | Enforcement Point | Data Types | Actions |
      |------------------|------------|---------|
      | API Gateway | Request/response bodies | Scan, redact, block |
      | Email Gateway | Attachments, body | Scan, quarantine |
      | Cloud Storage | Files, metadata | Classify, restrict |
      | Database | Queries, exports | Audit, limit |
      | AI Agent | Prompts, responses | Scan, filter |
      | Code Repository | Commits, PRs | Scan, block |

      **3. AI-Specific DLP Controls**

      | Data Flow | Risk | DLP Control |
      |-----------|------|-------------|
      | Prompt input | PII in prompts | Scan and redact before processing |
      | Agent memory | Accumulated sensitive data | Periodic scanning and purging |
      | Tool outputs | External data ingestion | Classify on ingestion |
      | Model responses | Leaked training data | Output scanning |
      | Fine-tuning data | Tenant data mixing | Isolation verification |

      **4. Tenant Data Isolation DLP**

      - [ ] Cross-tenant transfer detection active
      - [ ] Tenant boundary violation alerts
      - [ ] Per-tenant data export audit
      - [ ] API response tenant validation
      - [ ] Cache content isolation verification
      - [ ] Log sanitization enforcement

      **5. DLP Policy Examples**

      | Policy | Condition | Action |
      |--------|-----------|--------|
      | Block PII egress | PII detected + external dest | Block + alert |
      | Alert bulk export | >10k records + non-admin | Alert + approve |
      | Quarantine secrets | API key/password pattern | Quarantine + alert |
      | Audit cross-tenant | Tenant A data + Tenant B context | Block + P1 alert |
      | Filter AI output | PII in agent response | Redact + log |

      ### Implementation Checklist

      - [ ] Data classification taxonomy defined
      - [ ] Classification automation deployed
      - [ ] DLP policies implemented at each enforcement point
      - [ ] AI-specific DLP controls active
      - [ ] Tenant isolation DLP verified
      - [ ] Exception workflow established
