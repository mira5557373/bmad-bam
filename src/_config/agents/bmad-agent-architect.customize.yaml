  - id: ml-model-registry-design-prompt
    content: |
      ## Multi-Tenant Model Registry Architecture Design

      Prerequisites: Load MLOps context via `bam-ml-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `tenant-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/ai-runtimes.csv`

      Design model registry that supports multi-tenant governance:

      ### Registry Architecture
      | Layer | Purpose | Tenant Isolation |
      |-------|---------|------------------|
      | Model Store | Binary storage | Tenant path prefixes |
      | Metadata DB | Model metadata | RLS on tenant_id |
      | Version Control | Model versions | Tenant-scoped lineage |
      | Serving Config | Deployment config | Tenant endpoints |

      ### Model Lifecycle States
      | State | Description | Transitions |
      |-------|-------------|-------------|
      | Registered | Initial upload | -> Staging |
      | Staging | Pre-production testing | -> Production, Archived |
      | Production | Live serving | -> Staging, Archived |
      | Archived | No longer active | -> Staging (restore) |

      ### Model Metadata Schema
      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | model_id | UUID | Yes | Unique identifier |
      | tenant_id | UUID | Yes | Tenant context |
      | name | string | Yes | Model name |
      | version | semver | Yes | Model version |
      | framework | enum | Yes | TF/PyTorch/etc |
      | stage | enum | Yes | Lifecycle state |
      | metrics | JSON | No | Performance metrics |
      | lineage | JSON | No | Training lineage |

      ### Multi-Tenant Model Serving
      | Pattern | Use Case | Isolation |
      |---------|----------|-----------|
      | Shared endpoint | Cost-efficient | Request routing |
      | Dedicated endpoint | Low latency | Full isolation |
      | Serverless | Variable load | Request isolation |

      ### Implementation Requirements
      - [ ] Model binaries tenant-isolated
      - [ ] Metadata enforces RLS
      - [ ] Version history per tenant
      - [ ] Deployment configs tenant-scoped
      - [ ] Model lineage tracked
      - [ ] Approval workflows for production

      Output as model registry architecture document.
