  - id: memory-tiers-prompt
    content: |
      ## Memory Tier Architecture Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `memory-tiers`

      Design multi-tier memory architecture:

      ### Memory Tier Definitions
      | Tier | Purpose | Persistence | Scope | TTL |
      |------|---------|-------------|-------|-----|
      | Working | Current task context | Session | Run | Minutes |
      | Episodic | Conversation history | Short-term | Session | Hours/Days |
      | Semantic | Knowledge/embeddings | Long-term | Tenant | Permanent |
      | Procedural | Learned behaviors | Long-term | Tenant | Permanent |

      ### Implementation Strategy
      | Tier | Storage | Retrieval | Tenant Isolation |
      |------|---------|-----------|------------------|
      | Working | In-memory | Direct | Process isolation |
      | Episodic | Redis/DynamoDB | Key lookup | Key prefix |
      | Semantic | Vector DB | Similarity search | Metadata filter |
      | Procedural | Document store | Pattern match | Collection per tenant |

      ### Memory Operations
      - Write policies (when to persist)
      - Read policies (when to retrieve)
      - Eviction policies (when to forget)
      - Summarization strategies (context compression)

      ### Cross-Tenant Boundaries
      - NO shared semantic memory between tenants
      - Procedural memory may have global templates (read-only)
      - Working memory strictly isolated

      Output as memory tier architecture document.
  - id: tool-framework-prompt
    content: |
      ## Tool Execution Framework Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `tool-execution`

      Design tool execution framework with permissions:

      ### Tool Registry
      | Tool | Category | Tier Availability | Risk Level |
      |------|----------|-------------------|------------|
      | ... | Search/Action/Query | Free/Pro/Enterprise | Low/Medium/High |

      ### Permission Model
      | Permission | Description | Enforcement |
      |------------|-------------|-------------|
      | tool:read | Read-only tools | Pre-execution check |
      | tool:write | Mutating tools | Pre-execution + audit |
      | tool:external | External API calls | Rate limit + approval |
      | tool:sensitive | PII/financial tools | MFA + audit log |

      ### Execution Framework
      - Pre-execution: Permission check, rate limit, budget check
      - Execution: Sandboxed execution, timeout enforcement
      - Post-execution: Audit logging, cost tracking, result validation

      ### Tenant-Aware Tool Binding
      - Tools receive TenantContext
      - Tool results scoped to tenant
      - Tool errors contain no cross-tenant data

      ### Rate Limiting
      | Tier | Calls/minute | Concurrent | Daily quota |
      |------|--------------|------------|-------------|
      | Free | 10 | 2 | 100 |
      | Pro | 100 | 10 | 10,000 |
      | Enterprise | 1000 | 100 | Unlimited |

      Output as tool framework specification.
  - id: run-contracts-prompt
    content: |
      ## Run Contract Design

      Prerequisites: Load AI runtime context via `bam-ai-runtime-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `run-contracts`

      Design run contracts for agent execution:

      ### Run Contract Structure
      ```
      RunContract {
        // Identity
        run_id: UUID
        tenant_id: TenantId
        user_id: UserId

        // Input
        input: {
          prompt: string
          context: object
          attachments: Attachment[]
        }

        // Budget
        budget: {
          max_tokens: number
          max_duration_seconds: number
          max_tool_calls: number
          max_cost_cents: number
        }

        // Output
        output: {
          result: object
          artifacts: Artifact[]
          citations: Citation[]
        }

        // State
        state: {
          checkpoints: Checkpoint[]
          current_step: string
          history: Message[]
        }
      }
      ```

      ### Budget Enforcement
      | Budget Type | Check Point | Action on Exceed |
      |-------------|-------------|------------------|
      | Tokens | Per LLM call | Graceful stop |
      | Duration | Per step | Checkpoint + resume option |
      | Tool calls | Pre-execution | Queue or reject |
      | Cost | Real-time | Pause + notify |

      ### State Management
      - Checkpoint frequency
      - State serialization format
      - Recovery from checkpoint
      - State cleanup policies

      Output as run contract specification.
