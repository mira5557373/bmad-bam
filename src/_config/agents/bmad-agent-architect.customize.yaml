      - Tenant routing strategies
      - LLMOps best practices
      - Scaling and performance isolation patterns

      Confirm when loaded, then proceed with platform architecture tasks.
  - id: design-modules-prompt
    content: |
      ## Module Boundary Design for Multi-Tenant SaaS

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `module-boundaries`

      For each identified bounded context:

      | Module | Bounded Context | Owner | Complexity | Dependencies |
      |--------|-----------------|-------|------------|--------------|
      | ... | ... | ... | SIMPLE/STANDARD/COMPLEX | ... |

      Design considerations:
      1. Every module must accept TenantContext as first parameter
      2. Module boundaries should align with team ownership
      3. Plan extraction seams for future microservices
      4. Define facade vs internal boundaries
      5. Identify shared kernel dependencies

      Dependency rules (FORBIDDEN):
      - No direct database access across modules
      - No shared domain entities across modules
      - No circular dependencies between modules

      Output as module architecture document using:
      `{project-root}/_bmad/bam/data/templates/module-architecture-template.md`
  - id: define-facades-prompt
    content: |
      ## Facade Contract Design

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `facade-contracts`

      For each cross-module dependency:

      ```typescript
      interface {Module}Facade {
        methodName(
          ctx: TenantContext,  // Always first parameter
          input: InputDTO
        ): Promise<OutputDTO>;
      }
      ```

      Requirements:
      - TenantContext as first parameter always
      - DTOs only (no domain entities cross boundaries)
      - Semantic versioning for all contracts
      - Contract tests required for each method
      - Backwards compatibility for minor versions

      Facade classification:
      | Facade | Type | Criticality | SLA |
      |--------|------|-------------|-----|
      | ... | Query/Command/Event | High/Medium/Low | ... |

      Output using: `{project-root}/_bmad/bam/data/templates/facade-contract-template.md`
  - id: isolation-matrix-prompt
    content: |
      ## Tenant Isolation Matrix

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/tenant-models.csv`

      Load template from: `{project-root}/_bmad/bam/data/templates/tenant-isolation-matrix.md`

      Define isolation for each asset:

      | Asset Type | Strategy | Implementation | Verified |
      |------------|----------|----------------|----------|
      | Database | RLS/Schema/DB | ... | [ ] |
      | Cache | Key prefix | tenant:{id}:key | [ ] |
      | Memory | Scope tag | ... | [ ] |
      | Tools | Tier filter | ... | [ ] |
      | Jobs | Context | ... | [ ] |
      | Vectors | Filter | tenant_id field | [ ] |
      | Logs | Field | tenant_id in every log | [ ] |
      | Files | Path | /tenants/{id}/... | [ ] |
      | Sessions | Scope | ... | [ ] |
      | Queues | Partition | ... | [ ] |

      Verification requirements:
      - Each strategy must have integration test
      - Cross-tenant access attempts must be logged
      - Periodic audit of isolation boundaries
  - id: design-observability-prompt
    content: |
      ## Tenant-Aware Observability Architecture

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `observability`

      Design observability that respects tenant boundaries:

      ### Metrics Architecture
      | Metric Type | Cardinality | Labels | Retention |
      |-------------|-------------|--------|-----------|
      | Business | Per-tenant | tenant_id, tier | 90 days |
      | Technical | Per-service | service, instance | 30 days |
      | SLA | Per-tenant | tenant_id, sla_tier | 1 year |

      ### Logging Architecture
      - Structured logging with tenant_id in every log entry
      - Log aggregation with tenant-aware filtering
      - Sensitive data masking per tenant compliance requirements

      ### Tracing Architecture
      - Distributed tracing with tenant context propagation
      - Trace sampling strategies per tier
      - Cross-service correlation with tenant awareness

      ### Alerting Architecture
      - Tenant-specific alert thresholds
      - Noisy neighbor detection alerts
      - SLA breach alerts per tenant tier

      Output as observability architecture document.
  - id: design-shared-kernel-prompt
    content: |
      ## Shared Kernel Design for Cross-Cutting Concerns

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `tenant-isolation`

      Design the shared kernel that all modules depend on:

      ### Core Types (immutable)
      | Type | Purpose | Ownership |
      |------|---------|-----------|
      | TenantContext | Tenant identification | Platform team |
      | TenantId | Value object | Platform team |
      | UserId | Value object | Platform team |
      | Result<T,E> | Error handling | Platform team |
      | Money | Currency handling | Platform team |

      ### Cross-Cutting Services
      | Service | Interface | Implementation |
      |---------|-----------|----------------|
      | IEventBus | Event publishing | Infrastructure |
      | ILogger | Structured logging | Infrastructure |
      | IMetrics | Metrics emission | Infrastructure |
      | IClock | Time abstraction | Infrastructure |

      ### Shared Kernel Rules
      1. Changes require cross-team approval
      2. Backwards compatibility required
      3. No business logic (only infrastructure)
      4. Comprehensive test coverage (>95%)

      Output as shared kernel specification.
  - id: infra-architecture-prompt
    content: |
      ## Infrastructure-as-Code Architecture

      Prerequisites: Load platform context via `bam-platform-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `deployment`

      Design infrastructure supporting multi-tenant architecture:

      ### Environment Strategy
      | Environment | Purpose | Tenant Model | Data |
      |-------------|---------|--------------|------|
      | Development | Local dev | Single tenant | Seeded |
      | Staging | Integration | Multi-tenant | Anonymized |
      | Production | Live | Multi-tenant | Real |

      ### Infrastructure Components
      | Component | Technology | Scaling | Tenant Awareness |
      |-----------|------------|---------|------------------|
      | Database | PostgreSQL | Vertical + Read replicas | RLS policies |
      | Cache | Redis | Cluster | Key prefixing |
      | Queue | RabbitMQ/SQS | Horizontal | Tenant partitions |
      | Storage | S3-compatible | Unlimited | Path isolation |
      | Search | Elasticsearch | Horizontal | Index filtering |

      ### IaC Organization
      ```
      infrastructure/
        modules/           # Reusable Terraform/Pulumi modules
        environments/      # Environment-specific configurations
        tenant-provisioning/  # Tenant onboarding automation
      ```

      Output as infrastructure architecture document.
  - id: platform-review-prompt
    content: |
      ## Comprehensive Platform Architecture Review

      Prerequisites: Load platform context via `bam-platform-context`

      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/foundation-gate.md`

      Perform comprehensive review against QG-F1 (Foundation Gate):

      ### Module Architecture Review
      - [ ] All modules accept TenantContext
      - [ ] No forbidden dependencies
      - [ ] Extraction seams identified
      - [ ] Team ownership defined

      ### Facade Contract Review
      - [ ] All cross-module calls via facades
      - [ ] DTOs only at boundaries
      - [ ] Contract tests exist
      - [ ] Versioning strategy defined

      ### Tenant Isolation Review
      - [ ] All assets have isolation strategy
      - [ ] Isolation tests implemented
      - [ ] Cross-tenant access logged

      ### Infrastructure Review
      - [ ] IaC for all environments
      - [ ] Tenant provisioning automated
      - [ ] Scaling strategies defined

      ### Observability Review
      - [ ] Tenant-aware metrics
      - [ ] Structured logging with tenant_id
      - [ ] Distributed tracing enabled

      Generate platform architecture review report with:
      - Findings (Critical/Major/Minor)
      - Recommendations
      - Risk assessment
