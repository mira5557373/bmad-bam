      This guide provides comprehensive context for securing multi-tenant
      platforms. Security in multi-tenancy requires defense in depth with
      tenant isolation as a core architectural principle.

      1. **Tenant Isolation Security**: Verifying that tenant boundaries are
         enforced at every layer including database, application, network, and
         infrastructure with no possibility of cross-tenant data leakage.
      2. **Compliance Frameworks**: Implementing controls required for GDPR,
         SOC 2, HIPAA, and other regulatory frameworks with tenant-specific
         compliance evidence collection.
      3. **Data Residency**: Ensuring tenant data is stored and processed in
         regions that comply with their jurisdictional requirements, with
         controls preventing accidental cross-region data movement.
      4. **Security Operations**: Building tenant-aware security monitoring,
         incident response procedures, and vulnerability management processes.
      5. **Encryption Key Management**: Per-tenant encryption and key rotation patterns.

      Once loaded, confirm by stating: "BAM security context loaded. Ready for
      multi-tenant security assessment and compliance verification."
  - id: tenant-security-audit-prompt
    content: |
      ## Conduct Tenant Security Audit

      Perform a comprehensive security audit of tenant isolation and access
      controls. This audit verifies that the multi-tenant architecture
      prevents unauthorized cross-tenant access at every layer.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation`

      ### Audit Checklist by Layer

      **Database Layer:**
      - [ ] RLS policies enabled and FORCED on all tenant tables
      - [ ] No queries can bypass tenant context (verify with EXPLAIN)
      - [ ] Database roles follow principle of least privilege
      - [ ] Encryption at rest enabled with tenant-aware key management
      - [ ] Backup access restricted to authorized operators only
      - [ ] Audit logging captures all data access with tenant context

      **Application Layer:**
      - [ ] Tenant context validated on every request entry point
      - [ ] No shared mutable state between tenant requests
      - [ ] Cache keys include tenant_id prefix
      - [ ] Session tokens are tenant-scoped and verified
      - [ ] API authentication validates tenant membership
      - [ ] Background jobs propagate and validate tenant context

      **Network Layer:**
      - [ ] Network policies prevent cross-tenant pod communication
      - [ ] Ingress validates tenant routing before processing
      - [ ] Service mesh enforces mTLS between services
      - [ ] DNS does not leak tenant subdomains across tenants
      - [ ] WAF rules include tenant-aware rate limiting

      **Infrastructure Layer:**
      - [ ] Container images are immutable and signed
      - [ ] Secrets are tenant-isolated in Vault/KMS
      - [ ] IAM roles are scoped to tenant resources
      - [ ] Logging does not leak tenant data across log streams
      - [ ] Monitoring dashboards filter by tenant by default

      ### Security Test Scenarios

      Execute and document results for each test:
      1. Attempt to access Tenant B data with Tenant A credentials
      2. Attempt to enumerate other tenants via API
      3. Attempt SQL injection that bypasses RLS
      4. Attempt cache poisoning across tenant boundaries
      5. Attempt privilege escalation within tenant scope

      Output a security audit report with findings, severity, and remediation plan.
  - id: compliance-verification-prompt
    content: |
      ## Verify GDPR and SOC2 Compliance

      Validate that the multi-tenant platform meets regulatory requirements
      for data protection and operational security. Compliance in multi-tenant
      systems requires tenant-specific evidence collection and controls.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `compliance`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`

      ### GDPR Compliance Checklist

      **Data Subject Rights (Articles 15-22):**
      - [ ] Right to Access: Can export all tenant data within 30 days
      - [ ] Right to Rectification: Can update personal data on request
      - [ ] Right to Erasure: Can delete all tenant data completely
      - [ ] Right to Portability: Can export data in standard format (JSON/CSV)
      - [ ] Right to Object: Can opt out of processing with feature flags

      **Data Processing Requirements:**
      - [ ] Lawful Basis: Documented legal basis for each processing activity
      - [ ] Data Minimization: Only collect necessary data per feature
      - [ ] Purpose Limitation: Data used only for stated purposes
      - [ ] Storage Limitation: Retention policies enforced automatically
      - [ ] Data Protection by Design: Privacy built into architecture

      **Technical Measures:**
      - [ ] Encryption in transit (TLS 1.3)
      - [ ] Encryption at rest (AES-256)
      - [ ] Pseudonymization where possible
      - [ ] Access logging for all personal data
      - [ ] Breach notification process documented

      ### SOC 2 Type II Controls

      **Security (CC6):**
      - [ ] Logical access controls with MFA
      - [ ] Network security with segmentation
      - [ ] Change management process documented
      - [ ] Incident response plan tested quarterly
      - [ ] Vulnerability management with SLA

      **Availability (A1):**
      - [ ] Disaster recovery plan documented and tested
      - [ ] Backup procedures verified monthly
      - [ ] Failover tested quarterly
      - [ ] SLA monitoring and reporting in place

      **Confidentiality (C1):**
      - [ ] Data classification scheme applied
      - [ ] Confidential data encrypted
      - [ ] Access restricted to authorized personnel
      - [ ] Data disposal procedures documented

      ### Compliance Evidence Collection

      For each control, document:
      - Control description and implementation
      - Evidence artifacts (logs, configs, screenshots)
      - Testing procedures and results
      - Exceptions and compensating controls

      Output a compliance assessment matrix with evidence references.
  - id: data-residency-prompt
    content: |
      ## Implement Regional Data Requirements

      Design and verify data residency controls that ensure tenant data is
      stored and processed only in authorized geographic regions. Data
      residency is a critical requirement for many enterprise and regulated tenants.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `module-boundaries`

      ### Data Residency Architecture

      Implement regional deployment with tenant-aware routing:

      | Component | Regional Requirement | Implementation |
      |-----------|---------------------|----------------|
      | Primary Database | Tenant-specified region | Regional clusters with RLS |
      | Replicas | Same region or approved regions | Geo-restricted replication |
      | Cache | Same region | Regional Redis/Memcached |
      | Object Storage | Tenant-specified region | Regional buckets with policies |
      | CDN | Edge caching allowed | Cache-Control headers |
      | Backups | Same region | Regional backup vaults |
      | Logs | Configurable per tenant | Regional log aggregators |

      ### Tenant Region Configuration

      Define region assignment and enforcement:

      **Supported Regions:**
      - US (us-east-1, us-west-2)
      - EU (eu-west-1, eu-central-1)
      - APAC (ap-southeast-1, ap-northeast-1)
      - Custom regions for ENTERPRISE tier

      **Region Assignment Rules:**
      - FREE tier: Auto-assigned based on signup location
      - PRO tier: User-selected from supported regions
      - ENTERPRISE tier: Custom region deployment available

      ### Cross-Region Prevention

      Implement technical controls to prevent accidental cross-region data movement:
      - Database replication restricted to same-region replicas by default
      - API gateway validates request routing to correct region
      - Background jobs run in tenant's home region
      - Data export includes region validation before transfer
      - Audit logging detects any cross-region data access

      ### Compliance Verification

      For each tenant with data residency requirements, verify:
      - [ ] Primary data stored in specified region
      - [ ] No replicas exist outside approved regions
      - [ ] Backups stored in same or approved regions
      - [ ] Logs aggregated within region boundaries
      - [ ] Support access from approved locations only
      - [ ] Sub-processors operate in approved regions

      Output a data residency architecture document with deployment configurations.
  - id: breach-response-prompt
    content: |
      ## Tenant-Specific Breach Response Procedures

      Design and execute incident response procedures that handle data breaches
      with tenant isolation awareness, ensuring proper notification and containment.

      ### Breach Classification

      | Severity | Definition | Response SLA |
      |----------|------------|--------------|
      | P1 - Critical | Active data exfiltration, multiple tenants | 15 min |
      | P2 - High | Single tenant data exposed | 1 hour |
      | P3 - Medium | Potential exposure, no confirmed access | 4 hours |
      | P4 - Low | Vulnerability discovered, not exploited | 24 hours |

      ### Tenant Scope Assessment

      1. **Determine Affected Tenants**
         - Query access logs for affected resources
         - Identify tenant_id values in compromised data
         - Map data to tenant hierarchy (org → workspace → user)
         - Classify tenant tiers (Enterprise requires executive notification)

      2. **Assess Data Categories**
         | Category | Examples | GDPR Reportable |
         |----------|----------|-----------------|
         | PII | Name, email, address | Yes - 72 hours |
         | Financial | Payment details, invoices | Yes - 72 hours |
         | Credentials | Passwords, API keys | Yes - 72 hours |
         | Business | Documents, analytics | Depends on content |
         | System | Logs, configs | Usually no |

      ### Response Phases

      **Phase 1: Containment (Immediate)**
      - [ ] Isolate affected systems
      - [ ] Revoke compromised credentials
      - [ ] Enable enhanced logging
      - [ ] Block suspected attacker IPs
      - [ ] Preserve forensic evidence

      **Phase 2: Assessment (1-4 hours)**
      - [ ] Identify attack vector
      - [ ] Enumerate affected tenants
      - [ ] Classify exposed data
      - [ ] Document timeline of events
      - [ ] Assess ongoing risk

      **Phase 3: Notification (Per SLA)**
      - [ ] Internal stakeholders (immediate)
      - [ ] Affected tenants (per contract SLA)
      - [ ] Regulatory bodies (GDPR: 72 hours)
      - [ ] Law enforcement (if required)
      - [ ] Public disclosure (if required)

      **Phase 4: Remediation (24-72 hours)**
      - [ ] Patch vulnerabilities
      - [ ] Force credential rotation for affected tenants
      - [ ] Implement additional controls
      - [ ] Update monitoring rules
      - [ ] Document lessons learned

      ### Tenant Notification Template

      **Enterprise Tier (Dedicated Contact):**
      - Personal call from CSM within 1 hour
      - Written summary within 4 hours
      - Daily updates until resolved
      - Post-incident report within 5 days

      **Pro Tier:**
      - Email notification within 4 hours
      - Status page updates
      - Post-incident summary

      **Free Tier:**
      - Email notification within 24 hours
      - Status page updates

      ### Communication Components

      Each notification must include:
      1. What happened (factual, no speculation)
      2. What data was affected
      3. What we are doing about it
      4. What the tenant should do (password reset, etc.)
      5. Contact information for questions
      6. Timeline for next update

      ### Post-Incident Requirements

      - [ ] Root cause analysis completed
      - [ ] Preventive measures implemented
      - [ ] Affected tenant follow-up completed
      - [ ] Compliance documentation filed
      - [ ] Lessons learned shared with team
      - [ ] Incident retrospective scheduled

      ### Regulatory Compliance

      | Regulation | Notification Deadline | Authority |
      |------------|----------------------|-----------|
      | GDPR | 72 hours | DPA in each affected country |
      | CCPA | As soon as practicable | California AG |
      | HIPAA | 60 days | HHS OCR |
      | SOC 2 | As per contract | Auditor notification |

      **Output:** Breach response playbook with tenant-specific procedures
  - id: penetration-testing-prompt
    content: |
      ## Design Tenant-Aware Penetration Testing Scenarios

      Create comprehensive penetration testing scenarios that specifically target
      multi-tenant isolation boundaries and access controls.

      **Prerequisites:**
      - [ ] Test environment available
      - [ ] Test tenant accounts provisioned
      - [ ] Scope and rules of engagement defined

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `testing-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`

      ### Test Categories

      | Category | Focus Area | Risk Level |
      |----------|------------|------------|
      | Cross-Tenant Access | Data isolation boundaries | Critical |
      | Privilege Escalation | Tenant admin to platform admin | Critical |
      | Tenant Enumeration | Discovering other tenants | High |
      | Resource Exhaustion | Noisy neighbor attacks | High |
      | Injection Attacks | RLS bypass via SQL injection | Critical |
      | Session Hijacking | Cross-tenant session theft | Critical |

      ### Cross-Tenant Access Tests

      **1. Direct Data Access**
      - Attempt to access Tenant B's data with Tenant A credentials
      - Test all API endpoints for tenant_id parameter manipulation
      - Test IDOR vulnerabilities in resource URLs
      - Verify RLS cannot be bypassed via query manipulation

      **2. Indirect Data Access**
      - Test aggregate endpoints for data leakage
      - Check error messages for tenant information disclosure
      - Test export functions for cross-tenant data inclusion
      - Verify search results are tenant-scoped

      **3. Cache Poisoning**
      - Attempt to poison cache entries for other tenants
      - Test cache key enumeration across tenant boundaries
      - Verify CDN cache isolation

      ### Privilege Escalation Tests

      **1. Horizontal Escalation**
      - User in Tenant A attempts to access Tenant B resources
      - Test role manipulation across tenant boundaries
      - Verify workspace isolation within tenant

      **2. Vertical Escalation**
      - Regular user attempts admin operations
      - Tenant admin attempts platform admin operations
      - Test API key permission boundaries

      ### Tenant Enumeration Tests

      - Brute force tenant ID discovery
      - Error message analysis for tenant existence
      - Timing attacks on authentication
      - DNS enumeration for tenant subdomains
      - Certificate transparency log analysis

      ### Injection Attack Tests

      **SQL Injection for RLS Bypass:**
      ```
      Test payloads:
      - tenant_id='; SET LOCAL app.current_tenant_id='attacker'; --
      - resource_id=1; DROP POLICY tenant_isolation ON users; --
      - Filter parameter: ' OR tenant_id != current_setting('app.current_tenant_id')::uuid --
      ```

      **NoSQL Injection:**
      - Test MongoDB/Redis queries for tenant filter bypass
      - JSON injection in document databases

      ### Session/Token Tests

      - Token reuse across tenant boundaries
      - JWT manipulation (tenant_id claim)
      - Session fixation with tenant context
      - Refresh token cross-tenant usage

      ### Test Environment Setup

      | Component | Configuration |
      |-----------|--------------|
      | Test Tenants | Minimum 3 (A: attacker, B: victim, C: control) |
      | User Roles | Admin, regular user, API key for each |
      | Data Volume | Realistic data per tenant |
      | Isolation | Identical to production architecture |

      ### Severity Classification

      | Finding | Severity | Response SLA |
      |---------|----------|--------------|
      | Cross-tenant data access | P1 Critical | 24 hours |
      | Privilege escalation | P1 Critical | 24 hours |
      | Tenant enumeration | P2 High | 72 hours |
      | Information disclosure | P2 High | 72 hours |
      | Resource exhaustion | P3 Medium | 1 week |

      ### Reporting Template

      For each finding:
      1. Vulnerability description
      2. Affected tenant scope (single, multiple, all)
      3. Attack vector and proof of concept
      4. Business impact assessment
      5. Remediation recommendation
      6. Verification steps

      ### Verification Checklist
      - [ ] All test categories executed
      - [ ] Test coverage documented
      - [ ] Findings classified by severity
      - [ ] Remediation plan for all findings
      - [ ] Re-test scheduled for fixes

      **Output:** Penetration testing report with tenant-specific findings
  - id: key-rotation-prompt
    content: |
      ## Design Per-Tenant Encryption Key Rotation Policies

      Create comprehensive key management and rotation policies for tenant data encryption.

      **Prerequisites:**
      - [ ] KMS/HSM infrastructure available
      - [ ] Encryption requirements identified
      - [ ] Current key inventory completed

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `compliance`

      ### Key Hierarchy

      ```
      Platform Master Key (PMK)
           │
           │ Encrypts
           ▼
      Tenant Master Key (TMK) per tenant
           │
           │ Encrypts
           ▼
      Data Encryption Key (DEK) per data type
           │
           │ Encrypts
           ▼
      Tenant Data
      ```

      ### Key Types and Rotation Schedules

      | Key Type | Scope | Rotation Period | Method |
      |----------|-------|-----------------|--------|
      | Platform Master Key | Global | 2 years | Manual + HSM |
      | Tenant Master Key | Per tenant | 1 year | Automatic |
      | Data Encryption Key | Per data type | 90 days | Automatic |
      | API Keys | Per user/service | 90 days | User-triggered |
      | JWT Signing Keys | Platform | 30 days | Automatic |
      | TLS Certificates | Per domain | 90 days | Automatic (ACME) |

      ### Tier-Specific Key Management

      | Feature | FREE | PRO | ENTERPRISE |
      |---------|------|-----|------------|
      | Key Storage | Platform KMS | Platform KMS | BYOK/Dedicated HSM |
      | Rotation Control | Platform default | Self-service | Full control |
      | Key Export | No | No | With approval |
      | Custom Rotation | No | Yes | Yes + automation |
      | Audit Access | No | Read-only | Full access |

      ### Rotation Workflow

      **1. Scheduled Rotation**
      ```
      Schedule Trigger
           │
           ▼
      ┌─────────────────┐
      │ Generate New    │  ← Create new DEK version
      │ Key Version     │  ← Store in KMS
      └────────┬────────┘
               │
               ▼
      ┌─────────────────┐
      │ Update Active   │  ← New writes use new key
      │ Key Reference   │  ← Old key remains for reads
      └────────┬────────┘
               │
               ▼
      ┌─────────────────┐
      │ Re-encrypt      │  ← Background job
      │ Existing Data   │  ← Per-record migration
      └────────┬────────┘
               │
               ▼
      ┌─────────────────┐
      │ Verify & Retire │  ← Confirm all data migrated
      │ Old Key         │  ← Mark old key for deletion
      └────────┬────────┘
               │
               ▼
        Rotation Complete
      ```

      **2. Emergency Rotation**
      - Triggered by suspected compromise
      - Immediate new key generation
      - Force re-encryption of all affected data
      - Invalidate all sessions using old key
      - Audit log all access to old key

      ### Implementation Requirements

      **Key Storage:**
      - HSM-backed for master keys
      - Encrypted at rest for derived keys
      - Geographic redundancy for disaster recovery
      - Access logging for all key operations

      **Re-encryption Strategy:**
      - Background job with rate limiting
      - No downtime during rotation
      - Progress tracking and resumability
      - Rollback capability if issues detected

      **Tenant Isolation:**
      - Each tenant has unique TMK
      - TMK cannot decrypt other tenant data
      - Key deletion removes tenant data access
      - No shared encryption across tenants

      ### Enterprise BYOK (Bring Your Own Key)

      For ENTERPRISE tenants:
      1. Tenant provides key material or references external KMS
      2. Platform wraps tenant key with platform key
      3. Tenant controls rotation schedule
      4. Tenant can revoke access by deleting key
      5. Platform cannot access data without tenant key

      ### Compliance Mapping

      | Requirement | Implementation |
      |-------------|----------------|
      | GDPR Right to Erasure | Delete TMK to render data unreadable |
      | SOC 2 Key Management | Rotation schedules + audit logs |
      | HIPAA Encryption | AES-256 + proper key management |
      | PCI DSS Key Rotation | 90-day rotation for DEKs |

      ### Monitoring and Alerting

      | Alert | Threshold | Action |
      |-------|-----------|--------|
      | Key age approaching limit | 7 days before rotation | Schedule rotation |
      | Rotation failure | Any failure | Page on-call + retry |
      | Unusual key access | >10x normal | Security review |
      | Key not found | Any occurrence | Incident response |

      ### Verification Checklist
      - [ ] Key hierarchy documented
      - [ ] Rotation schedules configured
      - [ ] Re-encryption workflow tested
      - [ ] Emergency rotation runbook ready
      - [ ] BYOK for Enterprise implemented
      - [ ] Compliance requirements mapped

      **Output:** Key rotation policy document with implementation specifications
  - id: incident-playbook-prompt
    content: |
      ## Create Tenant-Specific Security Incident Response Playbooks

      Design comprehensive incident response playbooks that account for multi-tenant
      architecture and tenant-specific communication requirements.

      **Prerequisites:**
      - [ ] Incident classification defined
      - [ ] Response team roles assigned
      - [ ] Communication channels established

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `compliance`

      ### Incident Classification Matrix

      | Severity | Impact Scope | Examples | Response SLA |
      |----------|-------------|----------|--------------|
      | P1 - Critical | Multiple tenants, data exposed | RLS bypass, credential leak | 15 min |
      | P2 - High | Single tenant, data at risk | Account takeover, API abuse | 1 hour |
      | P3 - Medium | Service degradation | DoS attempt, elevated errors | 4 hours |
      | P4 - Low | Potential vulnerability | Security scan finding | 24 hours |

      ### Playbook: Cross-Tenant Data Exposure (P1)

      **Trigger:** Evidence of data accessible across tenant boundaries

      **Phase 1: Immediate Response (0-15 min)**
      - [ ] Alert incident commander on-call
      - [ ] Confirm cross-tenant access is occurring
      - [ ] Identify affected code path/endpoint
      - [ ] Deploy emergency fix or disable endpoint
      - [ ] Enable enhanced logging

      **Phase 2: Scope Assessment (15-60 min)**
      - [ ] Query logs for all cross-tenant access attempts
      - [ ] Identify all affected tenant pairs
      - [ ] Classify data types exposed
      - [ ] Determine attack timeline
      - [ ] Preserve forensic evidence

      **Phase 3: Containment (1-4 hours)**
      - [ ] Deploy permanent fix
      - [ ] Verify fix in staging
      - [ ] Deploy to production
      - [ ] Confirm no ongoing exposure
      - [ ] Rotate any exposed credentials

      **Phase 4: Notification (Per SLA)**
      - [ ] Notify affected tenants (see communication matrix)
      - [ ] Prepare regulatory notifications if required
      - [ ] Update status page
      - [ ] Brief executive team

      **Phase 5: Recovery (24-72 hours)**
      - [ ] Root cause analysis
      - [ ] Implement additional controls
      - [ ] Update test coverage
      - [ ] Document lessons learned
      - [ ] Schedule retrospective

      ### Playbook: Tenant Account Compromise (P2)

      **Trigger:** Suspicious activity indicating account takeover

      **Phase 1: Immediate Response (0-60 min)**
      - [ ] Confirm suspicious activity pattern
      - [ ] Contact tenant admin via secure channel
      - [ ] If confirmed: force logout all tenant sessions
      - [ ] Reset compromised credentials
      - [ ] Enable additional authentication requirements

      **Phase 2: Investigation (1-4 hours)**
      - [ ] Review authentication logs
      - [ ] Identify attack vector (phishing, credential stuffing, etc.)
      - [ ] Check for data exfiltration
      - [ ] Identify any secondary compromises
      - [ ] Document attacker activity timeline

      **Phase 3: Remediation (4-24 hours)**
      - [ ] Assist tenant with password resets
      - [ ] Review and revoke suspicious API keys
      - [ ] Audit permission changes
      - [ ] Implement recommended security controls
      - [ ] Provide security recommendations to tenant

      ### Playbook: AI Agent Anomaly (P2-P3)

      **Trigger:** AI agent behaving unexpectedly or accessing unauthorized resources

      **Phase 1: Detection & Assessment (0-30 min)**
      - [ ] Identify affected agent and tenant
      - [ ] Review agent run logs
      - [ ] Check for prompt injection indicators
      - [ ] Assess data accessed during anomaly
      - [ ] Determine if cross-tenant impact

      **Phase 2: Containment (30-120 min)**
      - [ ] Pause agent execution
      - [ ] Revoke agent's tool access
      - [ ] Review all recent agent runs
      - [ ] Check for data exfiltration
      - [ ] Isolate affected tenant if necessary

      **Phase 3: Analysis (2-8 hours)**
      - [ ] Root cause analysis (prompt injection, bug, config error)
      - [ ] Review agent memory for malicious content
      - [ ] Check for persistence mechanisms
      - [ ] Document attack technique if applicable

      **Phase 4: Recovery**
      - [ ] Reset agent memory
      - [ ] Update agent guardrails
      - [ ] Re-enable with enhanced monitoring
      - [ ] Notify tenant of incident and resolution

      ### Communication Matrix by Tier

      | Action | FREE | PRO | ENTERPRISE |
      |--------|------|-----|------------|
      | Initial notification | Email within 24h | Email within 4h | Call within 1h |
      | Updates | Status page | Email + status page | Dedicated Slack/call |
      | Post-incident report | None | Summary email | Full RCA document |
      | Follow-up call | None | Optional | Required |

      ### Communication Templates

      **Initial Notification (ENTERPRISE):**
      ```
      Subject: [Security Incident] {Tenant Name} - {Incident ID}

      Dear {Contact Name},

      We are contacting you regarding a security incident affecting
      your organization's account on {Platform Name}.

      What we know:
      - {Brief factual description}
      - {Impact assessment}
      - {Timeline if known}

      What we are doing:
      - {Immediate actions taken}
      - {Investigation status}
      - {Expected next update time}

      What you should do:
      - {Recommended actions}
      - {Contact information}

      Your dedicated incident contact: {Name} at {Phone}

      We will provide updates every {interval} until resolution.
      ```

      ### Escalation Path

      ```
      On-Call Engineer
           │
           │ Cannot resolve in SLA
           ▼
      Incident Commander
           │
           │ Multi-tenant impact or P1
           ▼
      Security Lead + Engineering Lead
           │
           │ Data breach confirmed
           ▼
      Executive Team + Legal + PR
      ```

      ### Runbook Maintenance

      - [ ] Review playbooks quarterly
      - [ ] Conduct tabletop exercises monthly
      - [ ] Update contact information monthly
      - [ ] Test communication channels quarterly
      - [ ] Incorporate lessons learned within 2 weeks

      ### Verification Checklist
      - [ ] All incident types have playbook
      - [ ] Escalation paths documented
      - [ ] Communication templates ready
      - [ ] On-call rotation configured
      - [ ] Tabletop exercise scheduled
      - [ ] Regulatory notification process documented

      **Output:** Incident response playbook library with tenant-specific procedures
