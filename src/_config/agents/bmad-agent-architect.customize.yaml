      `{project-root}/_bmad/bam/data/agent-guides/bam/saga-orchestration-patterns.md`

      Load your persistent memory for prior decisions:
      `{project-root}/_bmad/_memory/architect-bam-sidecar/architecture-decisions.md`

      These guides provide context for:
      - Modular monolith principles and extraction seams
      - Module structure patterns and boundaries
      - Forbidden dependency rules
      - Tenant context propagation in modules
      - Platform-level infrastructure decisions
      - Caching strategies for multi-tenant systems
      - Facade contract design patterns
