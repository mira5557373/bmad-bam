      Design experiment tracking that respects tenant boundaries:

      ### Experiment Architecture
      | Component | Purpose | Tenant Isolation |
      |-----------|---------|------------------|
      | Experiment Store | Track experiments | Tenant-scoped projects |
      | Run Logger | Log metrics/params | TenantContext injection |
      | Artifact Store | Store outputs | Path isolation |
      | Comparison UI | Compare runs | Filtered views |

      ### Experiment Metadata
      | Field | Type | Purpose |
      |-------|------|---------|
      | tenant_id | UUID | Tenant isolation |
      | experiment_id | UUID | Experiment grouping |
      | run_id | UUID | Individual run |
      | parameters | JSON | Hyperparameters |
      | metrics | JSON | Performance metrics |
      | artifacts | URI[] | Model checkpoints |

      ### Multi-Tenant Considerations
      - Experiments isolated per tenant
      - Shared compute with resource quotas
      - Artifact storage with tenant path prefixes
      - No cross-tenant experiment visibility
      - Tier-based compute limits

      ### Tier Limits
      | Resource | Free | Pro | Enterprise |
      |----------|------|-----|------------|
      | Concurrent runs | 1 | 5 | Unlimited |
      | Experiment history | 30 days | 1 year | Unlimited |
      | Artifact storage | 1 GB | 100 GB | Custom |
      | GPU access | None | Scheduled | Dedicated |

      ### Implementation Requirements
      - [ ] TenantContext propagated to all logging
      - [ ] Artifact paths include tenant_id
      - [ ] Compute isolation via resource quotas
      - [ ] Comparison views tenant-filtered
      - [ ] Audit logging for compliance

