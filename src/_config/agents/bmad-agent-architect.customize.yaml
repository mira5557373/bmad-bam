  - id: contract-evolution-prompt
    content: |
      ## Contract Evolution Strategy Design

      Prerequisites: Load integration context via `bam-integration-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `facade-contracts`

      Design strategies for evolving contracts without breaking consumers:

      ### Evolution Types
      | Type | Compatibility | Strategy | Example |
      |------|---------------|----------|---------|
      | Additive | Backwards | Add optional fields | New response field |
      | Deprecation | Backwards | Mark + timeline | Deprecated method |
      | Breaking | Not backwards | Version bump | Changed signature |
      | Removal | Not backwards | Major version | Deleted endpoint |

      ### Deprecation Process
      1. Mark deprecated (keep functional)
      2. Add alternative (new implementation)
      3. Notify consumers (migration guide)
      4. Monitor usage (track adoption)
      5. Remove after sunset period

      ### Versioning Lifecycle
      | Phase | Duration | Support Level |
      |-------|----------|---------------|
      | Active | Indefinite | Full support |
      | Maintenance | 6 months | Bug fixes only |
      | Deprecated | 6 months | Security only |
      | Removed | - | No support |

      ### Consumer Notification
      - API changelog publication
      - SDK update notifications
      - Migration guides
      - Breaking change previews

      Output as contract evolution strategy document.
  - id: convergence-design-prompt
    content: |
      ## Convergence Verification Design

      Prerequisites: Load integration context via `bam-integration-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `run-contracts`
      **Load checklist:** `{project-root}/_bmad/bam/data/checklists/qg-i1-convergence.md`

      Design convergence verification for multi-module system:

      ### Convergence Definition
      System is converged when:
      - All facade contracts are satisfied
      - All integration tests pass
      - All cross-module workflows complete
      - No orphaned events in queues

      ### Verification Layers
      | Layer | Verifies | Method | Frequency |
      |-------|----------|--------|-----------|
      | Contract | Interface compatibility | Contract tests | Per PR |
      | Integration | Cross-module flows | Integration tests | Per merge |
      | E2E | Full workflows | E2E tests | Per deploy |
      | Production | Real behavior | Canary/shadow | Continuous |

      ### Divergence Detection
      | Signal | Indicates | Action |
      |--------|-----------|--------|
      | Contract test fail | Interface mismatch | Block merge |
      | Integration test fail | Behavior mismatch | Investigate |
      | Event queue growth | Consumer lag | Scale or fix |
      | Error rate spike | Runtime issue | Rollback |

      ### Recovery Procedures
      - Contract mismatch: Negotiate new contract
      - Behavior mismatch: Debug with traces
      - Event backlog: Scale consumers
      - Cascade failure: Circuit breakers

      Output as convergence verification specification.
  - id: facade-versioning-prompt
    content: |
      ## Facade Versioning Strategy Design

      Prerequisites: Load integration context via `bam-integration-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `facade-contracts`

      Design versioning strategy for facade contracts:

      ### Versioning Scheme
      ```
      {module}.{facade}.v{major}.{minor}

      Examples:
      - billing.PaymentFacade.v1.0
      - identity.TenantFacade.v2.1
      ```

      ### Version Compatibility Matrix
      | Change Type | Minor Bump | Major Bump |
      |-------------|------------|------------|
      | Add optional field | Yes | No |
      | Add required field | No | Yes |
      | Change field type | No | Yes |
      | Add new method | Yes | No |
      | Change method signature | No | Yes |
      | Deprecate method | Yes | No |
      | Remove method | No | Yes |

      ### Multi-Version Support
      | Strategy | Use Case | Complexity |
      |----------|----------|------------|
      | Adapter | Minor differences | Low |
      | Parallel | Major differences | Medium |
      | Transform | Data migration | High |

      ### Version Routing
      - Consumer specifies version in call
      - Default to latest stable
      - Graceful degradation for unknown versions

      Output as facade versioning specification.
  - id: cross-module-patterns-prompt
    content: |
      ## Cross-Module Communication Patterns Design

      Prerequisites: Load integration context via `bam-integration-context`

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` -> filter: `module-boundaries`

      Design patterns for cross-module communication:

      ### Communication Patterns
      | Pattern | Use Case | Coupling | Reliability |
      |---------|----------|----------|-------------|
      | Sync facade | Query, immediate response | High | Depends on availability |
      | Async event | Notification, eventual | Low | At-least-once |
      | Saga | Distributed transaction | Medium | Compensating actions |
      | CQRS | Read/write separation | Low | Eventually consistent |

      ### Pattern Selection
      | Scenario | Recommended Pattern | Rationale |
      |----------|---------------------|-----------|
      | Get tenant details | Sync facade | Need immediate response |
      | Order placed | Async event | Multiple subscribers |
      | Multi-step checkout | Saga | Need consistency |
      | Dashboard data | CQRS | Read-heavy, can be stale |

      ### Tenant Context Propagation
      - Sync: TenantContext as first parameter
      - Async: TenantContext in event headers
      - Saga: TenantContext in saga state
      - CQRS: TenantContext in command/query

      ### Error Handling
      | Pattern | Failure Mode | Recovery |
      |---------|--------------|----------|
      | Sync | Timeout | Retry with backoff |
      | Async | Lost event | Dead letter queue |
      | Saga | Step failure | Compensating transaction |
      | CQRS | Stale read | Accept or refresh |

      Output as cross-module patterns specification.
