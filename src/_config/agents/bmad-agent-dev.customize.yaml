  - id: deployment-isolation-prompt
    content: |
      ## Design Tenant Deployment Strategies

      Define deployment architectures that provide appropriate isolation levels
      for different tenant tiers while optimizing infrastructure costs and
      operational complexity.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `module-boundaries`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `disaster-recovery`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-lifecycle`

      ### Isolation Model Matrix

      | Tier | Compute Isolation | Data Isolation | Network Isolation |
      |------|-------------------|----------------|-------------------|
      | FREE | Shared pods/containers | RLS (shared tables) | Shared ingress |
      | PRO | Resource quotas, priority classes | RLS + schema separation | Dedicated service mesh segment |
      | ENTERPRISE | Dedicated node pools | Database per tenant | VPC peering, private endpoints |

      ### Kubernetes Deployment Patterns

      For each tenant tier, implement appropriate isolation:

      **FREE Tier (Shared Resources):**
      - Deploy to shared namespace with tenant labels
      - Apply resource limits (CPU: 100m-500m, Memory: 128Mi-512Mi)
      - Use pod anti-affinity for basic distribution
      - Shared ingress with tenant-aware routing

      **PRO Tier (Soft Isolation):**
      - Dedicated namespace per tenant with resource quotas
      - Priority classes for scheduling preference
      - Network policies restricting cross-tenant traffic
      - Dedicated service accounts with RBAC

      **ENTERPRISE Tier (Hard Isolation):**
      - Dedicated node pools with taints and tolerations
      - Separate database instances or clusters
      - Private ingress with mTLS and IP whitelisting
      - Dedicated secrets management (Vault namespace)

      ### Deployment Pipeline Configuration

      Document for each isolation level:
      - Infrastructure as Code templates (Terraform/Pulumi)
      - Helm values per tier with appropriate overrides
      - GitOps workflow (ArgoCD ApplicationSet patterns)
      - Blue-green or canary strategies per tier

      Output a deployment architecture document with diagrams and IaC references.
  - id: infrastructure-tiers-prompt
    content: |
      ## Configure Tier-Specific Infrastructure

      Design infrastructure configurations that deliver performance guarantees
      aligned with pricing tiers while maintaining operational efficiency and
      cost optimization across the entire tenant base.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `observability`

      ### Resource Allocation Framework

      Define compute and storage allocations per tier:

      | Resource | FREE | PRO | ENTERPRISE |
      |----------|------|-----|------------|
      | vCPU (request/limit) | 0.1/0.5 | 0.5/2.0 | 2.0/8.0 |
      | Memory (request/limit) | 128Mi/512Mi | 512Mi/2Gi | 2Gi/8Gi |
      | Storage IOPS | Shared pool | 3000 IOPS | 10000+ IOPS |
      | Database connections | Pool (5 max) | Pool (25 max) | Dedicated (100+) |
      | CDN bandwidth | Shared | 100GB/mo | Unlimited |

      ### Performance Guarantees (SLOs)

      Document tier-specific Service Level Objectives:

      | Metric | FREE | PRO | ENTERPRISE |
      |--------|------|-----|------------|
      | API Latency p99 | 500ms | 200ms | 100ms |
      | Availability | 99% | 99.9% | 99.99% |
      | RTO (Recovery Time) | 24hr | 4hr | 1hr |
      | RPO (Recovery Point) | 24hr | 1hr | 15min |
      | Support Response | None | 24hr | 4hr |

      ### Noisy Neighbor Prevention

      Implement resource isolation to prevent cross-tenant impact:
      - Rate limiting at ingress (per tenant token bucket)
      - Database connection pooling with tenant-aware limits
      - Background job queues with fair scheduling
      - Cache partitioning with memory limits per tenant

      ### Cost Optimization Strategies

      Balance isolation with cost efficiency:
      - Spot/preemptible instances for FREE tier workloads
      - Reserved capacity for predictable PRO workloads
      - Dedicated hosts for ENTERPRISE compliance requirements
      - Autoscaling policies tuned per tier

      Output an infrastructure specification with Terraform modules and monitoring config.
  - id: tenant-provisioning-automation-prompt
    content: |
      ## Automate Tenant Provisioning

      Build fully automated provisioning pipelines that create tenant environments
      consistently and securely. Provisioning must handle all infrastructure,
      data, and configuration requirements without manual intervention.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-lifecycle`
      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-isolation`

      ### Provisioning Pipeline Stages

      Design an idempotent provisioning workflow with these stages:

      | Stage | Actions | Rollback Strategy |
      |-------|---------|-------------------|
      | 1. Validation | Verify tenant config, check quotas | N/A |
      | 2. Identity | Create tenant in IdP, generate API keys | Delete IdP tenant |
      | 3. Data | Create schema/database, apply RLS, seed data | Drop schema |
      | 4. Compute | Create namespace, deploy services | Delete namespace |
      | 5. Network | Configure ingress, DNS, certificates | Remove DNS |
      | 6. Config | Apply feature flags, set limits | Reset to defaults |
      | 7. Verify | Health checks, smoke tests | Trigger full rollback |

      ### Infrastructure as Code Templates

      Create reusable templates for each tenant tier:

      **Terraform Module Structure:**
      ```
      modules/tenant-provisioning/
        ├── main.tf              # Orchestration
        ├── variables.tf         # Tier-specific inputs
        ├── database.tf          # RLS/schema/database creation
        ├── kubernetes.tf        # Namespace, quotas, network policies
        ├── secrets.tf           # Vault paths, encryption keys
        ├── monitoring.tf        # Dashboards, alerts per tenant
        └── outputs.tf           # Connection strings, endpoints
      ```

      ### Secret and Credential Management

      Implement secure credential handling:
      - Generate unique encryption keys per tenant
      - Store secrets in HashiCorp Vault with tenant paths
      - Rotate API keys on provisioning completion
      - Audit all secret access with tenant context

      ### Provisioning Observability

      Track provisioning metrics for operational visibility:
      - Provisioning duration per tier (target: FREE <30s, PRO <2min, ENT <5min)
      - Failure rate and common failure reasons
      - Resource utilization during provisioning spikes
      - Audit trail for compliance (who, when, what)

      Output a provisioning runbook with automation scripts and monitoring dashboards.
  - id: tenant-migration-prompt
    content: |
      ## Generate Tenant Data Migration Scripts and Runbooks

      Design and generate comprehensive migration scripts for tenant data operations
      including tier upgrades, isolation model transitions, and cross-region migrations.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `tenant-lifecycle`

      ### Migration Scenario Analysis

      Identify the migration type and complexity:

      | Scenario | Source | Target | Complexity | Downtime |
      |----------|--------|--------|------------|----------|
      | Tier Upgrade | Shared RLS | Dedicated Schema | Medium | Minutes |
      | Isolation Upgrade | Schema | Database-per-tenant | High | Hours |
      | Cross-Region | Region A | Region B | High | Varies |
      | Version Migration | v1 Schema | v2 Schema | Medium | Minutes |
      | Tenant Merge | Multiple | Single | High | Hours |

      ### Migration Script Components

      Generate scripts for each phase:

      **Pre-Migration:**
      - Data volume assessment and sizing
      - Dependency graph analysis
      - Backup verification and restore testing
      - Feature flag configuration for cutover

      **Migration Execution:**
      - Tenant data export with integrity checksums
      - Schema creation in target environment
      - Data transformation and load scripts
      - RLS policy application to new location
      - Index and constraint recreation

      **Post-Migration:**
      - Data integrity verification queries
      - Record count reconciliation
      - Foreign key validation
      - Performance baseline comparison
      - Rollback procedure documentation

      ### Runbook Template

      Create runbook with these sections:

      | Section | Contents |
      |---------|----------|
      | Overview | Migration scope, timeline, stakeholders |
      | Prerequisites | Checklist of required conditions |
      | Communication | Tenant notification templates |
      | Execution Steps | Numbered, timestamped procedures |
      | Validation | Verification queries and thresholds |
      | Rollback | Step-by-step reversal procedure |
      | Post-Migration | Cleanup and monitoring setup |

      ### Zero-Downtime Migration Patterns

      For tier upgrades requiring no downtime:
      - Dual-write pattern during transition
      - Shadow reads for validation
      - Gradual traffic shifting
      - Feature flag controlled cutover

      ### Verification Checklist

      - [ ] Backup completed and verified
      - [ ] Migration scripts tested in staging
      - [ ] Rollback procedure validated
      - [ ] Monitoring alerts configured
      - [ ] Tenant communication sent
      - [ ] Support team briefed

      **Output:** Migration runbook with executable scripts and rollback procedures
  - id: tenant-observability-prompt
    content: |
      ## Design Tenant-Aware Monitoring and Alerting

      Create comprehensive observability architecture that provides per-tenant visibility
      into system health, performance, and resource consumption while maintaining
      tenant isolation in monitoring data.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `observability`

      ### Tenant-Aware Metrics Architecture

      Design metrics collection with tenant dimensions:

      | Metric Category | Tenant Label | Tier Label | Example Metrics |
      |-----------------|--------------|------------|-----------------|
      | Request Latency | tenant_id | tier | http_request_duration_seconds |
      | Error Rates | tenant_id | tier | http_requests_total{status=~"5.."} |
      | Resource Usage | tenant_id | tier | container_cpu_usage_seconds_total |
      | Database | tenant_id | tier | pg_stat_activity_count |
      | Cache | tenant_id | tier | redis_memory_used_bytes |

      ### Per-Tenant Dashboards

      Configure dashboards with tenant context:

      **Tenant Overview Dashboard:**
      - Request volume and latency (p50, p95, p99)
      - Error rate and top error types
      - Active users and sessions
      - Resource utilization vs quota
      - Cost accumulation (if FinOps enabled)

      **Tenant Health Dashboard:**
      - SLO compliance (availability, latency)
      - Quota utilization percentage
      - Recent incidents and alerts
      - Performance trend vs baseline

      ### Alerting Strategy by Tier

      | Tier | Alert Sensitivity | Notification Channel | Response SLA |
      |------|-------------------|---------------------|--------------|
      | FREE | Aggregate only | Internal Slack | Best effort |
      | PRO | Per-tenant threshold | Slack + Email | 24 hours |
      | ENTERPRISE | Per-tenant + predictive | PagerDuty + Slack | 4 hours |

      ### Alert Rules Template

      Design PromQL-based alerts:

      ```yaml
      # Example alert structure (not code)
      Alert: TenantHighLatency
        Condition: p99 latency > tier SLO for 5 minutes
        Labels: tenant_id, tier, severity
        Annotations: runbook_url, dashboard_url
      ```

      ### Noisy Neighbor Detection

      Configure alerts for resource monopolization:
      - CPU usage > 80% of quota for 10 minutes
      - Database connections > 90% of pool limit
      - Request rate > 2x historical baseline
      - Memory growth exceeding expected patterns

      ### Log Aggregation with Tenant Context

      Ensure all logs include:
      - tenant_id (indexed, queryable)
      - tier (for filtering)
      - user_id (for debugging)
      - trace_id (for distributed tracing)
      - request_id (for correlation)

      ### Tenant Isolation in Observability

      Prevent cross-tenant data exposure:
      - Role-based access to tenant-specific dashboards
      - Query restrictions by tenant_id label
      - Separate Grafana organizations per Enterprise tenant
      - Audit logging for dashboard access

      ### Verification Checklist

      - [ ] All metrics include tenant_id label
      - [ ] Per-tenant dashboards accessible
      - [ ] Alert rules configured per tier SLO
      - [ ] Noisy neighbor alerts active
      - [ ] Log queries scoped by tenant
      - [ ] Access controls prevent cross-tenant visibility

      **Output:** Observability architecture document with dashboard configs and alert rules
  - id: cost-allocation-prompt
    content: |
      ## Analyze Infrastructure Costs Per Tenant

      Design cost allocation and analysis framework for attributing infrastructure
      costs to individual tenants, enabling accurate FinOps reporting and
      tier-appropriate pricing decisions.

      **Load patterns:** `{project-root}/_bmad/bam/data/bam-patterns.csv` → filter: `usage-metering`

      ### Cost Attribution Model

      Map infrastructure costs to tenant dimensions:

      | Resource | Attribution Method | Granularity | Source |
      |----------|-------------------|-------------|--------|
      | Compute | Container CPU/Memory | Per request | Prometheus |
      | Database | Query cost + storage | Per query | pg_stat |
      | Storage | Bytes stored | Daily | Cloud API |
      | Network | Bytes transferred | Per request | Istio |
      | Cache | Memory + operations | Per tenant | Redis INFO |
      | CDN | Bandwidth + requests | Monthly | CDN API |

      ### Shared Resource Allocation

      Handle shared infrastructure costs:

      | Shared Resource | Allocation Strategy |
      |-----------------|---------------------|
      | Control Plane | Even split across tenants |
      | Shared Database | Query time weighted |
      | Ingress/LB | Request count weighted |
      | Monitoring | Per-tenant metric volume |
      | CI/CD | Deployment frequency |

      ### Cost Tagging Strategy

      Implement consistent tagging across cloud resources:

      | Tag Key | Value Pattern | Purpose |
      |---------|---------------|---------|
      | tenant_id | UUID | Direct attribution |
      | tier | free/pro/enterprise | Tier analysis |
      | module | billing/auth/ai | Module breakdown |
      | environment | prod/staging | Environment filter |
      | cost_center | customer/internal | Business allocation |

      ### Cost Analysis Queries

      Design queries for cost visibility:

      **Per-Tenant Monthly Cost:**
      - Compute cost by tenant_id
      - Storage cost by tenant_id
      - Network cost by tenant_id
      - Total cost vs revenue margin

      **Tier Profitability Analysis:**
      - Average cost per tenant by tier
      - Cost variance within tiers
      - Outlier identification
      - Pricing adequacy assessment

      **Cost Anomaly Detection:**
      - Day-over-day cost change > 20%
      - Week-over-week trend analysis
      - Projected cost vs budget

      ### FinOps Dashboard Components

      Build executive and operational dashboards:

      **Executive Dashboard:**
      - Total cost by tier (pie chart)
      - Cost trend over time (line chart)
      - Top 10 tenants by cost (bar chart)
      - Gross margin by tier (KPI cards)

      **Operational Dashboard:**
      - Resource utilization efficiency
      - Idle resource identification
      - Right-sizing recommendations
      - Reserved capacity utilization

      ### Cost Optimization Recommendations

      Generate actionable insights:
      - Tenants over-provisioned vs usage
      - Candidates for tier upgrades/downgrades
      - Shared resource consolidation opportunities
      - Reserved instance coverage gaps

      ### Chargeback/Showback Reports

      Configure tenant-facing cost reports:
      - Monthly itemized cost statement
      - Usage breakdown by resource type
      - Comparison to tier limits
      - Projected costs for current usage

      ### Verification Checklist

      - [ ] All resources tagged with tenant_id
      - [ ] Cost attribution queries validated
      - [ ] Dashboard visualizations complete
      - [ ] Anomaly detection alerts configured
      - [ ] Chargeback reports automated
      - [ ] Margin analysis accurate

      **Output:** Cost allocation architecture with dashboard configs and report templates
  - id: gate-automation-prompt
    content: |
      ## Configure CI/CD Gate Integration

      Prerequisites: Ensure BAM DevOps context loaded via `bam-devops-context`

      **Load gate definitions:** `{project-root}/_bmad/bam/data/quality-gates.csv`
      **Load gate guide:** `{project-root}/_bmad/bam/data/agent-guides/bam/quality-gates.md`

      ### Objective
      Configure automated quality gate validation in CI/CD pipelines to enforce
      gate requirements before deployments and releases.

      ### Process

      1. **Map Gates to Pipeline Stages**
         Define which gates apply to which pipeline stages:

         | Pipeline Stage | Applicable Gates | Enforcement |
         |----------------|------------------|-------------|
         | PR Merge | QG-M2 (subset) | Block merge |
         | Feature Branch | QG-M1, QG-M2 | Warning |
         | Staging Deploy | QG-I1, QG-I2, QG-I3 | Block deploy |
         | Production Deploy | QG-P1 | Block deploy |
         | Release Tag | All gates | Block release |

      2. **Define Automated Checks**
         Configure automated validation for each gate:

         **QG-M2 (Tenant Isolation) - Automated:**
         | Check | Tool | Threshold | Action |
         |-------|------|-----------|--------|
         | RLS policy coverage | Custom SQL | 100% tables | Block |
         | Isolation test suite | Jest/Pytest | 100% pass | Block |
         | Cache key audit | Linter | No violations | Warn |

         **QG-I2 (Tenant Safety) - Automated:**
         | Check | Tool | Threshold | Action |
         |-------|------|-----------|--------|
         | Cross-tenant test | Integration suite | 100% pass | Block |
         | Security scan | SAST tool | No critical | Block |
         | Audit log coverage | Custom check | 100% endpoints | Warn |

         **QG-I3 (Agent Safety) - Automated:**
         | Check | Tool | Threshold | Action |
         |-------|------|-----------|--------|
         | Guardrail tests | Agent test suite | 100% pass | Block |
         | Budget enforcement | Unit tests | 100% pass | Block |
         | Kill switch test | Integration | Functional | Block |

         **QG-P1 (Production) - Automated:**
         | Check | Tool | Threshold | Action |
         |-------|------|-----------|--------|
         | Load test | k6/Locust | Meet SLO | Block |
         | Chaos test | Chaos toolkit | Resilient | Warn |
         | Compliance scan | Compliance tool | No violations | Block |

      3. **Configure Pipeline Integration**

         **GitHub Actions Example Structure:**
         ```yaml
         # Gate validation job structure (not runnable code)
         jobs:
           gate-validation:
             steps:
               - name: Run Gate Checks
                 # Execute gate-specific test suites
               - name: Evaluate Results
                 # Compare against thresholds
               - name: Gate Decision
                 # Pass/Fail/Conditional determination
         ```

         **GitLab CI Example Structure:**
         ```yaml
         # Gate validation stage structure
         stages:
           - gate-validation
         gate-checks:
           stage: gate-validation
           # Run automated gate validation
         ```

      4. **Configure Gate Override Process**
         Define emergency bypass procedures:

         | Override Level | Approvers | Documentation Required | Audit |
         |----------------|-----------|------------------------|-------|
         | Temporary (24hr) | Team Lead | Jira ticket | Logged |
         | Extended (1 week) | Engineering Manager | RFC | Logged + Alert |
         | Permanent | VP Engineering | Architecture Review | Full audit |

      5. **Set Up Gate Reporting**
         Configure dashboards and notifications:

         | Report | Frequency | Audience | Channel |
         |--------|-----------|----------|---------|
         | Gate status | Per pipeline | Dev team | Slack |
         | Weekly summary | Weekly | Engineering leads | Email |
         | Failure trends | Daily | DevOps | Dashboard |
         | Override audit | Weekly | Security | Email |

      6. **Define Rollback Triggers**
         Configure automatic rollback on post-deploy gate failures:

         | Trigger | Threshold | Action | Notification |
         |---------|-----------|--------|--------------|
         | Error rate spike | >5% increase | Auto rollback | PagerDuty |
         | Latency degradation | >2x baseline | Alert + manual | Slack |
         | Isolation breach | Any detected | Immediate rollback | PagerDuty |

      ### Verification Checklist
      - [ ] All gates mapped to pipeline stages
      - [ ] Automated checks configured for each gate
      - [ ] Thresholds defined and documented
      - [ ] Override process documented and tested
      - [ ] Reporting dashboards configured
      - [ ] Rollback triggers tested
      - [ ] Team trained on gate process

      ### Output
      Produce CI/CD gate configuration using template:
      `{project-root}/_bmad/bam/data/templates/cicd-gate-config-template.md`
