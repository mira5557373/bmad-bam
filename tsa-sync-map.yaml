# TSA (Technology Stack Architecture) -> BAM Pattern Registry Migration Map
# TSA has been retired in favor of pattern registry + web research for current information
# This map documents the migration from static knowledge to dynamic patterns

version: "2.0.0"
last_sync: "2026-04-08"
module: bam
status: migrated

# TSA topics are now covered by pattern registry CSVs + web search queries
mappings:
  # Foundation Layer -> Pattern Registry
  - tsa: "01-foundation/multi-tenancy.md"
    bam:
      - "data/bam-patterns.csv (filter: tenant-*)"
      - "data/tenant-models.csv"
      - "data/agent-guides/bam/tenant-isolation.md"
      - "data/agent-guides/bam/rls-best-practices.md"
    status: active
    notes: "Core tenant isolation via pattern registry + web search"

  - tsa: "01-foundation/modular-architecture.md"
    bam:
      - "data/bam-patterns.csv (filter: module-*)"
      - "data/agent-guides/bam/module-architecture.md"
    status: active
    notes: "Module boundary patterns via registry"

  # AI Runtime Layer -> Pattern Registry
  - tsa: "02b-ai/agents.md"
    bam:
      - "data/ai-runtimes.csv"
      - "data/bam-patterns.csv (filter: agent-*)"
      - "data/agent-guides/bam/ai-runtime.md"
    status: active
    notes: "AI runtime via pattern registry + web search for current versions"

  - tsa: "02b-ai/tools-mcp.md"
    bam:
      - "data/bam-patterns.csv (filter: tool-*)"
      - "data/agent-guides/bam/action-gateway-patterns.md"
    status: active
    notes: "Tool integration via pattern registry"

  - tsa: "02b-ai/safety.md"
    bam:
      - "data/quality-gates.csv"
      - "checklists/qg-i3-agent-safety.md"
    status: active
    notes: "AI safety evaluation via quality gates"

  # Security Layer -> Pattern Registry
  - tsa: "03-security/tenant-isolation.md"
    bam:
      - "data/tenant-models.csv"
      - "data/agent-guides/bam/tenant-testing.md"
      - "checklists/tenant-isolation.md"
      - "checklists/qg-i2-tenant-safety.md"
    status: active
    notes: "Tenant security via registry + checklists"

  - tsa: "03-security/agent-access-control.md"
    bam:
      - "data/bam-patterns.csv (filter: agent-identity-*, agent-data-*)"
    status: active
    notes: "Agent access control via pattern registry"

  # Integration Layer -> Pattern Registry
  - tsa: "04-integration/module-communication.md"
    bam:
      - "data/bam-patterns.csv (filter: event-*, saga-*)"
      - "data/agent-guides/bam/integration-patterns.md"
    status: active
    notes: "Module integration via pattern registry"

  - tsa: "04-integration/api-versioning.md"
    bam:
      - "data/bam-patterns.csv (filter: api-*)"
    status: active
    notes: "API versioning via pattern registry"

  # Development & Testing -> Pattern Registry
  - tsa: "05-development/*"
    bam:
      - "data/bam-patterns.csv (filter: dev-*)"
    status: active
    notes: "Development patterns via registry + web search for tooling"

  - tsa: "06-testing/multi-tenant.md"
    bam:
      - "data/agent-guides/bam/tenant-testing.md"
      - "checklists/tenant-isolation.md"
    status: active
    notes: "Testing via agent guides + checklists"

  # Compliance -> Pattern Registry
  - tsa: "03-security/compliance.md"
    bam:
      - "data/compliance-frameworks.csv"
    status: active
    notes: "Compliance requirements via registry"

validation_rules:
  - rule: "pattern_registry_coverage"
    description: "All TSA topics should have corresponding pattern registry entries"
    check: "Verify bam-patterns.csv has filter-able entries"

  - rule: "web_search_enabled"
    description: "Web search queries in pattern registry should return current info"
    check: "Test web_query column produces valid results"

  - rule: "no_static_knowledge"
    description: "No references to deprecated knowledge/ directory"
    check: "Verify all BAM refs use data/ or checklists/"

gaps: []
# No gaps - TSA content migrated to pattern registry + web search approach
